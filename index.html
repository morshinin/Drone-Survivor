    class AssetManager {
      constructor() {
        this.assets = new Map()
        this.promises = []
        this.loadedCount = 0
        this.totalCount = 0
        this.assetsList = []
      }

      register(key, src) {
        this.assetsList.push({ key, src })
      }

      loadImage(key, src) {
        this.totalCount++
        const img = new Image()
        img.src = src
        const promise = new Promise((resolve, reject) => {
          img.onload = () => {
            this.loadedCount++
            this.assets.set(key, img)
            resolve(img)
          }
          img.onerror = () => {
            console.error(`Failed to load asset: ${key} at ${src}`)
            reject(new Error(`Failed to load ${key}`))
          }
        })
        this.promises.push(promise)
      }

      // async loadAll() {
      //   await Promise.all(this.promises)
      // }

      async loadAll() {
        this.totalCount = this.assetsList.length

        for (const { key, src } of this.assetsList) {
          await this.loadImage(key, src)
        }

        await Promise.all(this.promises)
      }

      registerGameAssets() {
        this.register("background", "game_bg.png")
        this.register("player", "soldier.png")
        this.register("player_walk", "soldier_walk_sprite.png")

        this.register("clouds", "clouds_bg.png")
        this.register("fire", "fire_sprite.png")
        this.register("explosion", "explosion_sprite.png")
        this.register("ground_explosion", "ground_explosion_sprite.png")
      }

      get(key) {
        const asset = this.assets.get(key)
        if (!asset) throw new Error(`Asset not found: ${key}`)
        return asset
      }

      getProgress() {
        return this.totalCount > 0 ? this.loadedCount / this.totalCount : 1
      }

      constructor(textManager, entityManager, uiManager, droneSpawner) {

            }),

                { type: DroneType.KAMIKAZE, count: 2 }

            }),

              drones: [

                { type: DroneType.GRENADIER, count: 4 },
                { type: DroneType.KAMIKAZE, count: 3 }
              ],
              pauseAfter: 3500,
              spawnInterval: 500
            })
          ],
          endMessage: this.textManager.getCommanderStageEnd(1),
          pauseAfter: 5000
        }))

        // Этап 3: Тяжелый
        this.stages.push(new StageConfig('Тяжелый', {
          startMessage: this.textManager.getCommanderStageStart(2),
          waves: [
            new WaveConfig('Волна 1', {
              drones: [
                { type: DroneType.NORMAL, count: 15 },
                { type: DroneType.GRENADIER, count: 5 },
                { type: DroneType.KAMIKAZE, count: 3 }
              ],
              pauseAfter: 3000,
              spawnInterval: 450
            }),
            new WaveConfig('Волна 2', {
              drones: [
                { type: DroneType.NORMAL, count: 18 },
                { type: DroneType.GRENADIER, count: 6 },
                { type: DroneType.KAMIKAZE, count: 4 }
              ],
              pauseAfter: 3500,
              spawnInterval: 400
            }),
            new WaveConfig('Волна 3', {
              drones: [
                { type: DroneType.NORMAL, count: 20 },
                { type: DroneType.GRENADIER, count: 7 },
                { type: DroneType.KAMIKAZE, count: 5 }
              ],
              pauseAfter: 4000,
              spawnInterval: 350
            })
          ],
          endMessage: this.textManager.getCommanderStageEnd(2),
          pauseAfter: 6000
        }))

        // Этап 4: Босс
        this.stages.push(new StageConfig('Босс', {
          startMessage: this.textManager.getCommanderStageStart(3),
          bossWave: true,
          waves: [
            new WaveConfig('Босс и свита', {
              drones: [
                { type: 'boss', count: 1 },
                { type: DroneType.NORMAL, count: 2 },
                { type: DroneType.GRENADIER, count: 1 }
              ],
              pauseAfter: 0,
              spawnInterval: 1200
            })
          ],
          endMessage: this.textManager.getCommanderStageEnd(3),
          pauseAfter: 8000
        }))

        // Этап 5: Бесконечный режим
        this.stages.push(new StageConfig('Бесконечность', {
          startMessage: this.textManager.getCommanderStageStart(4),
          waves: this.generateInfiniteWaves(),
          infiniteMode: true
        }))
      }

      generateInfiniteWaves() {
        const waves = []
        for (let i = 0; i < 100; i++) {
          const difficulty = 1 + i * 0.2
          waves.push(new WaveConfig(`Волна ${i + 1}`, {
            drones: [
              { type: DroneType.NORMAL, count: Math.floor(10 * difficulty) },
              { type: DroneType.GRENADIER, count: Math.floor(3 * difficulty) },
              { type: DroneType.KAMIKAZE, count: Math.floor(2 * difficulty) }
            ],
            pauseAfter: 3000,
            spawnInterval: Math.max(200, 500 - i * 10)
          }))
        }
        return waves
      }

      startStage(index) {
        if (index >= this.stages.length) {
          if (this.infiniteMode) {
            this.startInfiniteMode()
          }
          return
        }

        const stage = this.stages[index]

        // ВАЖНО: сбрасываем все счетчики перед стартом этапа
        this.currentStageIndex = index
        this.currentWaveIndex = 0
        this.isActive = true
        this.stageComplete = false
        this.isPaused = false
        this.pauseTimer = 0
        this.spawnTimer = 0
        this.currentWaveSpawnCount = 0
        this.currentWaveDrones = []

        this.isActive = false // ВАЖНО

        if (stage.startMessage) {
          // Показываем сообщение, затем запускаем волну
          this.uiManager.showCommanderMessage(5000, stage.startMessage).then(() => {
            this.isActive = true
            this.startCurrentWave()
          })
        } else {
          // Нет сообщения — сразу запускаем
          this.isActive = true
          this.startCurrentWave()
        }
      }

      // Запустить текущую волну
      startCurrentWave() {
        const stage = this.stages[this.currentStageIndex]

        if (this.currentWaveIndex >= stage.waves.length) {
          this.completeStage()
          return
        }

        const wave = stage.waves[this.currentWaveIndex]

        // ПРИНУДИТЕЛЬНОЕ ГЛУБОКОЕ КОПИРОВАНИЕ
        this.currentWaveDrones = JSON.parse(JSON.stringify(wave.drones))

        // Сохраняем общее количество дронов в волне как константу
        this.totalWaveDrones = this.currentWaveDrones.reduce((sum, d) => sum + d.count, 0)

        this.isPaused = false
        this.spawnTimer = 0
        this.currentWaveSpawnCount = 0
      }

      // Завершить этап
      completeStage() {
        const stage = this.stages[this.currentStageIndex]

        this.isActive = false
        this.stageComplete = true
        this.pauseTimer = 0
        this.spawnTimer = 0
        this.currentWaveSpawnCount = 0
        this.currentWaveDrones = []

        const nextStage = () => {
          this.currentStageIndex++
          this.currentWaveIndex = 0 // ВАЖНО: сбрасываем индекс волны!
          if (this.currentStageIndex < this.stages.length) {
            this.startStage(this.currentStageIndex)
          } else {
            this.startInfiniteMode()
          }
        }

        if (stage.endMessage) {
          this.uiManager.showCommanderMessage(5000, stage.endMessage).then(() => {
            if (stage.bossWave) {
              this.startInfiniteMode()
            } else {
              nextStage()
            }
          })
        } else {
          nextStage()
        }
      }

      // Запустить бесконечный режим
      startInfiniteMode() {
        this.infiniteMode = true
        this.currentStageIndex = this.stages.length - 1
        this.currentWaveIndex = 0
        this.isActive = true

        const stage = this.stages[this.currentStageIndex]
        if (stage.startMessage) {
          this.uiManager.showCommanderMessage(5000, stage.startMessage).then(() => {
            this.startCurrentWave()
          })
        }
      }

      // Обновление (вызывать в gameLoop)
      update(delta) {
        if (!this.isActive) return

        // Проверяем индекс этапа
        if (this.currentStageIndex >= this.stages.length) {
          this.isActive = false
          return
        }

        const stage = this.stages[this.currentStageIndex]
        if (!stage) {
          this.isActive = false
          return
        }

        // ===== ФАЗА ПАУЗЫ МЕЖДУ ВОЛНАМИ =====
        if (this.isPaused) {
          this.pauseTimer += delta
          const prevWave = stage.waves[this.currentWaveIndex - 1]

          if (prevWave && this.pauseTimer >= prevWave.pauseAfter) {
            this.isPaused = false
            this.spawnTimer = 0
            this.startCurrentWave()
          }
          return
        }

        // Проверяем индекс волны
        if (this.currentWaveIndex >= stage.waves.length) {
          this.completeStage()
          return
        }

        const wave = stage.waves[this.currentWaveIndex]
        const totalDrones = this.totalWaveDrones || 0

        // ===== ФАЗА 1: СПАВН — пока не заспавнены все дроны =====
        if (this.currentWaveSpawnCount < totalDrones) {
          this.spawnTimer += delta
          if (this.spawnTimer >= wave.spawnInterval) {
            this.spawnTimer = 0
            this.spawnNextDrone()
          }
          return
        }

        // ===== ФАЗА 2: ОЖИДАНИЕ — все заспавнены, ждём гибели =====
        // Проверяем каждый кадр (не через spawnTimer), чтобы не пропустить момент
        const alive = this.entityManager.getCountByCategory('drone')

        if (alive === 0) {
          this.currentWaveIndex++

          if (this.currentWaveIndex < stage.waves.length) {
            this.isPaused = true
            this.pauseTimer = 0
          } else {
            this.completeStage()
          }
        }
      }

      // Получить общее количество дронов в волне
      // getWaveDroneCount() {
      //   if (!this.currentWaveDrones) return 0
      //   return this.currentWaveDrones.reduce((sum, d) => sum + d.count, 0)
      // }

      // Посчитать сколько дронов уже заспавнено в текущей волне
      // countSpawnedInWave() {
      //   // Можно добавить счетчик в WaveManager
      //   if (!this.currentWaveSpawnCount) {
      //     this.currentWaveSpawnCount = 0
      //   }
      //   return this.currentWaveSpawnCount
      // }

      // Заспавнить следующего дрона из волны
      spawnNextDrone() {
        // Приоритет боссу: если он есть в списке, спавним его первым
        let typeEntry = this.currentWaveDrones.find(d => d.type === 'boss' && d.count > 0)

        if (!typeEntry) {
          const availableTypes = this.currentWaveDrones.filter(d => d.count > 0)
          if (availableTypes.length === 0) return
          typeEntry = availableTypes[Math.floor(Math.random() * availableTypes.length)]
        }

        typeEntry.count--
        this.currentWaveSpawnCount++

        this.currentWaveDrones.map(d => `${d.type}:${d.count}`).join(', ')

        this.spawnDroneByType(typeEntry.type)
      }

      // Спавн дрона по типу
      spawnDroneByType(type) {
        switch (type) {
          case DroneType.NORMAL:
            return this.droneSpawner.spawnNormalDrone()
          case DroneType.GRENADIER:
            return this.droneSpawner.spawnGrenadier()
          case DroneType.KAMIKAZE:
            return this.droneSpawner.spawnKamikaze()
          case 'boss':
            return this.droneSpawner.spawnBoss()
        }
      }
    }

    class AudioManager {
      constructor() {
        this.musicEnabled = true
        this.sfxEnabled = true
        this.musicVolume = 0.2
        this.sfxVolume = 0.4

        this.music = {}
        this.sfx = {}
        this.currentMusic = null

        this.loadSettings()
        this.registerAll()
      }

      registerAll() {
        // Музыка
        this.registerMusic("menu", "menu.mp3", { loop: true })
        this.registerMusic("game", "game.mp3", { loop: true })
        this.registerMusic("ambient", "ambient.mp3")
        this.registerMusic("wave1", "wave1.mp3")
        this.registerMusic("wave2", "wave2.mp3")
        this.registerMusic("wave3", "wave3.mp3")
        this.registerMusic("boss", "boss.mp3")
        this.registerMusic("gameover", "gameover.mp3")

        // Звуковые эффекты
        this.registerSfx("pistol_shot", "pistol_shot.mp3")
        this.registerSfx("pistol_reload", "pistol_reload.mp3")
        this.registerSfx("rifle_shot", "rifle_shot.mp3")
        this.registerSfx("rifle_reload", "rifle_reload.mp3")
        this.registerSfx("shotgun_shot", "shotgun_shot.mp3")
        this.registerSfx("shotgun_reload", "shotgun_reload.mp3")
        this.registerSfx("machinegun_shot", "machinegun_shot.mp3")
        this.registerSfx("machinegun_reload", "machinegun_reload.mp3")

        this.registerSfx("drone_explosion", "drone_explosion.mp3")
        this.registerSfx("ground_explosion", "ground_explosion.mp3")
        this.registerSfx("death", "death.mp3")
        this.registerSfx("radio_on", "radio_chatter.mp3")
        this.registerSfx("radio_off", "radio_off.mp3")
        this.registerSfx("typewriter", "typeWriter.mp3")
      }

      registerMusic(name, src, { loop = false, volume = this.musicVolume } = {}) {
        const audio = new Audio(src)
        audio.loop = loop
        audio.volume = volume
        this.music[name] = audio
        return audio
      }

      registerSfx(name, src, { volume = this.sfxVolume } = {}) {
        const audio = new Audio(src)
        audio.volume = volume
        this.sfx[name] = audio
        return audio
      }

      playMusic(name, { restart = true } = {}) {
        if (!this.musicEnabled) return

        const track = this.music[name]
        if (!track) return

        if (this.currentMusic && this.currentMusic !== track) {
          this.stopCurrentMusic()
        }

        this.currentMusic = track

        if (restart) {
          track.currentTime = 0
        }

        track.volume = this.musicVolume
        track.play().catch(() => {})
      }

      stopCurrentMusic() {
        if (!this.currentMusic) return
        this.currentMusic.pause()
        this.currentMusic.currentTime = 0
        this.currentMusic = null
      }

      pauseCurrentMusic() {
        if (!this.currentMusic) return
        this.currentMusic.pause()
      }

      resumeCurrentMusic() {
        if (!this.currentMusic) return
        if (!this.musicEnabled) return
        this.currentMusic.play().catch(() => {})
      }

      playSfx(name, volume = null) {
        if (!this.sfxEnabled) return

        const base = this.sfx[name]
        if (!base) return

        const sound = base.cloneNode()
        sound.volume = volume ?? this.sfxVolume
        sound.play().catch(() => {})
      }

      setMusicEnabled(value) {
        this.musicEnabled = Boolean(value)
        this.saveSettings()

        if (!this.musicEnabled) {
          this.stopCurrentMusic()
        }
      }

      setSfxEnabled(value) {
        this.sfxEnabled = Boolean(value)
        this.saveSettings()
      }

      setMusicVolume(value) {
        this.musicVolume = Math.max(0, Math.min(1, value))
        this.saveSettings()

        if (this.currentMusic) {
          this.currentMusic.volume = this.musicVolume
        }
      }

      setSfxVolume(value) {
        this.sfxVolume = Math.max(0, Math.min(1, value))
        this.saveSettings()
      }

      stopAll() {
        this.stopCurrentMusic()
      }

      loadSettings() {
        const saved = localStorage.getItem('audioSettings')
        if (!saved) return

        try {
          const data = JSON.parse(saved)

          if (typeof data.musicEnabled === 'boolean') {
            this.musicEnabled = data.musicEnabled
          }

          html += `${index + 1}. ${entry.name} — ${entry.score} pts<br>`
        })
        this.el.leaderboard.innerHTML = html
      }

      async showCommanderMessage(duration = 10000, message = null) {
        const prevState = this.gameManager.gameState
        this.gameManager.gameState = GameState.DIALOG

        this.showDialog()
        const balloon = this.el.commanderBalloon
        const p = balloon.querySelector("p")

        await this.animateCommanderIn()
        await this.audioManager.playSfx('radio_on')
        await new Promise(r => setTimeout(r, 300))

        // const textToShow = message || this.managers.text.getCommanderIntro()
        const pages = this.textManager.splitIntoPages(message)

        for (let i = 0; i < pages.length; i++) {
          const page = pages[i] + "..."
          await this.textManager.typeToElement(p, page)
          this.showContinueHint(true)
          await this.waitForContinue()
          this.showContinueHint(false)
        }

        await this.audioManager.playSfx('radio_off')
        await this.animateCommanderOut()

        this.gameManager.gameState = prevState === GameState.PAUSED ? GameState.PAUSED : GameState.GAME
        this.hideDialog()
      }

      waitForContinue() {
        return new Promise(resolve => {
          function handler(e) {
            if (e.code === "Enter") {
              window.removeEventListener("keydown", handler)
              resolve()
            }
          }
          window.addEventListener("keydown", handler)
        })
      }

      showHUD() {
        if (this.hudContainer) {
          this.hudContainer.classList.remove('hud-hidden')
          this.hudContainer.classList.add('hud-visible')
        }

        // Показываем отдельные элементы, если нужно
        if (this.hud.weaponName) {
          this.hud.weaponName.parentElement?.classList.remove('hud-hidden')
        }
        if (this.hud.score) {
          this.hud.score.parentElement?.classList.remove('hud-hidden')

        if (this.hudContainer) {

          this.hudContainer.classList.add('hud-hidden')
        }

        }
        if (this.hud.score) {
          this.hud.score.parentElement?.classList.add('hud-hidden')
        }
      }

      constructor(audio) {

      async load() {

        this.texts = await response.json()
        this.loadLanguagePreference()
      }

      // getCommanderIntro() {
      //   return this.texts[this.currentLanguage].commander.intro
      // }

      getCommanderStageStart(stageIndex) {
        let stages
        try {
          stages = this.texts[this.currentLanguage]?.commander?.stages
        } catch (error) {
          console.log(this.texts[this.currentLanguage])
          throw new Error(`Could not get commander stage: ${error}`)
        }
        return stages[stageIndex]?.start || null
      }

      getCommanderStageEnd(stageIndex) {
        const stages = this.texts[this.currentLanguage]?.commander?.stages
        return stages[stageIndex]?.end || null
      }

      getGameOverMessage() {
        return {
          gameOver: this.texts[this.currentLanguage].ui.gameOver,
          finalScore: this.texts[this.currentLanguage].ui.finalScore,
          tryAgain: this.texts[this.currentLanguage].ui.tryAgain,
        }
      }

      getPauseMessage() {
        return { title: this.texts[this.currentLanguage].ui.pause, text: this.texts[this.currentLanguage].ui.continue }
      }

      getContinueMessage() {
        return this.texts[this.currentLanguage].ui.continue
      }

      setLanguage(lang) {
        if (this.texts[lang]) {
          this.currentLanguage = lang
          localStorage.setItem('gameLanguage', lang)
        }
      }

      loadLanguagePreference() {
        const saved = localStorage.getItem('gameLanguage')
        if (saved && this.texts[saved]) {
          this.currentLanguage = saved
        }
      }

      splitIntoPages(text, maxChars = 140) {
        const words = text.split(" ")
        const pages = []
        let current = ""

        for (const word of words) {
          if ((current + word).length > maxChars) {
            pages.push(current.trim())
            current = ""
          }
          current += word + " "
        }

        if (current.length) pages.push(current.trim())
        return pages
      }

      async typeToElement(element, text, speed = 25) {
        element.textContent = ""
        let skip = false

        const skipHandler = (e) => {
          if (e.code === "Enter") skip = true
        }

        window.addEventListener("keydown", skipHandler)
        for (let i = 0; i < text.length; i++) {
          element.textContent += text[i]

          if (i % 3 === 0 && text[i] !== " ") {
            this.audio.playSfx('typewriter')
          }

          if (skip) {
            element.textContent = text
            break
          }

          await new Promise(r => setTimeout(r, speed))
        }

        window.removeEventListener("keydown", skipHandler)
      }
    }

    class TransitionManager {
      constructor(fadeElement) {
        this.fadeElement = fadeElement
      }

      async fadeTo(duration, targetOpacity) {
        if (!this.fadeElement) return

        return new Promise((resolve) => {
          this.fadeElement.style.transition = `opacity ${duration}ms`
          this.fadeElement.style.opacity = targetOpacity.toString()
          setTimeout(resolve, duration)
        })
      }

      async fadeIn(duration = 1000) {
        return this.fadeTo(duration, 0)
      }

      async fadeOut(duration = 1000) {
        return this.fadeTo(duration, 1)
      }

      async crossfade(action, duration = 800) {
        await this.fadeOut(duration / 2)

        if (action) {
          await action()
        }

        await this.fadeIn(duration / 2)
      }

      reset() {
        if (this.fadeElement) {
          this.fadeElement.style.transition = ''
          this.fadeElement.style.opacity = '0'
        }
      }
    }

    class ScoreManager {
      constructor(getSurvivalTime, getEntityManager) {
        this._score = 0;
        this._getSurvivalTime = getSurvivalTime;
        this._getEntityManager = getEntityManager;
        this._achievements = new Map(); // id -> { id, name, unlocked, unlockedAt }
      }

      // --- Подсчёт очков ---

      /**
       * Рассчитывает очки за уничтожение дрона/босса.
       * Множители: время выживания (до 5x) и количество врагов на экране (до 4x).
       */
      calculateDroneScore(drone) {
        const survivalTime = this._getSurvivalTime();
        const droneCount = this._getEntityManager().getCountByCategory('drone');
        const rawScore = drone.scoreValue *
          (1 + Math.min(survivalTime / 60, 5)) *
          (1 + Math.min(droneCount / 20, 4));
        return Math.floor(rawScore);
      }

      addScore(amount) {
        this._score += amount;
        return this._score;
      }

      getScore() {
        return this._score;
      }

      reset() {
        this._score = 0;
      }

      // --- Достижения (заготовка на будущее) ---

      registerAchievement(id, name) {
        if (!this._achievements.has(id)) {
          this._achievements.set(id, { id, name, unlocked: false, unlockedAt: null });
        }
      }

      unlockAchievement(id) {
        const a = this._achievements.get(id);
        if (a && !a.unlocked) {
          a.unlocked = true;
          a.unlockedAt = this._getSurvivalTime();
          return true;
        }
        return false;
      }

      getUnlockedAchievements() {
        return [...this._achievements.values()].filter(a => a.unlocked);
      }
    }

    class LeaderboardManager {
      constructor(db, uiManager, scoreManager) {
        this.db = db
        this.uiManager = uiManager
        this.scoreManager = scoreManager
        this.leaderboard = [] // локальный кэш
        this.localStorageKey = 'game_leaderboard'

        this.loadLocalCache()
      }

      loadLocalCache() {
        try {
          const cached = localStorage.getItem(this.localStorageKey)
          if (cached) {
            this.leaderboard = JSON.parse(cached)
          }
        } catch (error) {
          console.warn('Failed to load cached leaderboard', error)
        }
      }

      saveLocalCache() {
        try {
          localStorage.setItem(this.localStorageKey, JSON.stringify(this.leaderboard))
        } catch (error) {
          console.warn('Failed to save leaderboard to cache', error)
        }
      }

      /**
       * Загрузить лидерборд из БД
       */
      async load() {
        try {
          const { data, error } = await this.db
            .from("leaderboard")
            .select("*")
            .order("score", { ascending: false })
            .limit(5)

          if (data && data.length) {
            this.leaderboard = data
            this.saveLocalCache() // обновляем кэш
          }

          this.render()
          return this.leaderboard
        } catch (error) {
          console.error("Failed to load leaderboard from server, using cache", error)
          // Используем кэш при ошибке сети
          this.render()
          return this.leaderboard
        }
      }


      /**
       * Сохранить текущий результат игрока
       */
      async saveCurrentScore(playerName) {
        const score = this.scoreManager.getScore()
        if (!score || !playerName) return

        try {
          const { error } = await this.db
            .from("leaderboard")
            .insert([{ name: playerName, score: score }])

          if (error) throw error

          // После сохранения обновляем локальный лидерборд
          await this.load()
          return true
        } catch (error) {
          console.error("Failed to save score:", error)
          return false
        }
      }

      /**
       * Сохранить в локальный кэш (для оффлайн или финального результата)
       */
      saveLocal(playerName, survivalTime) {
        const score = this.scoreManager.getScore()
        const entry = {
          name: playerName,
          score: score,
          time: Math.floor(survivalTime)
        }

        this.leaderboard.push(entry)
        this.leaderboard.sort((a, b) => {
          if (b.score !== a.score) return b.score - a.score
          return b.time - a.time
        })
        this.leaderboard = this.leaderboard.slice(0, 10)

        this.render()
      }

      /**
       * Получить топ N записей
       */
      getTop(limit = 5) {
        return this.leaderboard.slice(0, limit)
      }

      /**
       * Отрисовать лидерборд через UIManager
       */
      render() {
        const html = this.generateHTML()
        this.uiManager.setLeaderboardHTML(html)
      }

      /**
       * Сгенерировать HTML для лидерборда
       */
      generateHTML() {
        if (!this.leaderboard.length) {
          return "<h3>Top Survivors</h3><p>No scores yet</p>"
        }

        let html = "<h3>Top Survivors</h3>"
        this.leaderboard.forEach((entry, index) => {
          html += `${index + 1}. ${entry.name} — ${entry.score} pts<br>`
        })
        return html
      }

      /**
       * Очистить локальный лидерборд
       */
      clear() {
        this.leaderboard = []
        this.render()
      }
    }

    class InputManager {
      constructor(gameManager) {
        this.gameManager = gameManager
        this.keys = {};
        this.shooting = false;

        this.bindEvents()
      }

      bindEvents() {
        document.addEventListener("keydown", (e) => this.handleKeyDown(e))
        document.addEventListener("keyup", (e) => this.handleKeyUp(e))
      }

      handleKeyDown(e) {
        const { gameState, player } = this.gameManager

        if (e.code === "Space") {
          this.shooting = true;

          // Для полуавтоматического оружия стреляем при нажатии
          if (player?.alive && player.weapon && !player.weapon.auto) {
            const dir = this.getShootDirection()
            player.fire(dir.dx, dir.dy)
          }

          e.preventDefault()
        }

        this.keys[e.code] = true;
      }

      handleKeyUp(e) {
        const { gameState, player, droneSpawner } = this.gameManager
        if (e.code === "Space") this.shooting = false;

        if (e.code === "KeyP") {
          if (gameState === GameState.GAME) {
            this.gameManager.gameState = GameState.PAUSED
          } else if (gameState === GameState.PAUSED) {
            this.gameManager.gameState = GameState.GAME
          }
        }

        if (this.gameManager.gameState === GameState.PAUSED) {
          return
        }

        if (e.key === "i") {
          player?.setWeapon('rifle')
        }

        if (e.key === "s") {
          player?.setWeapon('shotgun')
        }

        if (e.key === "m") {
          player?.setWeapon('machinegun')
        }

        if (e.code === "KeyR") {
          if (player?.weapon?.reloading) return
          player?.reload()
        }

        this.keys[e.code] = false;
      }

      isShooting() {
        return this.shooting;
      }

      isDown(keyCode) {
        return this.keys[keyCode] === true;
      }

      getMoveDirection() {
        if (this.isDown("ArrowLeft")) return -1;
        if (this.isDown("ArrowRight")) return 1;
        return 0;
      }

      getShootDirection() {
        let dx = 0;
        let dy = -1; // по умолчанию вверх

        if (this.isDown("ArrowRight")) {
          dx = 0.7;
          dy = -0.7;
        }
        if (this.isDown("ArrowLeft")) {
          dx = -0.7;
          dy = -0.7;
        }
        return { dx, dy };
      }
    }

    class Physics {
      static isColliding(a, b) {
        if (!a || !b || !a.alive || !b.alive) return false;

        const w1 = a.width || a.size || 0;
        const h1 = a.height || a.size || 0;
        const w2 = b.width || b.size || 0;
        const h2 = b.height || b.size || 0;

        return a.x < b.x + w2 &&
          a.x + w1 > b.x &&
          a.y < b.y + h2 &&
          a.y + h1 > b.y;
      }

      // В будущем сюда можно добавить другие функции:

    class CollisionManager {
      constructor(entityManager, player, uiManager, scoreManager, vfxManager) {
        this.entityManager = entityManager
        this.player = player
        this.uiManager = uiManager
        this.scoreManager = scoreManager
        this.vfxManager = vfxManager
        this.groundHeight = GameConfig.GROUND_HEIGHT
      }

      update() {
        this.checkPlayerBulletsVsDrones()
        this.checkEnemyProjectiles()
        this.checkGrenadeCollision()
      }

      checkPlayerBulletsVsDrones() {
        const bullets = this.entityManager.getByCategory('bullet')
        const drones = this.entityManager.getByCategory('drone')
        const bosses = this.entityManager.getByCategory('boss')

        const allTargets = [...drones, ...bosses]

        for (const bullet of bullets) {
          if (!bullet.alive) continue;
          for (const drone of allTargets) {
            if (!drone.alive) continue;

            if (Physics.isColliding(bullet, drone)) {
              bullet.alive = false;
              if (drone.takeDamage(1)) {
                drone.onDeath();
                const gained = this.scoreManager.calculateDroneScore(drone);
                this.scoreManager.addScore(gained);
                this.uiManager.updateScore(this.scoreManager.getScore());
              }
              break; // Пуля попала, нет смысла проверять её дальше
            }
          }
        }
      }

      checkEnemyProjectiles() {
        const enemyProjectiles = this.entityManager.getByCategory('enemyBullet');

        for (const projectile of enemyProjectiles) {
          if (!projectile.alive) continue;

          // Проверка на столкновение с землей
          if (projectile.y > CanvasManager.height - this.groundHeight) {
            if (typeof projectile.explode === 'function') {
              projectile.explode(); // Для камикадзе, у которых есть метод explode
            } else {
              this.vfxManager.playGroundExplosion(projectile.x, projectile.y);
            }
            projectile.alive = false;
            continue;
          }

          // Проверка на столкновение с игроком
          if (this.player.alive && Physics.isColliding(projectile, this.player)) {
            if (typeof projectile.explode === 'function') {
              projectile.explode();
            }
            this.player.die();
            projectile.alive = false;
          }
        }
      }

      checkGrenadeCollision() {
        const grenades = this.entityManager.getByCategory('grenade')  // добавить категорию
        for (const grenade of grenades) {
          if (grenade.exploded) continue

          // Проверка времени взрыва
          if (grenade.timer <= 0 && !grenade.exploded) {
            grenade.explode()

            // Проверка урона игроку
            if (Physics.isColliding(grenade, this.player)) {
              this.player.die()
            }
          }
        }
      }
    }

    // ======================
    // RENDERING
    // ======================
    class AnimatedSprite {
      constructor(x, y, image, options = {}) {
        this.x = x
        this.y = y
        this.image = image

        // Параметры спрайта
        this.columns = options.columns || 2
        this.totalFrames = options.totalFrames || 58
        this.frameDelay = options.frameDelay || 8
        this.width = options.width || (image.width / this.columns)
        this.height = options.height || (image.height / (this.totalFrames / this.columns))
        this.scale = options.scale || 1.0
        this.opacity = options.opacity || 1.0
        this.loop = options.loop !== undefined ? options.loop : true

        // Кэшируем вычисления размеров
        this.sw = this.image.width / this.columns
        this.sh = this.image.height / Math.ceil(this.totalFrames / this.columns)
        this.dw = this.width * (this.scale || 1.0)
        this.dh = this.height * (this.scale || 1.0)

        // Вычисляем количество строк
        this.rows = Math.ceil(this.totalFrames / this.columns)

        this.timer = 0
        this.frame = options.startFrame || 0
        this.alive = true
      }

      update() {
        this.timer++

        if (this.timer >= this.frameDelay) {
          let nextFrame = this.frame + 1

          if (nextFrame >= this.totalFrames) {
            if (this.loop) {
              nextFrame = 0
            } else {
              this.alive = false
              return
            }
          }

          this.frame = nextFrame
          this.timer = 0
        }
      }

      draw(ctx) {
        if (!this.image || !this.image.complete || !this.alive) return

        const col = this.frame % this.columns
        const row = Math.floor(this.frame / this.columns)

        const hasOpacity = this.opacity < 1.0
        if (hasOpacity) {
          ctx.save()
          ctx.globalAlpha = this.opacity
        }

        ctx.drawImage(
          this.image,
          Math.floor(col * this.sw),
          Math.floor(row * this.sh),
          Math.floor(this.sw),
          Math.floor(this.sh),
          Math.floor(this.x),
          Math.floor(this.y),
          Math.floor(this.dw),
          Math.floor(this.dh)
        )

        if (hasOpacity) {
          ctx.restore()
        } else {
          // Гарантируем сброс альфы, если не использовали save/restore
          ctx.globalAlpha = 1.0
        }
      }

      // setFrame(frame) {
      //   this.frame = Math.min(frame, this.totalFrames - 1)
      // }
      //
      // restart() {
      //   this.frame = 0
      //   this.timer = 0
      //   this.alive = true
      // }
    }

    class Player {
      static WALK_FRAMES = 7
      static WALK_FRAME_WIDTH = 100
      static WALK_FRAME_HEIGHT = 130

      constructor(uiManager, vfxManager, assets, entityManager, audioManager, gameManager) {
        this.uiManager = uiManager
        this.vfxManager = vfxManager
        this.entityManager = entityManager
        this.audioManager = audioManager
        this.gameManager = gameManager
        this.canvas = CanvasManager.canvas
        this.ctx = CanvasManager.ctx
        this.x = 0
        this.y = 0
        this.width = 100
        this.height = 130

        this.speed = 3.8
        this.direction = 1

        this.walkSprite = assets.get('player_walk')
        this.frame = 0
        this.frameTimer = 0
        this.isMoving = false

        this.vx = 0
        this.acceleration = 0.45
        this.friction = 0.88

        this.alive = true
        this.deathTimer = 2000
        this.weapon = null
      }

      setWeapon(type) {
        this.weapon = createWeapon(type)
        this.uiManager.updateWeapon(this.weapon)
        this.weapon.reloading = false
      }

      fire(dirX, dirY) {
        if (!this.weapon) return
        if (dirX === 0 && dirY === 0) return

        const shots = this.weapon.shoot(this, dirX, dirY)
        if (shots.length === 0) return

        this.uiManager.updateAmmo(this.weapon)

        switch (this.weapon.name) {
          case "Pistol":
            this.audioManager.playSfx("pistol_shot", 0.4)
            break
          case "Assault Rifle":
            this.audioManager.playSfx("rifle_shot", 0.4)
            break
          case "Shotgun":
            this.audioManager.playSfx("shotgun_shot", 0.4)
            break
          case "Machine Gun":
            this.audioManager.playSfx("machinegun_shot", 0.4)
            break
        }

        for (const s of shots) {
          this.entityManager.spawn(new Bullet(s.x, s.y, s.vx, s.vy, this.canvas))
        }
      }

      reload() {
        if (!this.weapon) return
        if (this.weapon.reloading) return

        const started = this.weapon.reload(this.uiManager)
        if (!started) return

        switch (this.weapon.name) {
          case "Pistol":
            this.audioManager.playSfx("pistol_reload", 0.5)
            break
          case "Assault Rifle":
            this.audioManager.playSfx("rifle_reload", 0.5)
            break
          case "Shotgun":
            this.audioManager.playSfx("shotgun_reload", 0.5)
            break
          case "Machine Gun":
            this.audioManager.playSfx("machinegun_reload", 0.5)
            break
        }
      }

      die() {
        if (DEBUG.godMode) return
        this.alive = false

        this.gameManager.timeScale = 0.25

        this.vfxManager.playExplosion(
          this.x + this.width / 2,
          this.y + this.height / 2
        )

        this.audioManager.stopAll()
        this.audioManager.playSfx('death')
      }

      update(delta, input = null) {
        if (input) {
          if (input.isShooting()) {
            this.vx *= 0
          }

          const moveDirection = input.getMoveDirection()
          if (moveDirection !== 0) {
            this.vx += this.acceleration * moveDirection
            this.direction = moveDirection
          }
        }

        if (this.vx > this.speed) this.vx = this.speed
        if (this.vx < -this.speed) this.vx = -this.speed

        this.vx *= this.friction

        this.x += this.vx
        this.isMoving = Math.abs(this.vx) > 0.1

        if (this.x < 0) this.x = 0
        if (this.x + this.width > this.canvas.width)
          this.x = this.canvas.width - this.width

        if (this.isMoving) {

          this.frameTimer++

          if (this.frameTimer > 15) {
            this.frame++
            this.frameTimer = 0
          }

          if (this.frame >= Player.WALK_FRAMES) {
            this.frame = 0
          }
        } else {
          this.frame = 0
        }
      }

      draw() {
        this.ctx.save()

        if (this.direction === -1) {
          this.ctx.scale(-1, 1)

          this.ctx.drawImage(
            this.walkSprite,
            this.frame * Player.WALK_FRAME_WIDTH,
            0,
            Player.WALK_FRAME_WIDTH,
            Player.WALK_FRAME_HEIGHT,
            -this.x - this.width,
            this.y,
            this.width,
            this.height
          )
        } else {
          this.ctx.drawImage(
            this.walkSprite,
            this.frame * Player.WALK_FRAME_WIDTH,
            0,
            Player.WALK_FRAME_WIDTH,
            Player.WALK_FRAME_HEIGHT,
            this.x,
            this.y,
            this.width,
            this.height
          )
        }
        this.ctx.restore()

        if (DEBUG.showHitboxes) {
          this.uiManager.showHitboxRect(this.x, this.y, this.width, this.height, 'lime')
        }
      }
    }

    class BaseDrone {
      constructor(x, y, assets, entityManager, vfxManager, waveManager, options = {}) {
        this.assets = assets
        this.entityManager = entityManager
        this.vfxManager = vfxManager
        this.waveManager = waveManager
        this.canvas = CanvasManager.canvas
        this.ctx = CanvasManager.ctx
        this.x = x
        this.y = y
        this.width = options.width || 80
        this.height = options.height || 60
        this.speed = options.speed || (Math.random() * 2 + 1)
        this.direction = options.direction || (Math.random() < 0.5 ? 1 : -1)

        // Позиция зависит от направления, если не указано иное
        if (!options.skipEntryPos) {
          if (this.direction > 0) {
            this.x = -this.width
          } else {
            this.x = this.canvas.width + this.width
            this.speed = -this.speed
          }
        }

        this.category = 'drone'

        console.log(options)

        this.hp = options.hp || 1
        this.maxHp = options.maxHp || options.hp || 1
        this.scoreValue = options.scoreValue || 10
        this.damage = options.damage || 1


        this.alive = true
        this.type = options.type || 'base'

        // Анимация
        this.frame = 0
        this.frameTimer = 0
        this.frameDelay = options.frameDelay || 8

        // Изображение
        this.image = options.image || this.assets.get('drone')
      }

      update(delta) {
        // Базовое движение
        this.x += this.speed

        // Разворот при достижении края
        if (this.x < -this.width || this.x > this.canvas.width + this.width) {
          this.speed *= -1
        }

        // Легкое покачивание
        this.y += Math.sin(performance.now() * 0.003) * 0.3

        // Анимация
        this.frameTimer += delta
        if (this.frameTimer >= this.frameDelay) {
          this.frame = (this.frame + 1) % 4 // 4 кадра анимации
          this.frameTimer = 0
        }

        // ВАЖНО: Дополнительный fail-safe для выхода за границы (например, если дрон ушел слишком высоко)
        if (this.y < -500 || this.y > this.canvas.height + 500) {
          this.alive = false
        }
      }

      draw(ctx) {
        ctx.save()
        ctx.globalAlpha = this.getOpacity()

        // Рисуем как в старом коде - целое изображение
        if (this.image && this.image.complete) {
          ctx.drawImage(
            this.image,
            Math.floor(this.x),
            Math.floor(this.y),
            Math.floor(this.width),
            Math.floor(this.height)
          )
        } else {
          // Запасной вариант
          ctx.fillStyle = this.getColor()
          ctx.fillRect(Math.floor(this.x), Math.floor(this.y), Math.floor(this.width), Math.floor(this.height))
        }

        // Полоска здоровья для сильных дронов
        if (this.maxHp > 1) {
          this.drawHealthBar(ctx)
        }

        // if (DEBUG.showHitboxes) {
        //   this.uiManager.showHitboxRect(this.x, this.y, this.width, this.height, 'yellow')
        // }
      }

      drawHealthBar(ctx) {
        // const barWidth = this.width
        // const barHeight = 5
        // const healthPercent = this.hp / this.maxHp
        //
        // ctx.fillStyle = 'rgba(255, 0, 0, 0.5)'
        // ctx.fillRect(this.x, this.y - 10, barWidth, barHeight)
        //
        // ctx.fillStyle = '#0f0'
        // ctx.fillRect(this.x, this.y - 10, barWidth * healthPercent, barHeight)
        if (this.maxHp <= 1) return

        const barWidth = this.width
        const barHeight = 5
        const healthPercent = Math.max(0, this.hp / this.maxHp)

        console.log('Drawing health bar:', this.type, 'HP:', this.hp, '/', this.maxHp, 'percent:', healthPercent)

        ctx.fillStyle = 'rgba(255, 0, 0, 0.5)'
        ctx.fillRect(this.x, this.y - 10, barWidth, barHeight)

        ctx.fillStyle = '#0f0'
        ctx.fillRect(this.x, this.y - 10, barWidth * healthPercent, barHeight)
      }

      getColor() {
        switch (this.type) {
          case 'normal': return '#ff4444'
          case 'grenadier': return '#ff8800'
          case 'kamikaze': return '#ff00ff'
          default: return '#ff0000'
        }
      }

      getOpacity() {
        return 1.0
      }

      takeDamage(amount) {
        this.hp -= amount

        if (this.hp <= 0) {
          this.alive = false
          return true
        }
        return false
      }

      onDeath() {
        // Эффект при смерти
        this.vfxManager.playExplosion(this.x + this.width / 2, this.y + this.height / 2)
      }
    }

    class NormalDrone extends BaseDrone {
      constructor(y, assets, entityManager, vfxManager, waveManager, gameManager) {
        super(0, y, assets, entityManager, vfxManager, waveManager,  {
          type: 'normal',
          width: 80,
          height: 60,
          hp: 1,
          maxHp: 1,
          scoreValue: 10,
          frameDelay: 8,
        })
        this.canvas = CanvasManager.canvas

        this.fireTimer = Math.random() * 1000
        this.fireCooldown = 800 + Math.random() * 1200
        this.gameManager = gameManager
      }

      update(delta) {
        super.update(delta)

        this.fireTimer += delta

        if (this.fireTimer >= this.fireCooldown &&
          this.waveManager.globalEnemyFireCooldown <= 0) {
          this.shoot()
        }
      }

      shoot() {
        this.fireTimer = 0
        if (this.entityManager.getCountByCategory('enemyBullet') < this.waveManager.maxBullets) {
          this.entityManager.spawn(new EnemyBullet(
            this.uiManager,
            this.assets,
            this.x + this.width / 2,
            this.y + this.height
          ))

          this.waveManager.globalEnemyFireCooldown = 1800 + Math.random() * 400
        }

        this.fireCooldown = 1800 + Math.random() * 1200
      }
    }

          type: 'grenadier',

          scoreValue: 25,
          frameDelay: 10,
        })

        this.canvas = CanvasManager.canvas
        this.ctx = CanvasManager.ctx

        this.dropTimer = 120 + Math.random() * 120
        this.grenadeCooldown = 3000
      }

      update(delta) {
        super.update(delta)

        // Сброс гранат
        this.dropTimer -= delta
        if (this.dropTimer <= 0) {
          this.dropGrenade()
          this.dropTimer = this.grenadeCooldown + Math.random() * 1000
        }
      }

      dropGrenade() {
        this.entityManager.spawn(new Grenade(this.assets, this.vfxManager, this.x, this.y, this.canvas, this.ctx))
      }

      draw(ctx) {
        super.draw(ctx)
        // Дополнительная отметка для гранатометчика
        ctx.fillStyle = 'orange'
        ctx.beginPath()
        ctx.arc(this.x + this.width - 10, this.y + 10, 5, 0, Math.PI * 2)
        ctx.fill()
      }
    }

      //   this.x += this.vx
      //   this.y += this.vy
      //
      //   this.frameTimer += delta
      //   if (this.frameTimer >= this.frameDelay) {

      //
      //   // Проверка столкновения с игроком
      //   if (Physics.isColliding(this, this.player)) {

      //
      //   // Проверка удара о землю
      //   if (this.y > CanvasManager.height - this.groundHeight) {
      //     this.explode()
      //   }
      //
      //   // ВАЖНО: Проверка выхода за боковые границы или слишком высоко вверх
      //   if (this.x < -200 || this.x > CanvasManager.width + 200 || this.y < -300) {
      //     this.alive = false
      //   }
      // }
      //
      // explode() {
      //   this.vfxManager.playGroundExplosion(this.x, this.y)
      //
      //   // Проверка урона игроку
      //   const dx = this.player.x + this.player.width / 2 - (this.x + this.width / 2)
      //   const dy = this.player.y + this.player.height / 2 - (this.y + this.height / 2)
      //   const dist = Math.sqrt(dx * dx + dy * dy)
      //
      //   if (dist < this.explosionRadius) {
      //     if (!DEBUG.godMode && this.player.alive) {
      //       this.player.die()
      //     }
      //   }
      //
      //   this.alive = false
      // }
      //
      // draw(ctx) {
      //   super.draw(ctx)
      //   // Визуальный эффект "мигания" перед взрывом
      //   if (Math.random() < 0.1) {
      //     ctx.fillStyle = 'rgba(255, 0, 0, 0.3)'
      //     ctx.beginPath()
      //     ctx.arc(this.x + this.width / 2, this.y + this.height / 2, 30, 0, Math.PI * 2)
      //     ctx.fill()
      //   }
      // }
      update(delta) {
        // Пытаемся получить игрока
        const player = this.getPlayer ? this.getPlayer() : null

        // Если еще не заблокировали цель и игрок существует
        if (!this.targetLocked && player && player.alive) {
          // Рассчитываем направление к игроку
          const dx = (player.x + player.width / 2) - (this.x + this.width / 2)
          const dy = (player.y + player.height / 2) - (this.y + this.height / 2)
          const dist = Math.hypot(dx, dy)

          if (dist > 0) {
            // Нормализуем и умножаем на скорость
            this.vx = (dx / dist) * this.speed
            this.vy = (dy / dist) * this.speed
            this.targetLocked = true
          }
        }

        // Двигаемся
        this.x += this.vx
        this.y += this.vy

        // Анимация
        this.frameTimer += delta
        if (this.frameTimer >= this.frameDelay) {
          this.frame = (this.frame + 1) % 4
          this.frameTimer = 0
        }

        // Проверка столкновения с игроком
        if (player && Physics.isColliding(this, player)) {
          this.explode()
          return
        }

        // Проверка удара о землю
        if (this.y > CanvasManager.height - GameConfig.GROUND_HEIGHT) {
          this.explode()
          return
        }

        // Проверка выхода за границы (удаляем, если улетел слишком далеко)
        if (this.x < -500 || this.x > CanvasManager.width + 500 ||
          this.y < -500 || this.y > CanvasManager.height + 500) {
          this.alive = false
        }
      }

      explode() {
        if (this.vfxManager) {
          this.vfxManager.playGroundExplosion(this.x, this.y)
        }

        const player = this.getPlayer ? this.getPlayer() : null
        if (player && player.alive) {
          const dx = player.x + player.width / 2 - (this.x + this.width / 2)
          const dy = player.y + player.height / 2 - (this.y + this.height / 2)
          const dist = Math.sqrt(dx * dx + dy * dy)

          if (dist < this.explosionRadius) {
            if (!DEBUG.godMode) {
              player.die()
            }
          }
        }

        this.alive = false
      }

      draw(ctx) {
        super.draw(ctx)
        // Визуальный эффект для камикадзе
        if (Math.random() < 0.1) {
          ctx.fillStyle = 'rgba(255, 0, 0, 0.5)'
          ctx.beginPath()
          ctx.arc(this.x + this.width / 2, this.y + this.height / 2, 20, 0, Math.PI * 2)
          ctx.fill()
        }
      }
    }

    class BossDrone extends BaseDrone {
      constructor(assets, entityManager, vfxManager, waveManager) {
        super(CanvasManager.width / 2 - 150, -120, assets, entityManager, vfxManager, waveManager, {
          width: 300,
          height: 260,
          hp: 200,
          maxHp: 400,
          image: assets.get('boss'),
          skipEntryPos: true
        })
        this.canvas = CanvasManager.canvas
        this.maxHp = 400
        this.speed = 2
        this.phase = 1
        this.phaseTimer = 0
        this.spawnTimer = 0
        this.missileTimer = 0
        this.active = false
        this.category = 'boss' // Важно для коллизий
        this.maxMinions = 8
        this.spawnedMinions = 0
      }

      update(delta) {
        // плавный въезд на экран (ускорили в 2 раза)
        if (this.y < 40) {
          this.y += this.speed * 2
        }
        // спавн дронов
        this.phaseTimer += delta
        if (this.hp <= this.maxHp * 0.5 && this.phase === 1) {
          this.phase = 2
          console.log("Boss phase 2 triggered! HP:", this.hp)
        }

        // Фаза 1: редко спавнит дронов
        if (this.phase === 1) {
          this.spawnTimer += delta
          if (this.spawnTimer > 7000) { // 7 секунд
            this.spawnTimer = 0
            if (this.entityManager.getCountByCategory('drone') < 1 + 3) { // 1 босс + 3 миньона
              droneSpawner.spawnNormalDrone()
            }
          }
        }

        // Фаза 2: спавнит чуть чаще
        if (this.phase === 2) {
          this.spawnTimer += delta
          if (this.spawnTimer > 5000) { // 5 секунд
            this.spawnTimer = 0
            if (this.entityManager.getCountByCategory('drone') < 1 + 3) {
              if (Math.random() < 0.6) {
                droneSpawner.spawnNormalDrone()
              } else {
                droneSpawner.spawnGrenadier()
              }
            }
          }
        }

        // ракета
        this.missileTimer += delta
        if (this.missileTimer > 4000) { // УВЕЛИЧИЛИ до 4 секунд
          this.missileTimer = 0
          // Только одна ракета за раз
          // Оптимизация: используем глобальный счетчик или простой лимит
          if (this.entityManager.getCountByCategory('enemyBullet') < 40) {
            this.entityManager.spawn(new Missile(
              this.assetsManager,
              this.x + this.width / 2,
              this.y + this.height,
              player.x + player.width / 2
            ))
          }
        }
      }

      onDeath() {
        super.onDeath()
        // Можно добавить специфичные для босса эффекты
      }

      draw(ctx) {
        if (this.image && this.image.complete) {
          ctx.drawImage(this.image, Math.floor(this.x), Math.floor(this.y), Math.floor(this.width), Math.floor(this.height))
        }

        // Отрисовка его собственного HUD (полоски здоровья)
        if (this.active) {
          const barWidth = 400
          const barHeight = 20
          const x = (this.canvas.width - barWidth) / 2
          const y = 20

          ctx.fillStyle = "rgba(255, 0, 0, 0.3)"
          ctx.fillRect(x, y, barWidth, barHeight)

          const healthPercent = this.hp / this.maxHp
          ctx.fillStyle = "#00ff00"
          ctx.fillRect(x, y, barWidth * healthPercent, barHeight)

          ctx.strokeStyle = "white"
          ctx.lineWidth = 2
          ctx.strokeRect(x, y, barWidth, barHeight)

          ctx.fillStyle = "white"
          ctx.font = "14px 'Press Start 2P', cursive"
          ctx.textAlign = "center"
          ctx.fillText("BOSS: Anomaly", this.canvas.width / 2, y + 40)
        }

        if (DEBUG.showHitboxes) {
          this.uiManager.showHitboxRect(this.x, this.y, this.width, this.height, 'blue')
        }
      }
    }

        if (this.alive) {
          ctx.drawImage(
            this.assetsManager.get('explosion'),
            Math.floor(this.frame * Explosion.FRAME_WIDTH), 0,
            Explosion.FRAME_WIDTH, Explosion.FRAME_HEIGHT,
            Math.floor(this.x - Explosion.FRAME_WIDTH / 2),
            Math.floor(this.y - Explosion.FRAME_HEIGHT / 2),
            Explosion.FRAME_WIDTH,
            Explosion.FRAME_HEIGHT
          );
        }
      }

        this.alive = true
        this.category = 'enemyBullet' // Грены тоже пули врага

      explode() {
        if (this.exploded) return
        this.exploded = true;
        this.vfxManager.playGroundExplosion(this.x, this.y);
        this.alive = false
        // Логика урона по области
        // if (Physics.isColliding(this, player)) {
        //   player.die();
        // }
      }

      update() {
        if (!this.onGround) {
          this.y += this.vy

            this.y = this.canvas.height - this.groundHeight - this.height
            this.onGround = true
          }
          return
        }

        // лежит на земле
        this.timer--

        if (this.timer <= 0 && !this.exploded) {
          this.explode()

          this.alive = false
        }
      }

      draw() {
        const grenadeImg = this.assetsManager.get('grenade')

        if (this.onGround && this.timer < 60) {
          if (Math.floor(this.timer / 10) % 2 === 0) {
            this.ctx.drawImage(grenadeImg, this.x, this.y, this.width, this.height)

            this.ctx.arc(this.x + 10, this.y + 10, 30, 0, Math.PI * 2)

        } else {
          this.ctx.drawImage(grenadeImg, this.x, this.y, this.width, this.height)

    class Weapon {
      constructor() {
        this.name = "Weapon"
        this.magazineSize = 0
        this.magazines = 0
        this.fireRate = 0
        this.reloadTime = 0
        this.auto = false
        this.bulletsPerShot = 1
        this.bulletSpeed = 10
        this.spread = 0

        this.ammoInMagazine = 0
        this.remainingMagazines = 0
        this.lastShotTime = 0
        this.reloading = false
      }

      initAmmo() {
        this.ammoInMagazine = this.magazineSize
        this.remainingMagazines = this.magazines
        this.reloading = false
        this.lastShotTime = 0
      }

      canShoot(now = Date.now()) {
        if (this.reloading) return false
        if (this.ammoInMagazine <= 0) return false
        return now - this.lastShotTime >= this.fireRate;
      }

      consumeShot(now = Date.now()) {
        this.lastShotTime = now
        this.ammoInMagazine--

        if (this.ammoInMagazine <= 0 && this.remainingMagazines > 0) {
          this.reload()
        }
      }

      reload(UI) {
        if (this.reloading) return false
        if (this.remainingMagazines <= 0) return false
        if (this.ammoInMagazine === this.magazineSize) return false

        this.reloading = true
        if (UI) UI.showReloading(true)

        setTimeout(() => {
          this.ammoInMagazine = this.magazineSize
          this.remainingMagazines--
          this.reloading = false

          if (UI) {
            UI.updateAmmo(this)
            UI.updateMagazines(this)
            UI.showReloading(false)
          }
        }, this.reloadTime)

        return true
      }

      getShotAngles() {
        if (this.bulletsPerShot === 1) return [0]

        const angles = []
        const half = (this.bulletsPerShot - 1) / 2
        const step = this.spread / Math.max(1, this.bulletsPerShot - 1)

        for (let i = 0; i < this.bulletsPerShot; i++) {
          angles.push((-this.spread / 2) + i * step)
        }

        return angles
      }

      shoot(player, dirX, dirY) {
        if (!this.canShoot()) return []

        const now = Date.now()
        this.consumeShot(now)

        const baseAngle = Math.atan2(dirY, dirX)
        const shots = []

        for (const offsetDeg of this.getShotAngles()) {
          const angle = baseAngle + (offsetDeg * Math.PI / 180)
          shots.push({
            x: player.x + player.width / 2,
            y: player.y + player.height / 2,
            vx: Math.cos(angle) * this.bulletSpeed,
            vy: Math.sin(angle) * this.bulletSpeed
          })
        }

        return shots
      }
    }

          this.waveManager
        )

        case "pistol":
          return new PistolWeapon()
        case "rifle":
          return new RifleWeapon()
        case "shotgun":
          return new ShotgunWeapon()
        case "machinegun":
          return new MachineGunWeapon()
        default:
          return new PistolWeapon()
      }

    class GameRenderer {
      constructor(groundHeight, assets, backgroundScene, entityManager, getPlayer, textManager) {
        this.canvas = CanvasManager.canvas
        this.ctx = CanvasManager.ctx
        this.groundHeight = groundHeight
        this.assets = assets
        this.backgroundScene = backgroundScene
        this.entityManager = entityManager
        this.getPlayer = getPlayer
        this.textManager = textManager
      }

      clear() {
        this.ctx.clearRect(0, 0, this.canvas.width, this.canvas.height)
      }

      drawBackgroundAndScene() {
        const background = this.assets.get('background')

        if (background.complete) {
          this.ctx.drawImage(background, 0, 0, this.canvas.width, this.canvas.height)
        }

        this.backgroundScene.drawEffects(this.ctx)

        this.ctx.fillStyle = "rgba(0,0,0,0)"
        this.ctx.fillRect(0, this.canvas.height - this.groundHeight, this.canvas.width, this.groundHeight)

        this.backgroundScene.drawDecals(this.ctx)
      }

      drawEntities() {
        const player = this.getPlayer()
        if (player?.alive) {
          player.draw(this.ctx)
        }

        for (const obj of this.entityManager.getAll()) {
          if (obj.alive) {
            obj.draw(this.ctx)
          }
        }
      }

      drawWorld() {
        this.clear()
        this.drawBackgroundAndScene()
        this.drawEntities()
        // this.backgroundScene.initEffects()
      }

      drawPaused(pauseContent) {
        this.drawWorld()

        this.ctx.save()
        this.ctx.fillStyle = "rgba(0,0,0,0.45)"
        this.ctx.fillRect(0, 0, this.canvas.width, this.canvas.height)

        this.ctx.fillStyle = "#ffffff"
        this.ctx.font = "42px 'Press Start 2P'"
        this.ctx.textAlign = "center"
        this.ctx.fillText(pauseContent.title, this.canvas.width / 2, this.canvas.height / 2)

        this.ctx.font = "18px 'Press Start 2P'"
        this.ctx.fillText(pauseContent.text, this.canvas.width / 2, this.canvas.height / 2 + 60)
        this.ctx.restore()
      }

      drawDeathOverlay() {
        this.ctx.save()
        this.ctx.fillStyle = "rgba(0,0,0,0.7)"
        this.ctx.fillRect(0, 0, this.canvas.width, this.canvas.height)

        this.ctx.fillStyle = "red"
        this.ctx.font = "96px 'Press Start 2P'"
        this.ctx.textAlign = "center"
        this.ctx.shadowColor = "black"
        this.ctx.shadowBlur = 10
        this.ctx.fillText(this.textManager.getGameOverMessage().gameOver, this.canvas.width / 2, this.canvas.height / 2)
        this.ctx.restore()
      }

      drawMenu() {
        // Меню на DOM; canvas в состоянии MENU не перерисовываем.
      }

      updateAmbient() {
        this.backgroundScene.updateAmbient()
      }
    }

    // ======================
    // MAIN LOOP
    // ======================
    class GameManager {
      constructor() {
        this.managers = {}
        this.initialized = false
        this.gameState = GameState.MENU
        this.timeScale = 1
        this.groundHeight = GameConfig.GROUND_HEIGHT
      }

      async initialize() {
        if (this.initialized) return

        try {
          this.player = null
          // 1. Сначала создаем все менеджеры в правильном порядке
          this.assets = new AssetManager()
          this.assets.registerGameAssets()
          this.managers.audio = new AudioManager()
          this.managers.text = new TextManager(this.managers.audio)
          this.managers.entity = new EntityManager()

          this.managers.ui = new UIManager(this.managers.text, this.managers.audio, this)

          this.canvas = CanvasManager.canvas
          this.ctx = CanvasManager.ctx
          // 2. Загружаем тексты (асинхронно)
          await this.managers.text.load()

          this.managers.input = new InputManager(this)
          this.managers.vfx = new VFXManager(this.managers.entity, this.managers.audio, this.assets, this.managers.ui)
          this.managers.transition = new TransitionManager()
          // this.managers.droneSpawner = new DroneSpawner(this.managers.entity, null, canvas, this.assets, this.managers.vfx)
          // this.managers.wave = new WaveManager(this.managers.text, this.managers.entity, this.managers.ui, this.managers.droneSpawner)
          // this.managers.droneSpawner.waveManager = this.managers.wave
          this.managers.wave = new WaveManager(
            this.managers.text,
            this.managers.entity,
            this.managers.ui,
            null  // droneSpawner будет установлен позже
          )

          this.managers.droneSpawner = new DroneSpawner(
            this.managers.entity,
            this.managers.wave,
            this.assets,
            this.managers.vfx,
            () => this.player
          )

          this.managers.wave.droneSpawner = this.managers.droneSpawner

          // 3. Создаем менеджеры, зависящие от текстов
          this.managers.score = new ScoreManager(
            () => this.survivalTime,
            () => this.managers.entity
          )
          this.managers.leaderboard = new LeaderboardManager(db, this.managers.ui, this.managers.score)

          // 4. Создаем вспомогательные менеджеры
          // this.managers.droneSpawner = new DroneSpawner(this.managers.entity, this.managers.wave)
          this.managers.collision = new CollisionManager(this.managers.entity, null, this.managers.ui, this.managers.score, this.managers.vfx) // player будет установлен позже
          this.managers.ui.setStartGameCallback(() => this.startGame())

          const backgroundScene = new BackgroundScene(this.groundHeight, this.assets)

          this.renderer = new GameRenderer(
            this.groundHeight,
            this.assets,
            backgroundScene,
            this.managers.entity,
            () => this.player,
            this.managers.text
          )

          // 5. Игровые объекты
          this.survivalTime = 0
          this.gameLoopRunning = true

          // 6. Загружаем ассеты
          await this.preloadAssets()

          // 7. Загружаем лидерборд
          await this.managers.leaderboard.render()

          this.initialized = true
          this.startGameLoop()

        } catch (error) {
          console.error("Failed to initialize game:", error)
        }
      }

      async preloadAssets() {
        // Логика загрузки ассетов
        const interval = setInterval(() => {
          this.managers.ui.setLoadingProgress(this.assets.getProgress() * 100)
        }, 50)

        await this.assets.loadAll()
        clearInterval(interval)
        this.managers.ui.setLoadingProgress(100)
        await new Promise(r => setTimeout(r, 200))
        this.managers.ui.hideLoadingScreen()
      }

      // async loadLeaderboard() {
      //   // Логика загрузки лидерборда
      //   const { data } = await db
      //     .from("leaderboard")
      //     .select("*")
      //     .order("score", { ascending: false })
      //     .limit(5)
      //
      //   this.leaderboard = data
      //   this.managers.score.renderLeaderboard(this.leaderboard)
      // }

      startGameLoop() {
        if (this.gameLoopRunning) {
          this.last = 0
          this.frameCounter = 0
          this.lastFpsFrameCount = 0
          this.fps = 0
          this.gameLoopInstances = 0

          requestAnimationFrame((t) => this.gameLoop(t))
        }
      }

      gameLoop(t) {
        if (!this.gameLoopRunning) {
          setTimeout(() => requestAnimationFrame((t) => this.gameLoop(t)), 100)
          return
        }

        // FPS подсчет
        this.frameCounter++
        if (t - this.lastFrameTime > 1000) {
          this.fps = this.frameCounter - (this.lastFpsFrameCount || 0)
          this.lastFpsFrameCount = this.frameCounter
          this.lastFrameTime = t
        }

        const rawDelta = Math.min(t - this.last, 100)
        const delta = rawDelta * this.timeScale
        this.last = t

        // Обновляем в зависимости от состояния
        switch (this.gameState) {
          case GameState.MENU:
            // this.updateMenu(delta)
            break
          case GameState.GAME:
            this.updateGame(delta)
            break
          case GameState.DIALOG:
            this.renderer.updateAmbient()
            break
          case GameState.PAUSED:
            break
          case GameState.GAME_OVER:
            // this.updateGameOver(delta)
            break
        }

        // Рендерим
        this.render()

        requestAnimationFrame((t) => this.gameLoop(t))
      }

      updatePaused() {
        this.renderer.drawPaused(this.managers.text.getPauseMessage())
      }

      updateGame(delta) {
        this.handlePlayerInput()
        this.updateEntities(delta)
        this.renderer.updateAmbient()
        this.renderer.drawWorld()
        this.managers.collision.update()
        this.managers.entity.cleanup()
        this.survivalTime += delta / 1000
      }

      updateEntities(delta) {
        if (!this.player.alive) {
          this.player.deathTimer -= delta
          if (this.player.deathTimer <= 0) {
            this.endGame()
          }
          return
        }

        this.player.update(delta, this.managers.input)

        if (this.managers.wave.globalEnemyFireCooldown > 0) {
          this.managers.wave.globalEnemyFireCooldown -= delta
        }

        this.managers.wave.update(delta)

        for (const obj of this.managers.entity.getAll()) {
          if (obj.alive) {
            obj.update(delta)
          }
        }
      }

      handlePlayerInput() {
        if (this.player.alive && this.managers.input.isShooting() && this.player.weapon?.auto) {
          const dir = this.managers.input.getShootDirection()
          this.player.fire(dir.dx, dir.dy)
        }
      }

      async startGame() {
        try {
          await this.fadeOutMenu()
          this.initGame()
          await this.startGameSequence()
          await this.animatePlayerIntro()
          await new Promise(resolve => setTimeout(resolve, 500))
          this.managers.ui.showHUD()
          // await this.showCommanderIntro()
          await this.managers.wave.initStages()
          await this.managers.wave.startStage(0)

          const playerNameInput = document.getElementById("nameInput").value.toUpperCase()
          this.playerName = playerNameInput.length >= 3 ? playerNameInput : "AAA"
        } catch (err) {
          console.error("CRITICAL STARTUP ERROR:", err)
        }
      }

      initGame() {
        this.player = new Player(this.managers.ui, this.managers.vfx, this.assets, this.managers.entity, this.managers.audio, this)
        this.managers.collision.player = this.player
        this.player.setWeapon("pistol")
        this.managers.score.reset()
        this.survivalTime = 0
        this.managers.ui.hideHUD()
        this.renderer.backgroundScene.initEffects()
        // this.renderer.drawBackgroundAndScene()
        // this.renderer.drawWorld()
        this.managers.entity.clear()
      }

      async endGame() {
        this.gameState = GameState.GAME_OVER

        this.managers.ui.hideHUD()
        // this.managers.vfx.enableForMenu()
        document.body.classList.remove("hide-cursor")
        this.managers.audio.stopAll()
        this.managers.audio.playMusic('gameover')

        await this.managers.leaderboard.saveCurrentScore(this.playerName)
        // await this.managers.leaderboard.load()
        // this.saveScoreLocal()

        this.managers.ui.showGameOver(this.playerName, this.managers.score.getScore())

        if (this.managers.ui.el.restartBtn) {
          this.managers.ui.el.restartBtn.onclick = () => this.restartGame()
        }
      }

      async restartGame() {
        this.managers.vfx.disableForGame()
        this.initGame()
        this.gameState = GameState.GAME

        const ui = document.getElementById("ui")
        ui.style.display = "none"
        ui.classList.remove("game_over_bg")
        effectsLayer.style.display = "block"

        await this.managers.transition.fadeIn()
        document.body.classList.add("hide-cursor")
        this.managers.entity.clear()
        this.managers.ui.showHUD()
      }

      // async showCommanderIntro() {
      //   await new Promise(r => setTimeout(r, 500))
      //   const msg = this.managers.text.getCommanderIntro()
      //   await this.showCommanderMessage(3000, msg)
      // }


      async startGameSequence() {
        await new Promise(r => setTimeout(r, 500))
        await this.managers.vfx.crossfade(async () => {
          this.managers.ui.el.fade.style.opacity = "0"
          this.managers.ui.el.ui.style.display = "none"
          this.managers.ui.effectsLayer.style.display = "block"

          // Отключаем все визуальные эффекты
          EffectsManager.disableForGame()

          this.gameState = GameState.GAME
        }, 1000)

        await new Promise(r => setTimeout(r, 500))
      }

      async animatePlayerIntro() {
        this.player.x = -this.player.width
        this.player.y = CanvasManager.height - this.groundHeight - this.player.height
        this.player.direction = 1 // идем вправо
        const targetX = CanvasManager.width * 0.1
        const speed = 3

        return new Promise(resolve => {
          const interval = setInterval(() => {
            // “имитация” движения, как при нажатии клавиш
            this.player.vx = speed
            this.player.isMoving = true
            this.player.update()  // обновляем позицию и кадры

            if (this.player.x >= targetX) {
              this.player.x = targetX
              this.player.vx = 0
              this.player.isMoving = false
              this.player.update()
              clearInterval(interval)
              resolve()
            }
          }, 100)
        })
      }


      async fadeOutMenu() {
        await new Promise(resolve => setTimeout(resolve, 500))
        document.body.classList.add("hide-cursor")
        // this.managers.audio.playMusic('ambient')
        await this.managers.transition.fadeOut(500)
      }

      render() {
        switch (this.gameState) {
          case GameState.MENU:
            break
          case GameState.GAME:
            this.renderer.drawWorld()
            break
          case GameState.DIALOG:
            this.renderer.drawWorld()
            break
          case GameState.PAUSED:
            this.updatePaused()
            break
          case GameState.GAME_OVER:
            this.renderer.drawDeathOverlay()
            break
        }
      }
    }

    const game = new GameManager()

    window.addEventListener("load", () => game.initialize())
  </script>
</body>
</html>
