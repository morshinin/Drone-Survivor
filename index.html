<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>Drone Survivor</title>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
  <link href="https://unpkg.com/nes.css@2.3.0/css/nes.min.css" rel="stylesheet" />

  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
  <link rel="manifest" href="/site.webmanifest">

  <style>
    :root {
      --crt-red: rgb(218, 49, 49);
      --crt-green: rgb(112, 159, 115);
      --crt-blue: rgb(40, 129, 206);
    }

    body {
      margin: 0;
      overflow: hidden;
      font-family: "Press Start 2P", monospace;

      background-color: #333;
      color: lime;

      image-rendering: pixelated;
      /*image-rendering: crisp-edges;*/

      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    body::before {
      content: "";
      position: fixed;
      left: 0;
      top: 0;
      width: 100%;
      height: 100%;

      background: rgba(0, 0, 0, 0.15);
    }

    .game_over_bg {
      background-image: url("game_over_bg.png");
      background-size: cover;
    }

    /* Класс для отключения CRT эффектов */
    .no-crt {
      background-image: none !important;
      background-color: transparent !important;
      animation: none !important;
      text-shadow: none !important;
    }

    .no-crt::before,
    .no-crt::after {
      display: none !important;
    }

    #ui {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      flex-direction: column;
      gap: 16px;
      text-align: center;
      padding-top: 20%;
      z-index: 2;
    }

    button {
      padding: 12px 30px;
      font-size: 20px;
      cursor: pointer;
      margin-top: 10px;
    }

    .hide-cursor {
      cursor: none;
    }

    #score {
      position: absolute;
      top: 10px;
      left: 20px;
      font-size: 34px;
      font-weight: bold;
      color: #ffe066;
      text-shadow: 3px 3px black;
      transition: transform 0.15s;
      z-index: 1;
    }

    .score-pop {
      transform: scale(1.25);
    }

    #score-pop {
      position: absolute;
      top: 50px;
      left: 20px;
      font-size: 28px;
      color: #ffff66;
      text-shadow: 2px 2px black;
      opacity: 0;
      transform: translateY(0);
      transition: all 0.4s ease;
    }

    .score-pop-show {
      opacity: 1;
      transform: translateY(-20px);
    }

    #leaderboard {
      margin-top: 20px;
      font-size: 24px;
      line-height: 1.5;
      color: lawngreen;
    }

    #fade {
      position: fixed;
      left: 0;
      top: 0;
      width: 100%;
      height: 100%;
      background: black;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.8s;
      z-index: 999;
    }

    #game-info {
      position: fixed;
      bottom: 15px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 10px;
      color: #aaa;
      text-align: center;
      line-height: 1.6;
      text-shadow: 1px 1px black;
    }

    #game-info a {
      color: #7cff7c;
      text-decoration: none;
    }

    #game-info a:hover {
      text-decoration: underline;
    }

    #loading-screen {
      position: fixed;
      inset: 0;
      background: black;
      z-index: 9999;

      display: flex;
      align-items: center;
      justify-content: center;
    }

    .loading-box {
      width: 300px;
      text-align: center;
      color: white;
    }

    #commander-balloon {
      display: none;
      width: 600px;
      height: 200px;
      position: absolute;
      top: 60px;
      color: #333333;
      text-shadow: none;
      font-size: 16px;
      right: -500px;
      /* за пределами экрана */
      transition: right 0.6s ease-out, opacity .5s;
      z-index: 1000;
    }

    #commander-balloon.show {
      opacity: 1;
    }

    .commander-face {
      display: inline-block;
      width: 100px;
      height: 100px;
      margin-right: 10px;
      vertical-align: middle;
      flex-shrink: 0;
      align-self: flex-end;
    }

    .nes-balloon {
      height: 100%;
      width: 100%;
    }

    .commander-section {
      display: flex;
      height: 100%;
    }

    #game-container {
      position: relative;
      width: 1500px;
      height: 800px;

      border-radius: 30px;
      overflow: hidden;

      box-shadow:
        inset 0 0 80px rgba(0, 0, 0, 0.6),
        inset 0 0 20px rgba(0, 0, 0, 0.8);
    }

    #game-container.no-bg {
      background-image: none !important;
      background-color: transparent;
    }

    #game {
      position: absolute;
      left: 0;
      top: 0;
      z-index: 1;
    }

    #hud {
      position: absolute;
      top: 10px;
      left: 10px;
      z-index: 10;
      color: white;
      font-family: "Press Start 2P", monospace;
      pointer-events: none; /* ВАЖНО: чтобы клики проходили "сквозь" HUD на канвас */
      text-shadow: 2px 2px 2px rgba(0,0,0,0.7);
    }

    .weapon-info {
      position: absolute;
      top: 180px;
      left: 10px;
      font-size: 20px;
    }

    #hud-reloading {
      color: yellow;
      margin-top: 10px;
    }

    .hidden {
      display: none;
    }

    #continueHint {
      opacity: 0;
      margin-top: 10px;
      font-size: 14px;
      animation: blink 1s infinite;
    }

    @keyframes blink {
      0% {
        opacity: 1
      }

      50% {
        opacity: 0.1
      }

      100% {
        opacity: 1
      }
    }
  </style>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

</head>

  <script>

    // ======================

    // ======================
    // SYSTEMS / MANAGERS
    // ======================
    class AssetManager {
      constructor() {
        this.assets = new Map()
        this.promises = []
        this.loadedCount = 0
        this.totalCount = 0
      }

      loadImage(key, src) {
        this.totalCount++
        const img = new Image()
        img.src = src
        const promise = new Promise((resolve, reject) => {
          img.onload = () => {
            this.loadedCount++
            this.assets.set(key, img)
            resolve(img)
          }
          img.onerror = () => {
            console.error(`Failed to load asset: ${key} at ${src}`)
            reject(new Error(`Failed to load ${key}`))
          }
        })
        this.promises.push(promise)
      }

      async loadAll() {
        await Promise.all(this.promises)
      }

      get(key) {
        const asset = this.assets.get(key)
        if (!asset) throw new Error(`Asset not found: ${key}`)
        return asset
      }

      getProgress() {
        return this.totalCount > 0 ? this.loadedCount / this.totalCount : 1
      }
    }

    const assets = new AssetManager()

    assets.loadImage("background", "game_bg.png")
    assets.loadImage("player", "soldier.png")
    assets.loadImage("player_walk", "soldier_walk_sprite.png")
    assets.loadImage("drone", "mavic.png")
    assets.loadImage("drone_bullet", "drone_bullet.png")
    assets.loadImage("boss", "boss.png")
    assets.loadImage("missile", "drone_bullet.png") // Note: same as drone_bullet
    assets.loadImage("tank", "tank.png")
    assets.loadImage("destroyed_city", "destroyed_city.png")
    assets.loadImage("grenade", "grenade.png")
    assets.loadImage("kamikaze", "kamikaze.png")
    assets.loadImage("tank_smoke", "tank_smoke_sprite.png")
    assets.loadImage("city_smoke", "city_smoke.png")
    assets.loadImage("clouds", "clouds_bg.png")
    assets.loadImage("fire", "fire_sprite.png")
    assets.loadImage("explosion", "explosion_sprite.png")
    assets.loadImage("ground_explosion", "ground_explosion_sprite.png")

    const EffectsManager = {
      // Отключить все визуальные эффекты для игры
      disableForGame() {
        const container = document.getElementById('game-container')
        const ui = document.getElementById('ui')

        // Убираем CRT класс и добавляем no-crt
        container.classList.remove('crt')
        container.classList.add('no-crt')

        // Отключаем анимацию UI
        ui.style.animation = 'none'
      },

      // Включить эффекты для меню
      enableForMenu() {
        const container = document.getElementById('game-container')
        const ui = document.getElementById('ui')

        // Возвращаем CRT класс и убираем no-crt
        container.classList.add('crt')
        container.classList.remove('no-crt')

        // Возвращаем анимацию UI
        ui.style.animation = 'glitch1 1s infinite'
      }
    }

    class WaveManager {
      constructor() {
        this.stages = [] // все этапы
        this.currentStageIndex = 0
        this.currentWaveIndex = 0
        this.isActive = false
        this.isPaused = false
        this.pauseTimer = 0
        this.spawnTimer = 0
        this.stageComplete = false
        this.infiniteMode = false
        this.maxDrones = 15
        this.maxBullets = 30

        // Инициализация этапов
        this.initStages()

        this.currentWaveDrones = []
      }

      initStages() {
        // Этап 1: Начало
        this.stages.push(new StageConfig('Начало', {
          startMessage: 'Charlie’s hot, Alpha’s somewhere… probably. Move out.',
          waves: [
            new WaveConfig('Разведка', {
              drones: [{ type: DroneType.NORMAL, count: 5 }],
              pauseAfter: 2000,
              spawnInterval: 800
            }),
            new WaveConfig('Усиление', {
              drones: [{ type: DroneType.NORMAL, count: 7 }],
              pauseAfter: 2500,
              spawnInterval: 700
            }),
            new WaveConfig('Гранатометчики', {
              drones: [
                { type: DroneType.NORMAL, count: 4 },
                { type: DroneType.GRENADIER, count: 3 }
              ],
              pauseAfter: 3000,
              spawnInterval: 900
            })
          ],
          endMessage: '…You’re still up? Huh. That’s… not according to plan.',
          pauseAfter: 4000
        }))

        // Этап 2: Нарастание
        this.stages.push(new StageConfig('Нарастание', {
          startMessage: `Squad, roger that—actually, wait, I didn’t say anything yet.
Anyway, get moving.`,
          waves: [
            new WaveConfig('Волна 1', {
              drones: [
                { type: DroneType.NORMAL, count: 8 },
                { type: DroneType.GRENADIER, count: 2 }
              ],
              pauseAfter: 2500,
              spawnInterval: 600
            }),
            new WaveConfig('Волна 2', {
              drones: [
                { type: DroneType.NORMAL, count: 10 },
                { type: DroneType.GRENADIER, count: 3 },
                { type: DroneType.KAMIKAZE, count: 2 }
              ],
              pauseAfter: 3000,
              spawnInterval: 550
            }),
            new WaveConfig('Волна 3', {
              drones: [
                { type: DroneType.NORMAL, count: 12 },
                { type: DroneType.GRENADIER, count: 4 },
                { type: DroneType.KAMIKAZE, count: 3 }
              ],
              pauseAfter: 3500,
              spawnInterval: 500
            })
          ],
          endMessage: `Well I’ll be damned.
You actually made it, soldier.`,
          pauseAfter: 5000
        }))

        // Этап 3: Тяжелый
        this.stages.push(new StageConfig('Тяжелый', {
          startMessage: `This is Command… I think.
Contact expected. Try not to die immediately.`,
          waves: [
            new WaveConfig('Волна 1', {
              drones: [
                { type: DroneType.NORMAL, count: 15 },
                { type: DroneType.GRENADIER, count: 5 },
                { type: DroneType.KAMIKAZE, count: 3 }
              ],
              pauseAfter: 3000,
              spawnInterval: 450
            }),
            new WaveConfig('Волна 2', {
              drones: [
                { type: DroneType.NORMAL, count: 18 },
                { type: DroneType.GRENADIER, count: 6 },
                { type: DroneType.KAMIKAZE, count: 4 }
              ],
              pauseAfter: 3500,
              spawnInterval: 400
            }),
            new WaveConfig('Волна 3', {
              drones: [
                { type: DroneType.NORMAL, count: 20 },
                { type: DroneType.GRENADIER, count: 7 },
                { type: DroneType.KAMIKAZE, count: 5 }
              ],
              pauseAfter: 4000,
              spawnInterval: 350
            })
          ],
          endMessage: `You’re alive.
I’m marking that as a… success.`,
          pauseAfter: 6000
        }))

        // Этап 4: Босс
        this.stages.push(new StageConfig('Босс', {
          startMessage: `That’s not standard issue…
Who signed off on that thing?`,
          bossWave: true,
          waves: [
            new WaveConfig('Босс и свита', {
              drones: [
                { type: 'boss', count: 1 },
                { type: DroneType.NORMAL, count: 2 },
                { type: DroneType.GRENADIER, count: 1 }
              ],
              pauseAfter: 0,
              spawnInterval: 1200
            })
          ],
          endMessage: `Well… that worked.
Command approves. Probably.`,
          pauseAfter: 8000
        }))

        // Этап 5: Бесконечный режим
        this.stages.push(new StageConfig('Бесконечность', {
          startMessage: `Stay alive, Charlie.`,
          waves: this.generateInfiniteWaves(),
          infiniteMode: true
        }))
      }

      generateInfiniteWaves() {
        const waves = []
        for (let i = 0; i < 100; i++) {
          const difficulty = 1 + i * 0.2
          waves.push(new WaveConfig(`Волна ${i + 1}`, {
            drones: [
              { type: DroneType.NORMAL, count: Math.floor(10 * difficulty) },
              { type: DroneType.GRENADIER, count: Math.floor(3 * difficulty) },
              { type: DroneType.KAMIKAZE, count: Math.floor(2 * difficulty) }
            ],
            pauseAfter: 3000,
            spawnInterval: Math.max(200, 500 - i * 10)
          }))
        }
        return waves
      }

      startStage(index) {
        if (index >= this.stages.length) {
          if (this.infiniteMode) {
            this.startInfiniteMode()
          }
          return
        }

        const stage = this.stages[index]

        // ВАЖНО: сбрасываем все счетчики перед стартом этапа
        this.currentStageIndex = index
        this.currentWaveIndex = 0
        this.isActive = true
        this.stageComplete = false
        this.isPaused = false
        this.pauseTimer = 0
        this.spawnTimer = 0
        this.currentWaveSpawnCount = 0
        this.currentWaveDrones = []

        this.isActive = false // ВАЖНО

        if (stage.startMessage) {
          // Показываем сообщение, затем запускаем волну
          showCommanderMessage(5000, stage.startMessage).then(() => {
            this.isActive = true
            this.startCurrentWave()
          })
        } else {
          // Нет сообщения — сразу запускаем
          this.isActive = true
          this.startCurrentWave()
        }
      }

      // Запустить текущую волну
      startCurrentWave() {
        const stage = this.stages[this.currentStageIndex]

        if (this.currentWaveIndex >= stage.waves.length) {
          this.completeStage()
          return
        }

        const wave = stage.waves[this.currentWaveIndex]

        // ПРИНУДИТЕЛЬНОЕ ГЛУБОКОЕ КОПИРОВАНИЕ
        this.currentWaveDrones = JSON.parse(JSON.stringify(wave.drones))

        // Сохраняем общее количество дронов в волне как константу
        this.totalWaveDrones = this.currentWaveDrones.reduce((sum, d) => sum + d.count, 0)

        this.isPaused = false
        this.spawnTimer = 0
        this.currentWaveSpawnCount = 0
      }

      // Завершить этап
      completeStage() {
        const stage = this.stages[this.currentStageIndex]

        this.isActive = false
        this.stageComplete = true
        this.pauseTimer = 0
        this.spawnTimer = 0
        this.currentWaveSpawnCount = 0
        this.currentWaveDrones = []

        const nextStage = () => {
          this.currentStageIndex++
          this.currentWaveIndex = 0 // ВАЖНО: сбрасываем индекс волны!
          if (this.currentStageIndex < this.stages.length) {
            this.startStage(this.currentStageIndex)
          } else {
            this.startInfiniteMode()
          }
        }

        if (stage.endMessage) {
          showCommanderMessage(5000, stage.endMessage).then(() => {
            if (stage.bossWave) {
              this.startInfiniteMode()
            } else {
              nextStage()
            }
          })
        } else {
          nextStage()
        }
      }

      // Запустить бесконечный режим
      startInfiniteMode() {
        this.infiniteMode = true
        this.currentStageIndex = this.stages.length - 1
        this.currentWaveIndex = 0
        this.isActive = true

        const stage = this.stages[this.currentStageIndex]
        if (stage.startMessage) {
          showCommanderMessage(5000, stage.startMessage).then(() => {
            this.startCurrentWave()
          })
        }
      }

      // Обновление (вызывать в gameLoop)
      update(delta) {
        if (!this.isActive) return

        // Проверяем индекс этапа
        if (this.currentStageIndex >= this.stages.length) {
          this.isActive = false
          return
        }

        const stage = this.stages[this.currentStageIndex]
        if (!stage) {
          this.isActive = false
          return
        }

        // ===== ФАЗА ПАУЗЫ МЕЖДУ ВОЛНАМИ =====
        if (this.isPaused) {
          this.pauseTimer += delta
          const prevWave = stage.waves[this.currentWaveIndex - 1]

          if (prevWave && this.pauseTimer >= prevWave.pauseAfter) {
            this.isPaused = false
            this.spawnTimer = 0
            this.startCurrentWave()
          }
          return
        }

        // Проверяем индекс волны
        if (this.currentWaveIndex >= stage.waves.length) {
          this.completeStage()
          return
        }

        const wave = stage.waves[this.currentWaveIndex]
        const totalDrones = this.totalWaveDrones || 0

        // ===== ФАЗА 1: СПАВН — пока не заспавнены все дроны =====
        if (this.currentWaveSpawnCount < totalDrones) {
          this.spawnTimer += delta
          if (this.spawnTimer >= wave.spawnInterval) {
            this.spawnTimer = 0
            this.spawnNextDrone()
          }
          return
        }

        // ===== ФАЗА 2: ОЖИДАНИЕ — все заспавнены, ждём гибели =====
        // Проверяем каждый кадр (не через spawnTimer), чтобы не пропустить момент
        const alive = entityManager.getCountByCategory('drone')

        if (alive === 0) {
          this.currentWaveIndex++

          if (this.currentWaveIndex < stage.waves.length) {
            this.isPaused = true
            this.pauseTimer = 0
          } else {
            this.completeStage()
          }
        }
      }

      // Получить общее количество дронов в волне

        let typeEntry = this.currentWaveDrones.find(d => d.type === 'boss' && d.count > 0)

        if (!typeEntry) {

        this.currentWaveDrones.map(d => `${d.type}:${d.count}`).join(', ')

        this.spawnDroneByType(typeEntry.type)
      }

      spawnDroneByType(type) {
        switch (type) {

          case DroneType.GRENADIER:
            return droneSpawner.spawnGrenadier()
          case DroneType.KAMIKAZE:

          case 'boss':

        }

    class AudioManager {
      constructor() {
        this.musicEnabled = true
        this.sfxEnabled = true
        this.musicVolume = 0.2
        this.sfxVolume = 0.4

        this.music = {}
        this.sfx = {}
        this.currentMusic = null

        this.loadSettings()
      }

      registerMusic(name, src, { loop = false, volume = this.musicVolume } = {}) {
        const audio = new Audio(src)
        audio.loop = loop
        audio.volume = volume
        this.music[name] = audio
        return audio
      }

      registerSfx(name, src, { volume = this.sfxVolume } = {}) {
        const audio = new Audio(src)
        audio.volume = volume
        this.sfx[name] = audio
        return audio
      }

      playMusic(name, { restart = true } = {}) {
        if (!this.musicEnabled) return

        const track = this.music[name]
        if (!track) return

        if (this.currentMusic && this.currentMusic !== track) {
          this.stopCurrentMusic()
        }

        this.currentMusic = track

        if (restart) {
          track.currentTime = 0
        }

        track.volume = this.musicVolume
        track.play().catch(() => {})
      }

      stopCurrentMusic() {
        if (!this.currentMusic) return
        this.currentMusic.pause()
        this.currentMusic.currentTime = 0
        this.currentMusic = null
      }

      pauseCurrentMusic() {
        if (!this.currentMusic) return
        this.currentMusic.pause()
      }

      resumeCurrentMusic() {
        if (!this.currentMusic) return
        if (!this.musicEnabled) return
        this.currentMusic.play().catch(() => {})
      }

      playSfx(name, volume = null) {
        if (!this.sfxEnabled) return

        const base = this.sfx[name]
        if (!base) return

        const sound = base.cloneNode()
        sound.volume = volume ?? this.sfxVolume
        sound.play().catch(() => {})
      }

      setMusicEnabled(value) {
        this.musicEnabled = Boolean(value)
        this.saveSettings()

        if (!this.musicEnabled) {
          this.stopCurrentMusic()
        }
      }

      setSfxEnabled(value) {
        this.sfxEnabled = Boolean(value)
        this.saveSettings()
      }

      setMusicVolume(value) {
        this.musicVolume = Math.max(0, Math.min(1, value))
        this.saveSettings()

        if (this.currentMusic) {
          this.currentMusic.volume = this.musicVolume
        }
      }

      setSfxVolume(value) {
        this.sfxVolume = Math.max(0, Math.min(1, value))
        this.saveSettings()
      }

      stopAll() {
        this.stopCurrentMusic()
      }

      loadSettings() {
        const saved = localStorage.getItem('audioSettings')
        if (!saved) return

        try {
          const data = JSON.parse(saved)

          if (typeof data.musicEnabled === 'boolean') {
            this.musicEnabled = data.musicEnabled
          }

          if (typeof data.sfxEnabled === 'boolean') {
            this.sfxEnabled = data.sfxEnabled
          }

          if (typeof data.musicVolume === 'number') {
            this.musicVolume = data.musicVolume
          }

          if (typeof data.sfxVolume === 'number') {
            this.sfxVolume = data.sfxVolume
          }
        } catch (error) {
          console.warn('Failed to load audio settings', error)
        }
      }

      saveSettings() {
        localStorage.setItem('audioSettings', JSON.stringify({
          musicEnabled: this.musicEnabled,
          sfxEnabled: this.sfxEnabled,
          musicVolume: this.musicVolume,
          sfxVolume: this.sfxVolume,
        }))
      }
    }

    class TextManager {
      constructor(audio) {
        this.audio = audio
      }

      splitIntoPages(text, maxChars = 140) {
        const words = text.split(" ")
        const pages = []
        let current = ""

        for (const word of words) {
          if ((current + word).length > maxChars) {
            pages.push(current.trim())
            current = ""
          }
          current += word + " "
        }

        if (current.length) pages.push(current.trim())
        return pages
      }

      async typeToElement(element, text, speed = 25) {
        element.textContent = ""
        let skip = false

        const skipHandler = (e) => {
          if (e.code === "Enter") skip = true
        }

        window.addEventListener("keydown", skipHandler)
        for (let i = 0; i < text.length; i++) {
          element.textContent += text[i]

          if (i % 3 === 0 && text[i] !== " ") {
            this.audio.playSfx('typewriter')
          }

          if (skip) {
            element.textContent = text
            break
          }

          await new Promise(r => setTimeout(r, speed))
        }

        window.removeEventListener("keydown", skipHandler)
      }
    }

    /**
     * Менеджер подсчёта очков и достижений игрока.
     * Централизует логику начисления очков за разные действия и проверку достижений.
     */
    class ScoreManager {
      constructor(getSurvivalTime, getEntityManager) {
        this._score = 0;
        this._getSurvivalTime = getSurvivalTime;
        this._getEntityManager = getEntityManager;
        this._achievements = new Map(); // id -> { id, name, unlocked, unlockedAt }
      }

      // --- Подсчёт очков ---

      /**
       * Рассчитывает очки за уничтожение дрона/босса.
       * Множители: время выживания (до 5x) и количество врагов на экране (до 4x).
       */
      calculateDroneScore(drone) {
        const survivalTime = this._getSurvivalTime();
        const droneCount = this._getEntityManager().getCountByCategory('drone');
        const rawScore = drone.scoreValue *
          (1 + Math.min(survivalTime / 60, 5)) *
          (1 + Math.min(droneCount / 20, 4));
        return Math.floor(rawScore);
      }

      addScore(amount) {
        this._score += amount;
        return this._score;
      }

      getScore() {
        return this._score;
      }

      reset() {
        this._score = 0;
      }

      // --- Достижения (заготовка на будущее) ---

      registerAchievement(id, name) {
        if (!this._achievements.has(id)) {
          this._achievements.set(id, { id, name, unlocked: false, unlockedAt: null });
        }
      }

      unlockAchievement(id) {
        const a = this._achievements.get(id);
        if (a && !a.unlocked) {
          a.unlocked = true;
          a.unlockedAt = this._getSurvivalTime();
          return true;
        }
        return false;
      }

      getUnlockedAchievements() {
        return [...this._achievements.values()].filter(a => a.unlocked);
      }
    }

    class Physics {
      static isColliding(a, b) {
        if (!a || !b || !a.alive || !b.alive) return false;

        const w1 = a.width || a.size || 0;
        const h1 = a.height || a.size || 0;
        const w2 = b.width || b.size || 0;
        const h2 = b.height || b.size || 0;

        return a.x < b.x + w2 &&
          a.x + w1 > b.x &&
          a.y < b.y + h2 &&
          a.y + h1 > b.y;
      }

      // В будущем сюда можно добавить другие функции:
      // static distance(a, b) { ... }
      // static clamp(value, min, max) { ... }
      // static normalize(vector) { ... }
    }

    class CollisionManager {
      constructor(entityManager, player) {
        this.entityManager = entityManager;
        this.player = player;
      }

      update() {
        this.checkPlayerBulletsVsDrones();
        this.checkEnemyProjectiles();
      }

      checkPlayerBulletsVsDrones() {
        const bullets = this.entityManager.getByCategory('bullet')
        const drones = this.entityManager.getByCategory('drone')
        const bosses = this.entityManager.getByCategory('boss')

        const allTargets = [...drones, ...bosses]

        for (const bullet of bullets) {
          if (!bullet.alive) continue;
          for (const drone of allTargets) {
            if (!drone.alive) continue;

            if (Physics.isColliding(bullet, drone)) {
              bullet.alive = false;
              if (drone.takeDamage(1)) {
                drone.onDeath();
                const gained = scoreManager.calculateDroneScore(drone);
                scoreManager.addScore(gained);
                UI.updateScore(scoreManager.getScore());
              }
              break; // Пуля попала, нет смысла проверять её дальше
            }
          }
        }
      }

      checkEnemyProjectiles() {
        const enemyProjectiles = this.entityManager.getByCategory('enemyBullet');

        for (const projectile of enemyProjectiles) {
          if (!projectile.alive) continue;

          // Проверка на столкновение с землей
          if (projectile.y > canvas.height - groundHeight) {
            if (typeof projectile.explode === 'function') {
              projectile.explode(); // Для камикадзе, у которых есть метод explode
            } else {
              vfxManager.playGroundExplosion(projectile.x, projectile.y);
            }
            projectile.alive = false;
            continue;
          }

          // Проверка на столкновение с игроком
          if (this.player.alive && Physics.isColliding(projectile, this.player)) {
            if (typeof projectile.explode === 'function') {
              projectile.explode();
            }
            this.player.die();
            projectile.alive = false;
          }
        }
      }
    }

    class AnimatedSprite {
      constructor(x, y, image, options = {}) {
        this.x = x
        this.y = y
        this.image = image

        // Параметры спрайта
        this.columns = options.columns || 2
        this.totalFrames = options.totalFrames || 58
        this.frameDelay = options.frameDelay || 8
        this.width = options.width || (image.width / this.columns)
        this.height = options.height || (image.height / (this.totalFrames / this.columns))
        this.scale = options.scale || 1.0
        this.opacity = options.opacity || 1.0
        this.loop = options.loop !== undefined ? options.loop : true

        // Кэшируем вычисления размеров
        this.sw = this.image.width / this.columns
        this.sh = this.image.height / Math.ceil(this.totalFrames / this.columns)
        this.dw = this.width * (this.scale || 1.0)
        this.dh = this.height * (this.scale || 1.0)

        // Вычисляем количество строк
        this.rows = Math.ceil(this.totalFrames / this.columns)

        this.timer = 0
        this.frame = options.startFrame || 0
        this.alive = true
      }

      update() {
        this.timer++

        if (this.timer >= this.frameDelay) {
          let nextFrame = this.frame + 1

          if (nextFrame >= this.totalFrames) {
            if (this.loop) {
              nextFrame = 0
            } else {
              this.alive = false
              return
            }
          }

          this.frame = nextFrame
          this.timer = 0
        }
      }

      draw(ctx) {
        if (!this.image || !this.image.complete || !this.alive) return

        const col = this.frame % this.columns
        const row = Math.floor(this.frame / this.columns)

        const hasOpacity = this.opacity < 1.0
        if (hasOpacity) {
          ctx.save()
          ctx.globalAlpha = this.opacity
        }

        ctx.drawImage(
          this.image,
          Math.floor(col * this.sw),
          Math.floor(row * this.sh),
          Math.floor(this.sw),
          Math.floor(this.sh),
          Math.floor(this.x),
          Math.floor(this.y),
          Math.floor(this.dw),
          Math.floor(this.dh)
        )

        if (hasOpacity) {
          ctx.restore()
        } else {
          // Гарантируем сброс альфы, если не использовали save/restore
          ctx.globalAlpha = 1.0
        }
      }

      // setFrame(frame) {
      //   this.frame = Math.min(frame, this.totalFrames - 1)
      // }
      //
      // restart() {
      //   this.frame = 0
      //   this.timer = 0
      //   this.alive = true
      // }
    }

            scale: 1.2,
            opacity: 0.4,
            loop: true
          })
        } else {
          tankSmokeSprite.onload = () => {
            this.tankSmoke = new AnimatedSprite(1200, 550, tankSmokeSprite, {
              columns: 2,
              totalFrames: 58,
              frameDelay: 8,
              scale: 1.2,
              opacity: 0.4,
              loop: true
            })
          }
        }

      initFire() {
        const fireSprite = this.assets.get('fire')

        if (fireSprite.complete) {
          this.cityFire = new AnimatedSprite(100, 600, fireSprite, {
            columns: 2,
            totalFrames: 8,
            frameDelay: 8,
            scale: 1,
            opacity: 0.9,
            width: 144,
            height: 144,
            loop: true
          })
        } else {
          fireSprite.onload = () => {
            this.cityFire = new AnimatedSprite(100, 600, fireSprite, {
              columns: 2,
              totalFrames: 8,
              frameDelay: 8,
              scale: 1,
              opacity: 0.9,
              width: 144,
              height: 144,
              loop: true
            })
          }
        }

      updateAmbient() {
        if (this.tankSmoke?.alive) this.tankSmoke.update()
        if (this.citySmoke?.alive) this.citySmoke.update()
        if (this.cityFire?.alive) this.cityFire.update()
      }

      drawEffects(ctx) {
        if (this.tankSmoke?.alive) this.tankSmoke.draw(ctx)
        if (this.citySmoke?.alive) this.citySmoke.draw(ctx)
        if (this.cityFire?.alive) this.cityFire.draw(ctx)

          ctx.drawImage(
            destroyedCityImg,
            this.destroyedCity.x,
            this.destroyedCity.y,

    const DroneType = {
      NORMAL: 'normal',
      GRENADIER: 'grenadier',
      KAMIKAZE: 'kamikaze'
    }

    // ======================
    // ENTITIES
    // ======================
    class Player {
      constructor() {
        this.x = 0
        this.y = 0
        this.width = 100
        this.height = 130

        this.speed = 3.8
        this.direction = 1

        this.walkSprite = assets.get('player_walk')
        this.frame = 0
        this.frameTimer = 0
        this.isMoving = false

        this.vx = 0
        this.acceleration = 0.45
        this.friction = 0.88

        this.alive = true
        this.deathTimer = 2000
        this.weapon = null
      }

      setWeapon(type) {
        this.weapon = createWeapon(type)
        UI.updateWeapon(this.weapon)
        this.weapon.reloading = false
      }

      fire(dirX, dirY) {
        if (!this.weapon) return
        if (dirX === 0 && dirY === 0) return

        const shots = this.weapon.shoot(this, dirX, dirY)
        if (shots.length === 0) return

        UI.updateAmmo(this.weapon)

        switch (this.weapon.name) {
          case "Pistol":
            audio.playSfx("pistol_shot", 0.4)
            break
          case "Assault Rifle":
            audio.playSfx("rifle_shot", 0.4)
            break
          case "Shotgun":
            audio.playSfx("shotgun_shot", 0.4)
            break
          case "Machine Gun":
            audio.playSfx("machinegun_shot", 0.4)
            break
        }

        for (const s of shots) {
          entityManager.spawn(new Bullet(s.x, s.y, s.vx, s.vy))
        }
      }

      reload() {
        if (!this.weapon) return
        if (this.weapon.reloading) return

        const started = this.weapon.reload(UI)
        if (!started) return

        switch (this.weapon.name) {
          case "Pistol":
            audio.playSfx("pistol_reload", 0.5)
            break
          case "Assault Rifle":
            audio.playSfx("rifle_reload", 0.5)
            break
          case "Shotgun":
            audio.playSfx("shotgun_reload", 0.5)
            break
          case "Machine Gun":
            audio.playSfx("machinegun_reload", 0.5)
            break
        }
      }

      die() {
        if (DEBUG.godMode) return
        player.alive = false

        timeScale = 0.25

        vfxManager.playExplosion(
          player.x + player.width / 2,
          player.y + player.height / 2
        )

        audio.stopAll()
        audio.playSfx('death')
      }

      update(delta, input = null) {
        if (input) {
          if (input.isShooting()) {
            this.vx *= 0
          }

          const moveDirection = input.getMoveDirection()
          if (moveDirection !== 0) {
            this.vx += this.acceleration * moveDirection
            this.direction = moveDirection
          }
        }

        if (this.vx > this.speed) this.vx = this.speed
        if (this.vx < -this.speed) this.vx = -this.speed

        this.vx *= this.friction

        this.x += this.vx
        this.isMoving = Math.abs(this.vx) > 0.1

        if (this.x < 0) this.x = 0
        if (this.x + this.width > canvas.width)
          this.x = canvas.width - this.width

        if (this.isMoving) {

          this.frameTimer++

          if (this.frameTimer > 15) {
            this.frame++
            this.frameTimer = 0
          }

          if (this.frame >= WALK_FRAMES) {
            this.frame = 0
          }
        } else {
          this.frame = 0
        }
      }

      draw() {
        ctx.save()

        if (this.direction === -1) {
          ctx.scale(-1, 1)

          ctx.drawImage(
            this.walkSprite,
            this.frame * WALK_FRAME_WIDTH,
            0,
            WALK_FRAME_WIDTH,
            WALK_FRAME_HEIGHT,
            -this.x - this.width,
            this.y,
            this.width,
            this.height
          )
        } else {
          ctx.drawImage(
            this.walkSprite,
            this.frame * WALK_FRAME_WIDTH,
            0,
            WALK_FRAME_WIDTH,
            WALK_FRAME_HEIGHT,
            this.x,
            this.y,
            this.width,
            this.height
          )
        }
        ctx.restore()

        if (DEBUG.showHitboxes) {
          UI.showHitboxRect(this.x, this.y, this.width, this.height, 'lime')
        }
      }
    }

    class BaseDrone {
      constructor(x, y, options = {}) {
        this.x = x
        this.y = y
        this.width = options.width || 80
        this.height = options.height || 60
        this.speed = options.speed || (Math.random() * 2 + 1)
        this.direction = options.direction || (Math.random() < 0.5 ? 1 : -1)

        // Позиция зависит от направления, если не указано иное
        if (!options.skipEntryPos) {
          if (this.direction > 0) {
            this.x = -this.width
          } else {
            this.x = canvas.width + this.width
            this.speed = -this.speed
          }
        }

        this.category = 'drone'

        this.hp = options.hp || 1
        this.maxHp = options.hp || 1
        this.scoreValue = options.scoreValue || 10
        this.damage = options.damage || 1

        this.alive = true
        this.type = options.type || 'base'

        // Анимация
        this.frame = 0
        this.frameTimer = 0
        this.frameDelay = options.frameDelay || 8

        // Изображение
        this.image = options.image || assets.get('drone')
      }

      update(delta) {
        // Базовое движение
        this.x += this.speed

        // Разворот при достижении края
        if (this.x < -this.width || this.x > canvas.width + this.width) {
          this.speed *= -1
        }

        // Легкое покачивание
        this.y += Math.sin(performance.now() * 0.003) * 0.3

        // Анимация
        this.frameTimer += delta
        if (this.frameTimer >= this.frameDelay) {
          this.frame = (this.frame + 1) % 4 // 4 кадра анимации
          this.frameTimer = 0
        }

        // ВАЖНО: Дополнительный fail-safe для выхода за границы (например, если дрон ушел слишком высоко)
        if (this.y < -500 || this.y > canvas.height + 500) {
          this.alive = false
        }
      }

      draw(ctx) {
        ctx.save()
        ctx.globalAlpha = this.getOpacity()

        // Рисуем как в старом коде - целое изображение
        if (this.image && this.image.complete) {
          ctx.drawImage(
            this.image,
            Math.floor(this.x),
            Math.floor(this.y),
            Math.floor(this.width),
            Math.floor(this.height)
          )
        } else {
          // Запасной вариант
          ctx.fillStyle = this.getColor()
          ctx.fillRect(Math.floor(this.x), Math.floor(this.y), Math.floor(this.width), Math.floor(this.height))
        }

        // Полоска здоровья для сильных дронов
        if (this.maxHp > 1) {
          this.drawHealthBar(ctx)
        }

        if (DEBUG.showHitboxes) {
          UI.showHitboxRect(this.x, this.y, this.width, this.height, 'yellow')
        }
      }

      drawHealthBar(ctx) {
        const barWidth = this.width
        const barHeight = 5
        const healthPercent = this.hp / this.maxHp

        ctx.fillStyle = 'rgba(255, 0, 0, 0.5)'
        ctx.fillRect(this.x, this.y - 10, barWidth, barHeight)

        ctx.fillStyle = '#0f0'
        ctx.fillRect(this.x, this.y - 10, barWidth * healthPercent, barHeight)
      }

      getColor() {
        switch (this.type) {
          case 'normal': return '#ff4444'
          case 'grenadier': return '#ff8800'
          case 'kamikaze': return '#ff00ff'
          default: return '#ff0000'
        }
      }

      getOpacity() {
        return 1.0
      }

      takeDamage(amount) {
        this.hp -= amount

        if (this.hp <= 0) {
          this.alive = false
          return true
        }
        return false
      }

      onDeath() {
        // Эффект при смерти
        vfxManager.playExplosion(this.x + this.width / 2, this.y + this.height / 2)
      }
    }

    class NormalDrone extends BaseDrone {
      constructor(y) {
        super(0, y, {
          type: 'normal',
          width: 80,
          height: 60,
          hp: 1,
          scoreValue: 10,
          frameDelay: 8,
        })

        this.fireTimer = Math.random() * 1000
        this.fireCooldown = 800 + Math.random() * 1200
      }

      update(delta) {
        super.update(delta)

        this.fireTimer += delta

        if (this.fireTimer >= this.fireCooldown &&
          globalEnemyFireCooldown <= 0) {
          this.shoot()
        }
      }

      shoot() {
        this.fireTimer = 0
        if (entityManager.getCountByCategory('enemyBullet') < waveManager.maxBullets) {
          entityManager.spawn(new EnemyBullet(
            this.x + this.width / 2,
            this.y + this.height
          ))

          globalEnemyFireCooldown = 1800 + Math.random() * 400
        }

        this.fireCooldown = 1800 + Math.random() * 1200
      }
    }

    class GrenadierDrone extends BaseDrone {
      constructor(y) {
        super(0, y, {
          type: 'grenadier',
          width: 90,
          height: 70,
          hp: 2,
          scoreValue: 25,
          frameDelay: 10,
        })

        this.dropTimer = 120 + Math.random() * 120
        this.grenadeCooldown = 3000
      }

      update(delta) {
        super.update(delta)

        // Сброс гранат
        this.dropTimer -= delta
        if (this.dropTimer <= 0) {
          this.dropGrenade()
          this.dropTimer = this.grenadeCooldown + Math.random() * 1000
        }
      }

      dropGrenade() {
        entityManager.spawn(new Grenade(this.x, this.y))
      }

      draw(ctx) {
        super.draw(ctx)
        // Дополнительная отметка для гранатометчика
        ctx.fillStyle = 'orange'
        ctx.beginPath()
        ctx.arc(this.x + this.width - 10, this.y + 10, 5, 0, Math.PI * 2)
        ctx.fill()
      }
    }

    class KamikazeDrone extends BaseDrone {
      constructor() {
        // Случайная стартовая позиция
        const side = Math.random()
        let x, y

        if (side < 0.25) {
          x = -50
          y = Math.random() * 200
        } else if (side < 0.5) {
          x = canvas.width + 50
          y = Math.random() * 200
        } else {
          x = Math.random() * canvas.width
          y = -50
        }

        super(x, y, {
          type: 'kamikaze',
          width: 60,
          height: 60,
          hp: 1,
          scoreValue: 30,
          speed: 4,
          frameDelay: 6,
          image: assets.get('kamikaze')
        })

        // Расчет направления к игроку
        const dx = player.x - this.x
        const dy = player.y - this.y
        const dist = Math.hypot(dx, dy)

        this.vx = dx / dist * this.speed
        this.vy = dy / dist * this.speed

        this.explosionRadius = 80
      }

      update(delta) {
        // Камикадзе не использует базовое движение
        this.x += this.vx
        this.y += this.vy

        this.frameTimer += delta
        if (this.frameTimer >= this.frameDelay) {
          this.frame = (this.frame + 1) % 4
          this.frameTimer = 0
        }

        // Проверка столкновения с игроком
        if (Physics.isColliding(this, player)) {
          this.explode()
        }

        // Проверка удара о землю
        if (this.y > canvas.height - groundHeight) {
          this.explode()
        }

        // ВАЖНО: Проверка выхода за боковые границы или слишком высоко вверх
        if (this.x < -200 || this.x > canvas.width + 200 || this.y < -300) {
          this.alive = false
        }
      }

      explode() {
        vfxManager.playGroundExplosion(this.x, this.y)

        // Проверка урона игроку
        const dx = player.x + player.width / 2 - (this.x + this.width / 2)
        const dy = player.y + player.height / 2 - (this.y + this.height / 2)
        const dist = Math.sqrt(dx * dx + dy * dy)

        if (dist < this.explosionRadius) {
          if (!DEBUG.godMode && player.alive) {
            player.die()
          }
        }

        this.alive = false
      }

      draw(ctx) {
        super.draw(ctx)
        // Визуальный эффект "мигания" перед взрывом
        if (Math.random() < 0.1) {
          ctx.fillStyle = 'rgba(255, 0, 0, 0.3)'
          ctx.beginPath()
          ctx.arc(this.x + this.width / 2, this.y + this.height / 2, 30, 0, Math.PI * 2)
          ctx.fill()
        }
      }
    }

    class BossDrone extends BaseDrone {
      constructor() {
        super(canvas.width / 2 - 150, -120, {
          width: 300,
          height: 260,
          hp: 200,
          image: assets.get('boss'),
          skipEntryPos: true
        })
        this.maxHp = 400
        this.speed = 2
        this.phase = 1
        this.phaseTimer = 0
        this.spawnTimer = 0
        this.missileTimer = 0
        this.active = false
        this.category = 'boss' // Важно для коллизий
        this.maxMinions = 8
        this.spawnedMinions = 0
      }

      update(delta) {
        // плавный въезд на экран (ускорили в 2 раза)
        if (this.y < 40) {
          this.y += this.speed * 2
        }
        // спавн дронов
        this.phaseTimer += delta
        if (this.hp <= this.maxHp * 0.5 && this.phase === 1) {
          this.phase = 2
          console.log("Boss phase 2 triggered! HP:", this.hp)
        }

        // Фаза 1: редко спавнит дронов
        if (this.phase === 1) {
          this.spawnTimer += delta
          if (this.spawnTimer > 7000) { // 7 секунд
            this.spawnTimer = 0
            if (entityManager.getCountByCategory('drone') < 1 + 3) { // 1 босс + 3 миньона
              droneSpawner.spawnNormalDrone()
            }
          }
        }

        // Фаза 2: спавнит чуть чаще
        if (this.phase === 2) {
          this.spawnTimer += delta
          if (this.spawnTimer > 5000) { // 5 секунд
            this.spawnTimer = 0
            if (entityManager.getCountByCategory('drone') < 1 + 3) {
              if (Math.random() < 0.6) {
                droneSpawner.spawnNormalDrone()
              } else {
                droneSpawner.spawnGrenadier()
              }
            }
          }
        }

        // ракета
        this.missileTimer += delta
        if (this.missileTimer > 4000) { // УВЕЛИЧИЛИ до 4 секунд
          this.missileTimer = 0
          // Только одна ракета за раз
          // Оптимизация: используем глобальный счетчик или простой лимит
          if (entityManager.getCountByCategory('enemyBullet') < 40) {
            entityManager.spawn(new Missile(
              this.x + this.width / 2,
              this.y + this.height,
              player.x + player.width / 2
            ))
          }
        }
      }

      onDeath() {
        super.onDeath()
        // Можно добавить специфичные для босса эффекты
      }

      draw(ctx) {
        if (this.image && this.image.complete) {
          ctx.drawImage(this.image, Math.floor(this.x), Math.floor(this.y), Math.floor(this.width), Math.floor(this.height))
        }

        // Отрисовка его собственного HUD (полоски здоровья)
        if (this.active) {
          const barWidth = 400
          const barHeight = 20
          const x = (canvas.width - barWidth) / 2
          const y = 20

          ctx.fillStyle = "rgba(255, 0, 0, 0.3)"
          ctx.fillRect(x, y, barWidth, barHeight)

          const healthPercent = this.hp / this.maxHp
          ctx.fillStyle = "#00ff00"
          ctx.fillRect(x, y, barWidth * healthPercent, barHeight)

          ctx.strokeStyle = "white"
          ctx.lineWidth = 2
          ctx.strokeRect(x, y, barWidth, barHeight)

          ctx.fillStyle = "white"
          ctx.font = "14px 'Press Start 2P', cursive"
          ctx.textAlign = "center"
          ctx.fillText("BOSS: Anomaly", canvas.width / 2, y + 40)
        }

        if (DEBUG.showHitboxes) {
          UI.showHitboxRect(this.x, this.y, this.width, this.height, 'blue')
        }
      }
    }

    class Bullet {
      constructor(x, y, dx, dy) {
        this.x = x
        this.y = y
        this.vx = dx
        this.vy = dy
        this.size = 6 // Размер пули
        this.width = 6
        this.height = 6
        this.alive = true
        this.category = 'bullet'
      }

      update() {
        this.x += this.vx
        this.y += this.vy

        // Удаляем если за экраном
        if (this.x > canvas.width + 50 || this.x < -50 ||
          this.y > canvas.height + 50 || this.y < -50) {
          this.alive = false
        }
      }

      draw(ctx) {
        ctx.fillStyle = "yellow"
        ctx.fillRect(Math.floor(this.x), Math.floor(this.y), Math.floor(this.size), Math.floor(this.size))
      }
    }

    class EnemyBullet {
      constructor(x, y) {
        this.x = x
        this.y = y
        this.speed = 4
        this.width = 12
        this.height = 20
        // Добавляем size для совместимости с isColliding
        this.size = Math.min(this.width, this.height)

        this.alive = true
        this.category = 'enemyBullet'
      }
      update() {
        this.y += this.speed
        if (this.y > canvas.height + 100) this.alive = false
      }
      draw() {
        ctx.drawImage(
          assets.get('drone_bullet'),
          Math.floor(this.x),
          Math.floor(this.y),
          this.width,
          this.height
        )

        if (DEBUG.showHitboxes) {
          UI.showHitboxRect(this.x, this.y, this.width, this.height)
        }
      }
    }

    class Missile {
      constructor(x, y, targetX) {
        this.x = x
        this.y = y

        this.targetX = targetX

        this.speed = 4
        this.size = 12

        this.alive = true
        this.category = 'enemyBullet'
      }

      update() {
        if (this.x < this.targetX) this.x += 1.5
        if (this.x > this.targetX) this.x -= 1.5

        this.y += this.speed
        if (this.y > canvas.height + 100) this.alive = false
      }

      draw() {
        ctx.drawImage(
          assets.get('drone_bullet'),
          Math.floor(this.x),
          Math.floor(this.y),
          16,
          32)
      }
    }

    class Explosion {
      constructor(x, y, width = EXPLOSION_FRAME_WIDTH, height = EXPLOSION_FRAME_HEIGHT) {
        this.x = x + width / 2;
        this.y = y + height / 2;
        this.frame = 0;
        this.timer = 0;

        this.alive = true
        this.category = 'vfx'
      }

      update(delta) {
        this.timer += delta;
        if (this.timer >= EXPLOSION_FRAME_DURATION) {
          this.timer = 0;
          this.frame++;
          if (this.frame >= EXPLOSION_FRAME_COUNT) {
            this.alive = false; // взрыв закончился
          }
        }
      }

      draw(ctx) {
        if (this.alive) {
          ctx.drawImage(
            assets.get('explosion'),
            Math.floor(this.frame * EXPLOSION_FRAME_WIDTH), 0,
            EXPLOSION_FRAME_WIDTH, EXPLOSION_FRAME_HEIGHT,
            Math.floor(this.x - EXPLOSION_FRAME_WIDTH / 2),
            Math.floor(this.y - EXPLOSION_FRAME_HEIGHT / 2),
            EXPLOSION_FRAME_WIDTH,
            EXPLOSION_FRAME_HEIGHT
          );
        }
      }
    }

    class Grenade {
      constructor(x, y) {
        this.x = x
        this.y = y

        this.vy = 3

        this.width = 20
        this.height = 20

        this.timer = 180
        this.onGround = false
        this.exploded = false

        this.alive = true
        this.category = 'enemyBullet' // Грены тоже пули врага
      }

      explode() {
        this.exploded = true;
        vfxManager.playGroundExplosion(this.x, this.y);
        // Логика урона по области
        if (Physics.isColliding(this, player)) { // Упрощенная проверка
          player.die();
        }
      }

      update() {
        if (!this.onGround) {
          this.y += this.vy

          if (this.y >= canvas.height - groundHeight - this.height) {
            this.y = canvas.height - groundHeight - this.height
            this.onGround = true
          }
          return
        }

        // лежит на земле
        this.timer--

        if (this.timer <= 0 && !this.exploded) {
          this.explode()

          this.alive = false
        }
      }

      draw() {
        const grenadeImg = assets.get('grenade')

        if (this.onGround && this.timer < 60) {
          if (Math.floor(this.timer / 10) % 2 === 0) {
            ctx.drawImage(grenadeImg, this.x, this.y, this.width, this.height)

            ctx.beginPath()
            ctx.arc(this.x + 10, this.y + 10, 30, 0, Math.PI * 2)
            ctx.strokeStyle = "red"
            ctx.stroke()
          }
        } else {
          ctx.drawImage(grenadeImg, this.x, this.y, this.width, this.height)
        }
      }
    }

    class GroundExplosion {
      constructor(x, y) {
        this.x = x;
        this.y = y - 30;
        this.frame = 0;
        this.timer = 0;

        this.alive = true
        this.category = 'vfx'
      }

      update(delta) {
        this.timer += delta;

        if (this.timer >= 50) { // Примерно 3 кадра при 60fps
          this.timer = 0;
          this.frame++;
        }
        if (this.frame >= GROUND_EXPLOSION_FRAMES) {
          this.alive = false;
        }
      }

      draw(ctx) {
        ctx.drawImage(
          assets.get('ground_explosion'),
          Math.floor(this.frame * GROUND_EXPLOSION_FRAME_WIDTH),
          0,
          GROUND_EXPLOSION_FRAME_WIDTH,
          GROUND_EXPLOSION_FRAME_HEIGHT,
          Math.floor(this.x - GROUND_EXPLOSION_FRAME_WIDTH / 2),
          Math.floor(this.y - GROUND_EXPLOSION_FRAME_HEIGHT / 2),
          GROUND_EXPLOSION_FRAME_WIDTH,
          GROUND_EXPLOSION_FRAME_HEIGHT
        );
      }
    }

    class Weapon {
      constructor() {
        this.name = "Weapon"
        this.magazineSize = 0
        this.magazines = 0
        this.fireRate = 0
        this.reloadTime = 0
        this.auto = false
        this.bulletsPerShot = 1
        this.bulletSpeed = 10
        this.spread = 0

        this.ammoInMagazine = 0
        this.remainingMagazines = 0
        this.lastShotTime = 0
        this.reloading = false
      }

      initAmmo() {
        this.ammoInMagazine = this.magazineSize
        this.remainingMagazines = this.magazines
        this.reloading = false
        this.lastShotTime = 0
      }

      canShoot(now = Date.now()) {
        if (this.reloading) return false
        if (this.ammoInMagazine <= 0) return false
        return now - this.lastShotTime >= this.fireRate;
      }

      consumeShot(now = Date.now()) {
        this.lastShotTime = now
        this.ammoInMagazine--

        if (this.ammoInMagazine <= 0 && this.remainingMagazines > 0) {
          this.reload()
        }
      }

      reload(UI) {
        if (this.reloading) return false
        if (this.remainingMagazines <= 0) return false
        if (this.ammoInMagazine === this.magazineSize) return false

        this.reloading = true
        if (UI) UI.showReloading(true)

        setTimeout(() => {
          this.ammoInMagazine = this.magazineSize
          this.remainingMagazines--
          this.reloading = false

          if (UI) {
            UI.updateAmmo(this)
            UI.updateMagazines(this)
            UI.showReloading(false)
          }
        }, this.reloadTime)

        return true
      }

      getShotAngles() {
        if (this.bulletsPerShot === 1) return [0]

        const angles = []
        const half = (this.bulletsPerShot - 1) / 2
        const step = this.spread / Math.max(1, this.bulletsPerShot - 1)

        for (let i = 0; i < this.bulletsPerShot; i++) {
          angles.push((-this.spread / 2) + i * step)
        }

        return angles
      }

      shoot(player, dirX, dirY) {
        if (!this.canShoot()) return []

        const now = Date.now()
        this.consumeShot(now)

        const baseAngle = Math.atan2(dirY, dirX)
        const shots = []

        for (const offsetDeg of this.getShotAngles()) {
          const angle = baseAngle + (offsetDeg * Math.PI / 180)
          shots.push({
            x: player.x + player.width / 2,
            y: player.y + player.height / 2,
            vx: Math.cos(angle) * this.bulletSpeed,
            vy: Math.sin(angle) * this.bulletSpeed
          })
        }

        return shots
      }
    }

    class PistolWeapon extends Weapon {
      constructor() {
        super()
        this.name = "Pistol"
        this.magazineSize = 15
        this.magazines = 8
        this.fireRate = 400
        this.reloadTime = 1000
        this.auto = false
        this.bulletsPerShot = 1
        this.bulletSpeed = 11
        this.spread = 0
        this.initAmmo()
      }
    }

    class RifleWeapon extends Weapon {
      constructor() {
        super()
        this.name = "Assault Rifle"
        this.magazineSize = 30
        this.magazines = 6
        this.fireRate = 200
        this.reloadTime = 2000
        this.auto = true
        this.bulletsPerShot = 1
        this.bulletSpeed = 13
        this.spread = 0
        this.initAmmo()
      }
    }

    class ShotgunWeapon extends Weapon {
      constructor() {
        super()
        this.name = "Shotgun"
        this.magazineSize = 12
        this.magazines = 5
        this.fireRate = 600
        this.reloadTime = 2600
        this.auto = false
        this.bulletsPerShot = 6
        this.bulletSpeed = 10
        this.spread = 30
        this.initAmmo()
      }
    }

    class MachineGunWeapon extends Weapon {
      constructor() {
        super()
        this.name = "Machine Gun"
        this.magazineSize = 120
        this.magazines = 2
        this.fireRate = 100
        this.reloadTime = 5000
        this.auto = true
        this.bulletsPerShot = 1
        this.bulletSpeed = 15
        this.spread = 5
        this.initAmmo()
      }
    }

    // ======================
    // HELPERS
    // ======================
    class DroneSpawner {
      constructor(entityManager, waveManager, canvas) {
        this.entityManager = entityManager
        this.waveManager = waveManager
        this.canvas = canvas
      }

      spawnNormalDrone() {
        const maxDrones = this.waveManager.maxDrones
        if (this.entityManager.getCountByCategory('drone') >= maxDrones) return

        const drone = new NormalDrone(Math.random() * this.canvas.height * 0.4)
        this.entityManager.spawn(drone)
        return drone
      }

      spawnGrenadier() {
        const maxDrones = this.waveManager.maxDrones
        if (this.entityManager.getCountByCategory('drone') >= maxDrones) return

        const drone = new GrenadierDrone(Math.random() * this.canvas.height * 0.4)
        this.entityManager.spawn(drone)
        return drone
      }

      spawnKamikaze() {
        const maxDrones = this.waveManager.maxDrones
        if (this.entityManager.getCountByCategory('drone') >= maxDrones) return

        const drone = new KamikazeDrone()
        this.entityManager.spawn(drone)
        return drone
      }

      spawnBoss() {
        const boss = new BossDrone()
        this.entityManager.spawn(boss)
        boss.active = true
        return boss
      }
    }

    function createWeapon(type) {
      switch (type) {
        case "pistol":
          return new PistolWeapon()
        case "rifle":
          return new RifleWeapon()
        case "shotgun":
          return new ShotgunWeapon()
        case "machinegun":
          return new MachineGunWeapon()
        default:
          return new PistolWeapon()
      }
    }

    // ======================
    // GAME FLOW
    // ======================
    async function startGame() {
      try {
        await fadeOutMenu()
        initGame()
        await startGameSequence()
        await animatePlayerIntro()
        await new Promise(resolve => setTimeout(resolve, 3000))
        await showCommanderIntro()
        await waveManager.startStage(0)

        playerName = document.getElementById("nameInput").value.toUpperCase()
        if (playerName.length < 3) playerName = "AAA"
      } catch (err) {
        console.error("CRITICAL STARTUP ERROR:", err)
      }
    }

    async function restartGame() {
      // Отключаем эффекты для игры
      EffectsManager.disableForGame()

      initGame()
      currentState = GameState.GAME

      const ui = document.getElementById("ui")
      ui.style.display = "none"
      ui.classList.remove("game_over_bg")
      effectsLayer.style.display = "block"

      await fadeScreen()

      document.body.classList.add("hide-cursor")
      player = new Player()
      entityManager.clear()
    }

    async function endGame() {
      currentState = GameState.GAME_OVER

      EffectsManager.enableForMenu()
      document.body.classList.remove("hide-cursor")

      audio.stopAll()
      audio.playMusic('gameover')

      await saveScoreOnline()
      await loadLeaderboard()
      saveScore()

      UI.showGameOver(playerName, scoreManager.getScore())
      if (UI.el.restartBtn) {
        UI.el.restartBtn.onclick = restartGame
      }

      UI.setLeaderboardHTML(loadLeaderboard())
    }

    async function fadeOutMenu() {
      await new Promise(resolve => setTimeout(resolve, 500))

      document.body.classList.add("hide-cursor")
      audio.playMusic('ambient')
      // await crossfadeMusic(menuMusic, GAME_SOUNDS.ambient, 2000)
      fadeEl.style.opacity = "1"
      fadeEl.style.transition = "opacity 3s"
    }

    async function startGameSequence() {
      await new Promise(r => setTimeout(r, 5000))
      const ui = document.getElementById("ui")
      fadeEl.style.opacity = "0"
      ui.style.display = "none"
      effectsLayer.style.display = "block"

      // Отключаем все визуальные эффекты
      EffectsManager.disableForGame()

      currentState = GameState.GAME
      await new Promise(r => setTimeout(r, 1000))
    }

    async function showCommanderIntro() {
      await new Promise(r => setTimeout(r, 500))

//       const msg = `
//     Значит так, товарищ солдат. Соответственно… соответственно.
// — Слушай боевую задачу.
// В час Х выдвигаешься на усиление укреплённой позиции. Наши из шестьдесят девятого там уже хорошо окопались — опасаться нечего.
// Будешь оказывать содействие в организации снабжения и связи.
// Ротация будет каждые… очень скоро.
// В случае малейшего ранения тебя сразу обну… окажут помощь и эвакуируют в тыл.
// Кто без команды пойдёт назад — будет принят за наступающие силы противника.
//     `
      const msg = `Alright, listen up, soldier.
Here’s the situation… yeah… here’s the situation.
Your mission: at H-hour, you move out to reinforce a fortified position.
Units from the 69th are already dug in — area’s considered secure.
You’ll assist with supply lines and comms.
Rotations will be… happening soon enough.
In case of injury, you’ll be… taken care of and evacuated to the rear.
Anyone falling back without orders will be treated as hostile.`
      await showCommanderMessage(3000, msg)
    }

    async function animatePlayerIntro() {
      player.x = -player.width
      player.y = canvas.height - groundHeight - player.height
      player.direction = 1 // идем вправо
      const targetX = canvas.width * 0.5
      const speed = 3

      return new Promise(resolve => {
        const interval = setInterval(() => {
          // “имитация” движения, как при нажатии клавиш
          player.vx = speed
          player.isMoving = true
          player.update()  // обновляем позицию и кадры

          if (player.x >= targetX) {
            player.x = targetX
            player.vx = 0
            player.isMoving = false
            player.update()
            clearInterval(interval)
            resolve()
          }
        }, 100)
      })
    }

    async function showCommanderMessage(duration = 10000, message = null) {
      const prevState = currentState
      currentState = GameState.DIALOG

      UI.showDialog()

      const balloon = UI.el.commanderBalloon
      const p = balloon.querySelector("p")

      await UI.animateCommanderIn()

      await audio.playSfx('radio_on')

      await new Promise(r => setTimeout(r, 300))

      const pages = textManager.splitIntoPages(message)
      for (let i = 0; i < pages.length; i++) {
        const page = pages[i] + "..."
        await textManager.typeToElement(p, page)

        UI.showContinueHint(true)
        await waitForContinue()
        UI.showContinueHint(false)
      }

      await audio.playSfx('radio_off')
      await UI.animateCommanderOut()

      currentState = prevState === GameState.PAUSED ? GameState.PAUSED : GameState.GAME

      UI.hideDialog()
    }

    function fadeScreen(duration = 800) {
      const f = document.getElementById("fade")
      return new Promise(resolve => {
        f.style.transition = `opacity ${duration / 2}ms`
        f.style.opacity = '1'
        setTimeout(() => {
          f.style.opacity = '0'
          setTimeout(resolve, duration / 2)
        }, duration / 2)
      })
    }

    function waitForContinue() {
      return new Promise(resolve => {
        function handler(e) {
          if (e.code === "Enter") {
            window.removeEventListener("keydown", handler)
            resolve()
          }
        }

        window.addEventListener("keydown", handler)
      })
    }

    function saveScore() {
      leaderboard.push({ name: playerName, score: scoreManager.getScore(), time: Math.floor(survivalTime) })
      leaderboard.sort((a, b) => {
        if (b.score !== a.score) return b.score - a.score
        return b.time - a.time
      })
      leaderboard = leaderboard.slice(0, 10)
    }

    async function saveScoreOnline() {
      const { data, error } = await db
        .from("leaderboard")
        .insert([{ name: playerName, score: scoreManager.getScore() }])
      if (error) { console.error(error) }
    }

    async function loadLeaderboard() {
      const { data } = await db
        .from("leaderboard")
        .select("*")
        .order("score", { ascending: false })
        .limit(5)
      leaderboard = data
      renderLeaderboard()
    }

    function handlePlayerInput() {
      if (player.alive && inputManager.isShooting() && player.weapon?.auto) {
        const dir = inputManager.getShootDirection()
        player.fire(dir.dx, dir.dy)
      }
    }

    function updateEntities(delta) {
      if (!player.alive) {
        player.deathTimer -= delta
        if (player.deathTimer <= 0) {
          timeScale = 1
          endGame()
        }
        return
      }

      player.update(delta, inputManager)

      if (globalEnemyFireCooldown > 0) {
        globalEnemyFireCooldown -= delta
      }

      waveManager.update(delta)

      for (const obj of entityManager.getAll()) {
        if (obj.alive) {
          obj.update(delta)
        }
      }
    }

    function cleanupEntities() {
      entityManager.cleanup()
    }

    // ======================
    // MAIN LOOP
    // ======================
    function gameLoop(t) {
      if (!gameLoopRunning) {
        setTimeout(() => requestAnimationFrame(gameLoop), 100)
        return
      }

      frameCounter++
      if (t - lastFrameTime > 1000) {
        fps = frameCounter - (lastFpsFrameCount || 0)
        lastFpsFrameCount = frameCounter
        lastFrameTime = t
      }

      const rawDelta = Math.min(t - last, 100)
      const delta = rawDelta * timeScale
      last = t

      switch (currentState) {
        case GameState.MENU:
          if (frameCounter % 3 === 0) {
            updateMenu(delta)
            drawMenu()
          }
          break

        case GameState.GAME:
          updateAmbient(delta)
          updateGameplay(delta)
          drawGame()
          break

        case GameState.DIALOG:
          updateDialog(delta)
          drawGame()
          break

        case GameState.PAUSED:
          if (frameCounter % 6 === 0) {
            updatePaused(delta)
            drawPaused()
          }
          break

        case GameState.GAME_OVER:
          if (frameCounter % 3 === 0) {
            drawDeathOverlay()
          }
          break
      }

      if (gameLoopInstances > 1) {
        console.error("MULTIPLE GAME LOOPS DETECTED! Stopping instance.")
        gameLoopInstances--
        return
      }

      requestAnimationFrame(gameLoop)
    }

    function updateDialog(delta) {
      updateAmbient(delta)
    }

    function updatePaused(delta) {
      // Ничего из игрового мира не двигаем.
      // Если захочешь мигающий PAUSED — можно обновлять только его.
    }

    function updateGameplay(delta) {
      handlePlayerInput()
      updateEntities(delta)
      collisionManager.update()
      cleanupEntities()

      survivalTime += delta / 1000
    }

    function updateAmbient() {
      backgroundScene.updateAmbient()
    }

    const waveManager = new WaveManager()
    const droneSpawner = new DroneSpawner(entityManager, waveManager, canvas)
    const backgroundScene = new BackgroundScene(canvas, groundHeight, assets)

    function initGame() {
      // игрок
      player = new Player()
      collisionManager.player = player

      // оружие
      player.setWeapon("pistol")

      // игра
      scoreManager.reset()
      survivalTime = 0
      dropTimer = 0
      shootCooldown = 0

      backgroundScene.initEffects()
    }

    function drawBackgroundAndScene() {
      const background = assets.get('background')

      // Фон
      if (background.complete) {
        ctx.drawImage(background, 0, 0, canvas.width, canvas.height)
      }

      // Анимированные спрайты сцены
      backgroundScene.drawEffects(ctx)

      // Земля
      ctx.fillStyle = "rgba(0,0,0,0)"
      ctx.fillRect(0, canvas.height - groundHeight, canvas.width, groundHeight)

      // Статичные объекты сцены
      backgroundScene.drawDecals(ctx)
    }

    function drawEntities() {
      if (player?.alive) {
        player.draw(ctx)
      }

      for (const obj of entityManager.getAll()) {
        if (obj.alive) {
          obj.draw(ctx)
        }
      }
    }

    function drawDeathOverlay() {
      ctx.save()
      ctx.fillStyle = "rgba(0,0,0,0.7)"
      ctx.fillRect(0, 0, canvas.width, canvas.height)

      ctx.fillStyle = "red"
      ctx.font = "96px 'Press Start 2P'"
      ctx.textAlign = "center"
      ctx.shadowColor = "black"
      ctx.shadowBlur = 10
      ctx.fillText("You are KIA!", canvas.width / 2, canvas.height / 2)
      ctx.restore()
    }

    function draw() {
      // Очистка канваса
      ctx.clearRect(0, 0, canvas.width, canvas.height)

      drawBackgroundAndScene()
      drawEntities()
    }

    function drawPaused() {
      draw()

      ctx.save()
      ctx.fillStyle = "rgba(0,0,0,0.45)"
      ctx.fillRect(0, 0, canvas.width, canvas.height)

      ctx.fillStyle = "#ffffff"
      ctx.font = "42px 'Press Start 2P'"
      ctx.textAlign = "center"
      ctx.fillText("PAUSED", canvas.width / 2, canvas.height / 2)

      ctx.font = "18px 'Press Start 2P'"
      ctx.fillText("Press P to continue", canvas.width / 2, canvas.height / 2 + 60)
      ctx.restore()
    }

    function updateMenu(delta) {

    }

    function drawMenu() {

    }

    function drawGame() {
      draw()
    }

    if (gameLoopInstances === 0) {
      gameLoopInstances++
      requestAnimationFrame(gameLoop)
    }

    UI.hud.startBtn.onclick = startGame

    document.addEventListener("keydown", e => {
      if (e.code === "Space") {
        if (player.weapon && !player.weapon.auto) {
          const dir = inputManager.getShootDirection()
          player.fire(dir.dx, dir.dy)
        }
      }

      if (e.code === "KeyP") {
        if (currentState === GameState.GAME) {
          currentState = GameState.PAUSED
        } else if (currentState === GameState.PAUSED) {
          currentState = GameState.GAME
        }
      }

      if (currentState === GameState.PAUSED) {
        return
      }

      if (e.key === "i") {
        player.setWeapon('rifle')
      }

      if (e.key === "s") {
        player.setWeapon('shotgun')
      }

      if (e.key === "m") {
        player.setWeapon('machinegun')
      }

      if (e.code === "Space") {
        e.preventDefault()
      }

      if (e.code === "KeyR") {
        if (player.weapon?.reloading) return
        player.reload()
      }

      keys[e.key] = true
    })

    document.addEventListener("keyup", e => {
      if (currentState === GameState.PAUSED) {
        if (e.code === "Space") {
          shooting = false
        }
        return
      }

      keys[e.key] = false
    })

    document.body.addEventListener("click", () => {
      audio.playMusic('menu')
    }, { once: true })

    async function preloadAssets() {
      const interval = setInterval(() => {
        UI.setLoadingProgress(assets.getProgress() * 100)
      }, 50)

      await assets.loadAll()
      clearInterval(interval)
      UI.setLoadingProgress(100)
      await new Promise(r => setTimeout(r, 200))
      UI.hideLoadingScreen()
    }

    window.addEventListener("load", async () => {
      await preloadAssets()
      await loadLeaderboard()
    })

  </script>
