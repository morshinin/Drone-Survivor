<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Drone Survivor</title>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">

  <style>

    body{
      margin:0;
      overflow:hidden;
      font-family: "Press Start 2P", monospace;

      background-image:url("menu_bg.png");
      background-size: 105%;
      background-position:center;
      background-repeat:no-repeat;
      animation:bgMove 40s linear infinite;
    }

    body::before{
      content:"";
      position:fixed;
      left:0;
      top:0;
      width:100%;
      height:100%;

      background:rgba(0,0,0,0.15);

      z-index:-1;
    }


    #ui{
      position:absolute;
      width:100%;
      height:100%;
      display:flex;
      align-items:center;
      justify-content:center;
      flex-direction:column;
      text-align:center;
      top:60%;
      left:50%;

      transform:translate(-50%,-50%);

      color: white;
      text-shadow: 2px 2px black;

    }



    button{
      padding:12px 30px;
      font-size:20px;
      cursor:pointer;
      margin-top:10px;
    }

    #startBtn {
      font-size:46px;
      color: aliceblue;
      background-color: darkred;
      border-radius: 10%;
      font-weight: bold;

      animation:blink 2s infinite;

      cursor:pointer;
    }

    #timer{
      position:absolute;
      top:10px;
      right:20px;
      font-size:22px;
      font-weight:bold;
    }

    #score{
      position:absolute;
      top:10px;
      left:20px;
      font-size:22px;
      font-weight:bold;
    }

    #leaderboard{
      margin-top:20px;
      font-size: 24px;
    }

    #fade{
      position:fixed;
      left:0;
      top:0;
      width:100%;
      height:100%;
      background:black;
      pointer-events:none;
      opacity:0;
      transition:opacity 0.8s;
      z-index:999;
    }

    #countdown{
      position:fixed;
      top:50%;
      left:50%;
      transform:translate(-50%,-50%);
      font-size:120px;
      font-weight:bold;
      color:white;
      text-shadow:0 0 20px cyan;

      opacity:0;
      pointer-events:none;

      transition:opacity 0.2s, transform 0.2s;

      z-index:1000;
    }

    @keyframes bgMove{

      0%{
        background-position:center top;
      }

      50%{
        background-position:center bottom;
      }

      100%{
        background-position:center top;
      }

    }

    @keyframes blink{

      0%{opacity:1}
      50%{opacity:.8}
      100%{opacity:1}

    }

  </style>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

</head>

<body>

<canvas id="game"></canvas>

<div id="fade"></div>

<div id="timer"></div>
<div id="score"></div>

<audio id="menuMusic" src="menu.mp3" loop></audio>
<audio id="gameMusic" src="game.mp3" loop></audio>
<audio id="gameOverMusic" src="gameover.mp3" loop></audio>
<audio id="beep" src="beep.mp3"></audio>

<div id="countdown"></div>

<div id="ui">

  <p>Enter your name (3 letters)</p>

  <input id="nameInput" maxlength="3"
         style="font-size:28px;width:90px;text-align:center;text-transform:uppercase">

  <button id="startBtn">Press Start</button>

  <div id="leaderboard"></div>

</div>

<script>
  const SUPABASE_URL = "https://zsdwmjdalfnmvtlwoygs.supabase.co"
  const SUPABASE_KEY = "sb_publishable_B9tdTmqKndQysFngs7vT2Q_TqYVx7bt"

  const db = supabase.createClient(
    SUPABASE_URL,
    SUPABASE_KEY
  )

  const menuMusic = document.getElementById("menuMusic")
  const gameMusic = document.getElementById("gameMusic")
  const gameOverMusic = document.getElementById("gameOverMusic")
  const canvas = document.getElementById("game")
  const ctx = canvas.getContext("2d")

  canvas.width = window.innerWidth
  canvas.height = window.innerHeight

  const groundHeight = 40

  let keys = {}
  let gameRunning = false

  document.addEventListener("keydown",e=>keys[e.key]=true)
  document.addEventListener("keyup",e=>keys[e.key]=false)

  function fadeScreen(duration=800){

    const f = document.getElementById("fade")

    return new Promise(resolve=>{

      f.style.transition = `opacity ${duration/2}ms`
      f.style.opacity = 1

      setTimeout(()=>{

        f.style.opacity = 0

        setTimeout(resolve, duration/2)

      }, duration/2)

    })

  }

  async function crossfadeMusic(from, to, duration=1000){

    if(to){
      to.volume = 0
      to.play()
    }

    const steps = 20
    const stepTime = duration/steps

    for(let i=0;i<=steps;i++){

      const t = i/steps

      if(from) from.volume = 0.2*(1-t)
      if(to)   to.volume = 0.2*t

      await new Promise(r=>setTimeout(r,stepTime))
    }

    if(from) from.pause()

  }

  function sleep(ms){
    return new Promise(r=>setTimeout(r,ms))
  }

  async function cinematicStart(){

    const el = document.getElementById("countdown")

    const steps = ["3","2","1","START"]

    for(const s of steps){

      document.getElementById("beep").currentTime=0
      document.getElementById("beep").play()

      el.innerText = s
      el.style.opacity = 1
      el.style.transform = "translate(-50%,-50%) scale(1.3)"

      await sleep(120)

      el.style.transform = "translate(-50%,-50%) scale(1)"

      await sleep(650)

      el.style.opacity = 0

      await sleep(200)

    }

  }

  class Player{

    constructor(){

      this.size=30
      this.x=canvas.width/2
      this.y=canvas.height-groundHeight-this.size
      this.speed=6

    }

    update(){

      if(keys["ArrowLeft"]) this.x-=this.speed
      if(keys["ArrowRight"]) this.x+=this.speed

      if(this.x<0) this.x=0
      if(this.x+this.size>canvas.width)
        this.x=canvas.width-this.size

    }

    draw(){

      ctx.fillStyle="black"
      ctx.fillRect(this.x,this.y,this.size,this.size)

    }

  }

  class Drone{

    constructor(y){

      this.width=80
      this.height=20
      this.x=Math.random()*canvas.width
      this.y=y
      this.speed=(Math.random()*2+1)*(Math.random()<0.5?-1:1)

    }

    update(){

      this.x+=this.speed

      if(this.x<0 || this.x+this.width>canvas.width){
        this.speed*=-1
      }

    }

    draw(){

      ctx.fillStyle="black"
      ctx.fillRect(this.x,this.y,this.width,this.height)

    }

  }

  class Bullet{

    constructor(x,y){

      this.size=6
      this.x=x
      this.y=y
      this.speed=9

    }

    update(){
      this.y-=this.speed
    }

    draw(){
      ctx.fillRect(this.x,this.y,this.size,this.size)
    }

  }

  class EnemyBullet{

    constructor(x,y){

      this.size=10
      this.x=x
      this.y=y
      this.speed=4

    }

    update(){
      this.y+=this.speed
    }

    draw(){
      ctx.fillRect(this.x,this.y,this.size,this.size)
    }

  }

  class Particle{

    constructor(x,y){

      this.x=x
      this.y=y
      this.size=4

      this.vx=(Math.random()-0.5)*6
      this.vy=(Math.random()-0.5)*6

      this.life=30

    }

    update(){

      this.x+=this.vx
      this.y+=this.vy
      this.life--

    }

    draw(){

      ctx.fillRect(this.x,this.y,this.size,this.size)

    }

  }

  let player
  let drones
  let bullets
  let enemyBullets
  let particles

  let dropTimer=0
  let shootCooldown=0

  let score=0
  let survivalTime=0

  let playerName="AAA"

  let leaderboard=[]

  function playSound(freq,duration){

    let audioCtx=new (window.AudioContext||window.webkitAudioContext)()

    let osc=audioCtx.createOscillator()
    let gain=audioCtx.createGain()

    osc.connect(gain)
    gain.connect(audioCtx.destination)

    osc.frequency.value=freq

    osc.start()

    gain.gain.exponentialRampToValueAtTime(
      0.0001,
      audioCtx.currentTime+duration
    )

    osc.stop(audioCtx.currentTime+duration)

  }

  function saveScore(){

    leaderboard.push({
      name:playerName,
      score:score,
      time:Math.floor(survivalTime)
    })

    leaderboard.sort((a,b)=>{

      if(b.score!==a.score)
        return b.score-a.score

      return b.time-a.time

    })

    leaderboard=leaderboard.slice(0,10)
  }

  async function saveScoreOnline(){

    const {data, error} = await db
      .from("leaderboard")
      .insert([
        {
          name: playerName,
          score: score,
          time: Math.floor(survivalTime)
        }
      ])

    if(error){
      console.error(error)
    }
  }

  async function loadLeaderboard(){

    const { data } = await db
      .from("leaderboard")
      .select("*")
      .order("score", { ascending:false })
      .limit(5)

    leaderboard = data

    renderLeaderboard()

  }
  function renderLeaderboard(){

    let html="<h3>Leaderboard</h3>"

    leaderboard.forEach((p,i)=>{

      html+=`${i+1}. ${p.name} — ${p.score} drones — ${p.time}s<br>`

    })

    document.getElementById("leaderboard").innerHTML=html

  }

  function spawnExplosion(x,y){

    for(let i=0;i<12;i++)
      particles.push(new Particle(x,y))

  }

  async function startGame(){

    playerName=document
      .getElementById("nameInput")
      .value
      .toUpperCase()

    if(playerName.length<3)
      playerName="AAA"

    document.getElementById("ui").style.display="none"
    await fadeScreen()

    await crossfadeMusic(menuMusic, gameMusic)

    await cinematicStart()

    gameRunning=true

    player=new Player()

    drones=[
      new Drone(canvas.height*0.2),
      new Drone(canvas.height*0.35)
    ]

    bullets=[]
    enemyBullets=[]
    particles=[]

    score=0
    survivalTime=0

  }

  async function endGame(text){

    gameRunning=false

    document.getElementById("gameMusic").pause()

    await fadeScreen()

    await crossfadeMusic(gameMusic, gameOverMusic)

    await saveScoreOnline()
    await loadLeaderboard()


    saveScore()

    const ui=document.getElementById("ui")

    ui.innerHTML=`
<h1>${text}</h1>

<h2>${playerName}</h2>

<p>Drones destroyed: ${score}</p>
<p>Survival time: ${Math.floor(survivalTime)}s</p>

<div id="leaderboard"></div>

<button onclick="location.reload()">Play Again</button>
`

    ui.style.display="flex"

    renderLeaderboard()

  }

  function update(delta){

    player.update()

    if(keys["ArrowUp"] && shootCooldown<=0){

      bullets.push(
        new Bullet(
          player.x+player.size/2,
          player.y
        )
      )

      shootCooldown=250

      playSound(600,0.1)

    }

    shootCooldown-=delta

    drones.forEach(d=>d.update())

    dropTimer+=delta

    if(dropTimer>1000){

      dropTimer=0

      drones.forEach(d=>{

        enemyBullets.push(
          new EnemyBullet(
            d.x+d.width/2,
            d.y+d.height
          )
        )

      })

    }

    bullets.forEach(b=>b.update())
    enemyBullets.forEach(b=>b.update())
    particles.forEach(p=>p.update())

    bullets.forEach((b,bi)=>{

      drones.forEach((d,di)=>{

        if(
          b.x<d.x+d.width &&
          b.x+b.size>d.x &&
          b.y<d.y+d.height &&
          b.y+b.size>d.y
        ){

          spawnExplosion(d.x,d.y)

          playSound(120,0.2)

          score++

          bullets.splice(bi,1)
          drones.splice(di,1)

          drones.push(new Drone(Math.random()*canvas.height*0.4))
          drones.push(new Drone(Math.random()*canvas.height*0.4))

        }

      })

    })

    enemyBullets.forEach((b,i)=>{

      if(b.y>canvas.height-groundHeight){

        spawnExplosion(b.x,b.y)
        enemyBullets.splice(i,1)

      }

      if(
        b.x<player.x+player.size &&
        b.x+b.size>player.x &&
        b.y<player.y+player.size &&
        b.y+b.size>player.y
      ){

        playSound(60,0.5)

        endGame("Game Over")

      }

    })

    particles=particles.filter(p=>p.life>0)

    survivalTime+=delta/1000

    document.getElementById("timer").innerText=
      survivalTime.toFixed(1)+"s"

    document.getElementById("score").innerText=
      "Drones: "+score

  }

  function draw(){

    ctx.clearRect(0,0,canvas.width,canvas.height)

    ctx.fillStyle="#87CEEB"
    ctx.fillRect(0,0,canvas.width,canvas.height)

    ctx.fillStyle="#333"
    ctx.fillRect(0,canvas.height-groundHeight,canvas.width,groundHeight)

    player.draw()

    drones.forEach(d=>d.draw())
    bullets.forEach(b=>b.draw())
    enemyBullets.forEach(b=>b.draw())
    particles.forEach(p=>p.draw())

  }

  let last=0

  function gameLoop(t){

    let delta=t-last
    last=t

    if(gameRunning){

      update(delta)
      draw()

    }

    requestAnimationFrame(gameLoop)

  }

  requestAnimationFrame(gameLoop)

  document.getElementById("startBtn").onclick=startGame

  loadLeaderboard()

  menuMusic.volume = 0.4
  menuMusic.play()

  document.body.addEventListener("click", () => {
    menuMusic.play()
  }, { once:true })
</script>

</body>
</html>
