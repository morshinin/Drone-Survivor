    .crt {
      background-image:url("menu_bg.png");
      background-size: 105%;
      background-position:center;
      background-repeat:no-repeat;
      text-shadow: 0 0 0.2em currentColor, 1px 1px rgba(255, 0, 255, 0.5),
      -1px -1px rgba(0, 255, 255, 0.4);
      position: relative;
      &:before,
      &:after {
        content: "";
        transform: translateZ(0);
        pointer-events: none;
        /*//opacity: 0.5;*/
        mix-blend-mode: overlay;
        position: absolute;
        height: 100%;
        width: 100%;
        left: 0;
        top: 0;
        z-index: 1;
      }

      &:before {
        background: repeating-linear-gradient(
            var(--crt-red) 0px,
            var(--crt-green) 2px,
            var(--crt-blue) 4px

      }
      &:after {

            90deg,
            var(--crt-red) 1px,
            var(--crt-green) 2px,
            var(--crt-blue) 3px
        );
      }
    }

      width: 100%;

    @keyframes motoMove {

      50% { right: calc(100% - 200px); }
      100% { right: -200px; }
    }

    @keyframes bgMove{
      0%{

      }

      50%{

      }

      100%{

      }

      32% {

      }
      98% {
        transform: translateX(0);
      }
      100% {
        transform: translateX(10px);
      }
    }

  // ПЕРЕМЕСТИТЕ ЭТОТ КЛАСС ВВЕРХ, например после GAME_SOUNDS
  class AnimatedSprite {
    constructor(x, y, image, options = {}) {
      this.x = x
      this.y = y
      this.image = image

      // Параметры спрайта
      this.columns = options.columns || 2
      this.totalFrames = options.totalFrames || 58
      this.frameDelay = options.frameDelay || 8
      this.width = options.width || (image.width / this.columns)
      this.height = options.height || (image.height / (this.totalFrames / this.columns))
      this.scale = options.scale || 1.0
      this.opacity = options.opacity || 1.0
      this.loop = options.loop !== undefined ? options.loop : true

      // Вычисляем количество строк
      this.rows = Math.ceil(this.totalFrames / this.columns)

      this.timer = 0
      this.frame = options.startFrame || 0
      this.alive = true
    }

    update() {
      this.timer++

      if (this.timer >= this.frameDelay) {
        let nextFrame = this.frame + 1

        if (nextFrame >= this.totalFrames) {
          if (this.loop) {
            nextFrame = 0
          } else {
            this.alive = false
            return
          }
        }

        this.frame = nextFrame
        this.timer = 0
      }
    }

    draw(ctx) {
      if (!this.image || !this.image.complete) return

      const col = this.frame % this.columns
      const row = Math.floor(this.frame / this.columns)

      ctx.save()
      ctx.globalAlpha = this.opacity

      ctx.drawImage(
        this.image,
        col * (this.image.width / this.columns),
        row * (this.image.height / this.rows),
        this.image.width / this.columns,
        this.image.height / this.rows,
        this.x,
        this.y,
        this.width * this.scale,
        this.height * this.scale
      )

      ctx.restore()
    }

    setFrame(frame) {
      this.frame = Math.min(frame, this.totalFrames - 1)
    }

    restart() {
      this.frame = 0
      this.timer = 0
      this.alive = true
    }
  }

      // Этап 5: Бесконечный режим
      this.stages.push(new StageConfig('Бесконечность', {

        waves: this.generateInfiniteWaves(),
        infiniteMode: true
      }))
    }

    generateInfiniteWaves() {
      const waves = []
      for (let i = 0; i < 100; i++) {
        const difficulty = 1 + i * 0.2
        waves.push(new WaveConfig(`Волна ${i+1}`, {
          drones: [
            {type: DroneType.NORMAL, count: Math.floor(10 * difficulty)},
            {type: DroneType.GRENADIER, count: Math.floor(3 * difficulty)},
            {type: DroneType.KAMIKAZE, count: Math.floor(2 * difficulty)}
          ],
          pauseAfter: 3000,
          spawnInterval: Math.max(200, 500 - i * 10)
        }))
      }
      return waves
    }

    // Запустить конкретный этап
    startStage(index) {
      if (index >= this.stages.length) {
        if (this.infiniteMode) {
          this.startInfiniteMode()
        }
        return
      }

      this.currentStageIndex = index
      this.currentWaveIndex = 0
      this.isActive = true
      this.stageComplete = false

      const stage = this.stages[this.currentStageIndex]

      // Показываем сообщение этапа
      if (stage.startMessage) {
        showCommanderMessage(5000, stage.startMessage).then(() => {
          this.startCurrentWave()
        })
      } else {
        this.startCurrentWave()
      }
    }

    // Запустить текущую волну
    startCurrentWave() {
      if (this.currentWaveIndex >= this.stages[this.currentStageIndex].waves.length) {
        this.completeStage()
        return
      }

      this.isPaused = false
      this.spawnTimer = 0
      this.currentWaveSpawnCount = 0 // Сбрасываем счетчик для новой волны
    }

    // Завершить этап
    completeStage() {
      const stage = this.stages[this.currentStageIndex]
      this.isActive = false
      this.stageComplete = true
      this.pauseTimer = 0

      if (stage.endMessage) {
        showCommanderMessage(5000, stage.endMessage).then(() => {
          if (stage.bossWave) {
            // После босса можно перейти в бесконечный режим
            this.startInfiniteMode()
          } else {
            // Переход к следующему этапу
            this.currentStageIndex++
            if (this.currentStageIndex < this.stages.length) {
              this.startStage(this.currentStageIndex)
            }
          }
        })
      } else {
        this.currentStageIndex++
        if (this.currentStageIndex < this.stages.length) {
          this.startStage(this.currentStageIndex)
        }
      }
    }

    // Запустить бесконечный режим
    startInfiniteMode() {
      this.infiniteMode = true
      this.currentStageIndex = this.stages.length - 1
      this.currentWaveIndex = 0
      this.isActive = true

      const stage = this.stages[this.currentStageIndex]
      if (stage.startMessage) {
        showCommanderMessage(5000, stage.startMessage).then(() => {
          this.startCurrentWave()
        })
      }
    }

    // Обновление (вызывать в gameLoop)
    update(delta) {
      if (!this.isActive) {
        console.log("WaveManager not active")
        return
      }

      console.log("WaveManager updating", this.currentStageIndex, this.currentWaveIndex)

      if (this.isPaused) {
        this.pauseTimer += delta
        const stage = this.stages[this.currentStageIndex]
        const wave = stage.waves[this.currentWaveIndex - 1] // предыдущая волна

        if (wave && this.pauseTimer >= wave.pauseAfter) {
          this.isPaused = false
          this.spawnTimer = 0
        }
        return
      }

      const stage = this.stages[this.currentStageIndex]
      const wave = stage.waves[this.currentWaveIndex]

      if (!wave) return

      // Спавн дронов
      this.spawnTimer += delta

      if (this.spawnTimer >= wave.spawnInterval) {
        this.spawnTimer = 0

        // Проверяем, все ли дроны волны заспавнены
        const currentWaveDrones = this.getWaveDroneCount(this.currentStageIndex, this.currentWaveIndex)
        const spawnedInWave = this.countSpawnedInWave()

        if (spawnedInWave < currentWaveDrones) {
          this.spawnNextDrone(wave)
        } else {
          // Все дроны заспавнены, ждем пока их убьют
          if (countDrones() === 0) {
            this.isPaused = true
            this.pauseTimer = 0
            this.currentWaveIndex++
          }
        }
      }
    }

    // Получить общее количество дронов в волне
    getWaveDroneCount(stageIndex, waveIndex) {
      const wave = this.stages[stageIndex].waves[waveIndex]
      return wave.drones.reduce((sum, d) => sum + d.count, 0)
    }

    // Посчитать сколько дронов уже заспавнено в текущей волне
    countSpawnedInWave() {
      // Можно добавить счетчик в WaveManager
      if (!this.currentWaveSpawnCount) {
        this.currentWaveSpawnCount = 0
      }
      return this.currentWaveSpawnCount
    }

    // Заспавнить следующего дрона из волны
    spawnNextDrone(wave) {
      const availableTypes = wave.drones.filter(d => d.count > 0)
      if (availableTypes.length === 0) return

      const type = availableTypes[Math.floor(Math.random() * availableTypes.length)]
      type.count--

      // Увеличиваем счетчик
      this.currentWaveSpawnCount = (this.currentWaveSpawnCount || 0) + 1

      this.spawnDroneByType(type.type)
    }

    // Спавн дрона по типу
    spawnDroneByType(type) {
      console.log("Spawning drone of type:", type)
      switch (type) {
        case DroneType.NORMAL:
          return spawnNormalDrone()
        case DroneType.GRENADIER:
          return spawnGrenadier()
        case DroneType.KAMIKAZE:
          return spawnKamikaze()
        case 'boss':
          return spawnBoss()
      }
    }

    // Тестовые функции для клавиш
    testWave(stageIndex, waveIndex) {
      this.isActive = true
      this.currentStageIndex = stageIndex
      this.currentWaveIndex = waveIndex
      this.isPaused = false
      this.spawnTimer = 0
    }

    testStage(stageIndex) {
      this.startStage(stageIndex)
    }
  }

  // Создаем экземпляр менеджера
  const waveManager = new WaveManager()

  // Спавн группы одинаковых дронов
  function spawnGroup(type, count, interval = 500) {
    let spawned = 0

    const intervalId = setInterval(() => {
      if (spawned >= count) {
        clearInterval(intervalId)
        return
      }

      switch(type) {
        case DroneType.NORMAL:
          spawnDrone()
          break
        case DroneType.GRENADIER:
          waveManager.spawnGrenadier()
          break
        case DroneType.KAMIKAZE:
          waveManager.spawnKamikaze()
          break
      }

      spawned++
    }, interval)
  }

  // Спавн смешанной группы
  function spawnMixedGroup(droneTypes, interval = 500) {
    // droneTypes: [{type: DroneType.NORMAL, count: 5}, {type: DroneType.GRENADIER, count: 2}]
    const total = droneTypes.reduce((sum, d) => sum + d.count, 0)
    let spawned = 0

    const intervalId = setInterval(() => {
      if (spawned >= total) {
        clearInterval(intervalId)
        return
      }

      // Выбираем случайный тип из оставшихся
      const available = droneTypes.filter(d => d.count > 0)
      if (available.length === 0) {
        clearInterval(intervalId)
        return
      }

      const type = available[Math.floor(Math.random() * available.length)]
      type.count--

      switch(type.type) {
        case DroneType.NORMAL:
          spawnDrone()
          break
        case DroneType.GRENADIER:
          waveManager.spawnGrenadier()
          break
        case DroneType.KAMIKAZE:
          waveManager.spawnKamikaze()
          break
      }

      spawned++
    }, interval)
  }

  // Спавн волны с нарастающей сложностью
  function spawnProgressiveWave(baseCount, increments, interval = 500) {
    // baseCount: базовое количество
    // increments: [{type: DroneType.NORMAL, add: 2}, {type: DroneType.GRENADIER, add: 1}]
    let wave = 0

    function spawnNext() {
      if (wave >= increments.length) return

      const drones = [
        {type: DroneType.NORMAL, count: baseCount + increments[wave].add}
      ]

      spawnMixedGroup(drones, interval)

      wave++
      setTimeout(spawnNext, 3000 + wave * 1000)
    }

    spawnNext()
  }

        this.x,
        this.y,
        this.width,
        this.height
      )
      ctx.globalAlpha = 1.0
    }

  function splitTextIntoPages(text,maxChars=140){

    const words = text.split(" ")
    const pages = []

    let current = ""

    for(const word of words){

      if((current+word).length > maxChars){
        pages.push(current.trim())
        current=""
      }

      current += word + " "
    }

    if(current.length) pages.push(current.trim())

    return pages
  }

  async function typeText(element, text, speed = 25){

    element.textContent = ""

    let skip = false

    function skipHandler(e){
      if(e.code === "Enter") skip = true
    }

    window.addEventListener("keydown", skipHandler)
    for(let i=0;i<text.length;i++){
      element.textContent += text[i]

      if(i % 3 === 0 && text[i] !== " "){
        const s = GAME_SOUNDS.typeWriter.cloneNode()
        s.volume = 0.15
        s.play()
      }

      if(skip){
        element.textContent = text
        break
      }

      await new Promise(r => setTimeout(r,speed))
    }

    window.removeEventListener("keydown", skipHandler)
  }

  function waitForContinue(){
    return new Promise(resolve => {
      function handler(e){
        if(e.code === "Enter"){
          window.removeEventListener("keydown",handler)
          resolve()
        }
      }

      window.addEventListener("keydown",handler)
    })
  }

  function buildCollisionGrid() {
    collisionGrid = {}

    gameObjects.forEach(obj => {
      if (!obj.alive) return

      const gridX = Math.floor(obj.x / GRID_SIZE)
      const gridY = Math.floor(obj.y / GRID_SIZE)
      const key = `${gridX},${gridY}`

      if (!collisionGrid[key]) {
        collisionGrid[key] = []
      }
      collisionGrid[key].push(obj)
    })
  }

  function optimizeCollisions() {
    buildCollisionGrid()

    const bullets = gameObjects.filter(o => o instanceof Bullet)
    const drones = gameObjects.filter(o => o instanceof Drone)

    bullets.forEach(b => {
      const gridX = Math.floor(b.x / GRID_SIZE)
      const gridY = Math.floor(b.y / GRID_SIZE)
      const key = `${gridX},${gridY}`

      // Проверяем только объекты в той же ячейке сетки
      const nearbyObjects = collisionGrid[key] || []

      nearbyObjects.forEach(obj => {
        if (obj instanceof Drone && isColliding(b, obj)) {
          b.alive = false
          obj.alive = false
          // ... остальная логика
        }
      })
    })
  }

  function shoot(dirX,dirY){
    if(dirX === 0 && dirY === 0) return
    if(isReloading) return
    if(ammoInMagazine <= 0) return

    if(Date.now() - lastShotTime < currentWeapon.fireRate) return

    lastShotTime = Date.now()

    const currentWeaponName = currentWeapon.name
    if (WEAPON_SOUNDS[currentWeaponName]) {
      const s = WEAPON_SOUNDS[currentWeaponName].shoot.cloneNode()
      s.volume = 0.4
      s.play()
    }

    for(let i=0;i<currentWeapon.bulletsPerShot;i++){

      let angle = Math.atan2(dirY,dirX)

      if(currentWeapon.spread > 0){

        const spreadRad =
          (Math.random()*currentWeapon.spread -
            currentWeapon.spread/2) * Math.PI/180

        angle += spreadRad
      }

      const dx = Math.cos(angle)
      const dy = Math.sin(angle)

      const speed = currentWeapon.bulletSpeed

      const x = player.x + player.width/2
      const y = player.y + player.height/2

      spawn(new Bullet(x,y,dx * speed,dy * speed))
    }

    if(ammoInMagazine <= 0 && magazines > 0){
      startReload()
    }
  }

  function isColliding(a, b) {
    if (!a || !b || !a.alive || !b.alive) return false

    // Для объектов с size (пули игрока)
    if (a.size !== undefined) {
      return (
        a.x < b.x + b.width &&
        a.x + a.size > b.x &&
        a.y < b.y + b.height &&
        a.y + a.size > b.y
      )
    }

    // Для объектов с width/height (вражеские пули, дроны и т.д.)
    return (
      a.x < b.x + b.width &&
      a.x + a.width > b.x &&
      a.y < b.y + b.height &&
      a.y + a.height > b.y
    )
  }

  async function crossfadeMusic(from, to, duration=1000){
    if(to){
      to.volume = 0
      if (isMusicOn) {
        to.play()
      }
    }
    const steps = 20
    const stepTime = duration/steps
    for(let i=0;i<=steps;i++){
      const t = i/steps
      if(from) from.volume = 0.2*(1-t)
      if(to)   to.volume = 0.2*t
      await new Promise(r=>setTimeout(r,stepTime))
    }
    if(from) from.pause()
  }

  class BaseDrone {
    constructor(x, y, options = {}) {
      this.x = x
      this.y = y
      this.width = options.width || 80
      this.height = options.height || 60
      this.speed = options.speed || (Math.random() * 2 + 1)
      this.direction = options.direction || (Math.random() < 0.5 ? 1 : -1)

      // Позиция зависит от направления
      if (this.direction > 0) {
        this.x = -this.width
      } else {
        this.x = canvas.width + this.width
        this.speed = -this.speed
      }

      this.hp = options.hp || 1
      this.maxHp = options.hp || 1
      this.scoreValue = options.scoreValue || 10
      this.damage = options.damage || 1

      this.alive = true
      this.type = options.type || 'base'

      // Анимация
      this.frame = 0
      this.frameTimer = 0
      this.frameDelay = options.frameDelay || 8

      // Изображение
      this.image = options.image || droneImg
    }

    update(delta) {
      // Базовое движение
      this.x += this.speed

      // Разворот при достижении края
      if (this.x < -this.width || this.x > canvas.width + this.width) {
        this.speed *= -1
      }

      // Легкое покачивание
      this.y += Math.sin(performance.now() * 0.003) * 0.3

      // Анимация
      this.frameTimer += delta
      if (this.frameTimer >= this.frameDelay) {
        this.frame = (this.frame + 1) % 4 // 4 кадра анимации
        this.frameTimer = 0
      }
    }

    draw(ctx) {
      ctx.save()
      ctx.globalAlpha = this.getOpacity()

      // Рисуем как в старом коде - целое изображение
      if (this.image && this.image.complete) {
        ctx.drawImage(
          this.image,
          this.x,
          this.y,
          this.width,
          this.height
        )
      } else {
        // Запасной вариант
        ctx.fillStyle = this.getColor()
        ctx.fillRect(this.x, this.y, this.width, this.height)
      }

      // Полоска здоровья для сильных дронов
      if (this.maxHp > 1) {
        this.drawHealthBar(ctx)
      }

      if (DEBUG.showHitboxes) {
        showHitboxRect(this.x, this.y, this.width, this.height, 'yellow')
      }
    }


    drawHealthBar(ctx) {
      const barWidth = this.width
      const barHeight = 5
      const healthPercent = this.hp / this.maxHp

      ctx.fillStyle = 'rgba(255, 0, 0, 0.5)'
      ctx.fillRect(this.x, this.y - 10, barWidth, barHeight)

      ctx.fillStyle = '#0f0'
      ctx.fillRect(this.x, this.y - 10, barWidth * healthPercent, barHeight)
    }

    getColor() {
      switch(this.type) {
        case 'normal': return '#ff4444'
        case 'grenadier': return '#ff8800'
        case 'kamikaze': return '#ff00ff'
        default: return '#ff0000'
      }
    }

    getOpacity() {
      return 1.0
    }

    takeDamage(amount) {
      this.hp -= amount
      console.log(`Drone took damage, hp: ${this.hp}/${this.maxHp}`)

      if (this.hp <= 0) {
        this.alive = false
        return true
      }
      return false
    }

    onDeath() {
      // Эффект при смерти
      spawnExplosion(this.x + this.width/2, this.y + this.height/2)
    }
  }

  class NormalDrone extends BaseDrone {

      const drones = gameObjects.filter(o => o instanceof BaseDrone)
      const attackingDrones = drones
        .slice()
        .sort((a, b) => Math.abs(a.x - player.x) - Math.abs(b.x - player.x))
        .slice(0, MAX_ATTACKING_DRONES)

      if (attackingDrones.includes(this) &&
        this.fireTimer >= this.fireCooldown &&
        globalEnemyFireCooldown <= 0) {
        this.shoot()
      }
    }

    shoot() {
      this.fireTimer = 0
      if (countEnemyBullets() < MAX_ENEMY_BULLETS) {
        spawn(new EnemyBullet(
          this.x + this.width / 2,
          this.y + this.height

  class KamikazeDrone extends BaseDrone {
    constructor() {
      // Случайная стартовая позиция
      const side = Math.random()
      let x, y

      if (side < 0.25) {
        x = -50
        y = Math.random() * 200
      } else if (side < 0.5) {
        x = canvas.width + 50
        y = Math.random() * 200
      } else {
        x = Math.random() * canvas.width
        y = -50
      }

      super(x, y, {
        type: 'kamikaze',
        width: 60,
        height: 60,
        hp: 1,
        scoreValue: 30,
        speed: 4,
        frameDelay: 6,
        image: kamikazeImg
      })

      // Расчет направления к игроку
      const dx = player.x - this.x
      const dy = player.y - this.y
      const dist = Math.hypot(dx, dy)

      this.vx = dx / dist * this.speed
      this.vy = dy / dist * this.speed

      this.explosionRadius = 80
    }

    update(delta) {
      // Камикадзе не использует базовое движение
      this.x += this.vx
      this.y += this.vy

      this.frameTimer += delta
      if (this.frameTimer >= this.frameDelay) {
        this.frame = (this.frame + 1) % 4
        this.frameTimer = 0
      }

      // Проверка столкновения с игроком
      if (isColliding(this, player)) {
        this.explode()
      }

      // Проверка удара о землю
      if (this.y > canvas.height - groundHeight) {
        this.explode()
      }
    }

    explode() {
      spawnGroundExplosion(this.x, this.y)

      // Проверка урона игроку
      const dx = player.x + player.width/2 - (this.x + this.width/2)
      const dy = player.y + player.height/2 - (this.y + this.height/2)
      const dist = Math.sqrt(dx*dx + dy*dy)

      if (dist < this.explosionRadius) {
        if (!DEBUG.godMode && player.alive) {
          player.die()
        }
      }

      this.alive = false
    }

    draw(ctx) {
      super.draw(ctx)
      // Визуальный эффект "мигания" перед взрывом
      if (Math.random() < 0.1) {
        ctx.fillStyle = 'rgba(255, 0, 0, 0.3)'
        ctx.beginPath()
        ctx.arc(this.x + this.width/2, this.y + this.height/2, 30, 0, Math.PI * 2)
        ctx.fill()
      }
    }
  }

        this.vx *= 0
      }

      if(keys["ArrowLeft"]){
        this.vx -= this.acceleration
        this.direction = -1
      }

      if(keys["ArrowRight"]){
        this.vx += this.acceleration
        this.direction = 1
      }

      if(this.vx > this.speed) this.vx = this.speed
      if(this.vx < -this.speed) this.vx = -this.speed

      this.vx *= this.friction

      this.x += this.vx
      this.isMoving = Math.abs(this.vx) > 0.1

      if(this.x < 0) this.x = 0
      if(this.x + this.width > canvas.width)
        this.x = canvas.width - this.width

      if(this.isMoving){

        this.frameTimer++

        if(this.frameTimer > 15){
          this.frame++
          this.frameTimer = 0
        }

        if(this.frame >= WALK_FRAMES){
          this.frame = 0
        }
      } else {
        this.frame = 0
      }
    }

    draw(){
      ctx.save()

      if(this.direction === -1){
        ctx.scale(-1,1)

        ctx.drawImage(
          playerWalkSprite,
          this.frame * WALK_FRAME_WIDTH,
          0,
          WALK_FRAME_WIDTH,
          WALK_FRAME_HEIGHT,
          -this.x - this.width,
          this.y,
          this.width,
          this.height
        )
      } else {
        ctx.drawImage(
          playerWalkSprite,
          this.frame * WALK_FRAME_WIDTH,
          0,
          WALK_FRAME_WIDTH,
          WALK_FRAME_HEIGHT,
          this.x,
          this.y,
          this.width,
          this.height
        )
      }
      ctx.restore()

      if (DEBUG.showHitboxes) {
        showHitboxRect(this.x, this.y, this.width, this.height, 'lime')
      }
    }
  }

  class Explosion {
    constructor(x, y, width = EXPLOSION_FRAME_WIDTH, height = EXPLOSION_FRAME_HEIGHT) {
      this.x = x + width/2;
      this.y = y + height/2;
      this.frame = 0;
      this.timer = 0;

      this.alive = true
    }

    update(delta) {
      this.timer += delta;
      if (this.timer >= EXPLOSION_FRAME_DURATION) {
        this.timer = 0;
        this.frame++;
        if (this.frame >= EXPLOSION_FRAME_COUNT) {
          this.alive = false; // взрыв закончился
        }
      }
    }

    draw(ctx) {
      if (this.alive) {
        ctx.drawImage(
          explosionSprite,
          this.frame * EXPLOSION_FRAME_WIDTH, 0,
          EXPLOSION_FRAME_WIDTH, EXPLOSION_FRAME_HEIGHT,
          this.x - EXPLOSION_FRAME_WIDTH/2,
          this.y - EXPLOSION_FRAME_HEIGHT/2,
          EXPLOSION_FRAME_WIDTH, EXPLOSION_FRAME_HEIGHT
        );
      }
    }
  }

  class Grenade {
    constructor(x,y){
      this.x = x
      this.y = y

      this.vy = 3

      this.width = 20
      this.height = 20

      this.timer = 180
      this.onGround = false
      this.exploded = false

      this.alive = true
    }

    update(){
      if(!this.onGround){
        this.y += this.vy

        if(this.y >= canvas.height - groundHeight - this.height){
          this.y = canvas.height - groundHeight - this.height
          this.onGround = true
        }
        return
      }

      // лежит на земле
      this.timer--

      if(this.timer <= 0 && !this.exploded){
        this.exploded = true

        explodeGrenade(this)

        this.alive = false
      }
    }
    draw(){
      if(this.onGround && this.timer < 60){
        if(Math.floor(this.timer/10)%2===0){
          ctx.drawImage(grenadeImg,this.x,this.y,this.width,this.height)

          ctx.beginPath()
          ctx.arc(this.x+10,this.y+10,30,0,Math.PI*2)
          ctx.strokeStyle="red"
          ctx.stroke()
        }
      } else {
        ctx.drawImage(grenadeImg,this.x,this.y,this.width,this.height)
      }
    }
  }

  function explodeGrenade(g){
    spawnGroundExplosion(g.x,g.y)

    const explosionRadius = 80

    const gx = g.x + g.width/2
    const gy = g.y + g.height/2

    const px = player.x + player.width/2
    const py = player.y + player.height/2

    const dx = px - gx
    const dy = py - gy

    const dist = Math.sqrt(dx*dx + dy*dy)

    if(dist < explosionRadius){
      if(!DEBUG.godMode && player.alive){
        player.die()
      }
    }
  }

  function playSound(freq,duration){
    let audioCtx=new (window.AudioContext||window.webkitAudioContext)()
    let osc=audioCtx.createOscillator()
    let gain=audioCtx.createGain()
    osc.connect(gain)
    gain.connect(audioCtx.destination)
    osc.frequency.value=freq
    osc.start()
    gain.gain.exponentialRampToValueAtTime(0.0001,audioCtx.currentTime+duration)
    osc.stop(audioCtx.currentTime+duration)
  }

  function draw() {
    // Очистка канваса
    ctx.clearRect(0, 0, canvas.width, canvas.height)

    // Фон
    if (background.complete) {
      ctx.drawImage(background, 0, 0, canvas.width, canvas.height)
    }

    // Облака
    drawClouds(ctx)

    // Анимированные спрайты
    if (tankSmoke?.alive) tankSmoke.draw(ctx)
    if (citySmoke?.alive) citySmoke.draw(ctx)
    if (cityFire?.alive) cityFire.draw(ctx)

    // Земля
    ctx.fillStyle = "rgba(0,0,0,0)"
    ctx.fillRect(0, canvas.height - groundHeight, canvas.width, groundHeight)

    // Танк
    if (tankImg.complete) {
      ctx.drawImage(tankImg, tank.x, tank.y, tank.w, tank.h)
    }

    // Разрушенный город
    if (destroyedCityImg.complete) {
      ctx.drawImage(destroyedCityImg, destroyedCity.x, destroyedCity.y, destroyedCity.w, destroyedCity.h)
    }

    // Игрок
    if (player?.alive) {
      player.draw()
    }

    // Игровые объекты
    for (const obj of gameObjects) {
      if (obj.alive) {
        obj.draw(ctx)
      }
    }

    // Босс
    const boss = gameObjects.find(o => o instanceof BossDrone && o.alive)
    if (boss?.active) {
      const barWidth = 400
      const barHeight = 20
      const x = (canvas.width - barWidth) / 2
      const y = 20

      ctx.fillStyle = "rgba(255, 0, 0, 0.3)"
      ctx.fillRect(x, y, barWidth, barHeight)

      const healthPercent = boss.hp / boss.maxHp
      ctx.fillStyle = "#00ff00"
      ctx.fillRect(x, y, barWidth * healthPercent, barHeight)

      ctx.strokeStyle = "white"
      ctx.lineWidth = 2
      ctx.strokeRect(x, y, barWidth, barHeight)

      ctx.fillStyle = "white"
      ctx.font = "14px 'Press Start 2P', cursive"
      ctx.textAlign = "center"
      ctx.fillText("BOSS: Обнулитель 3000", canvas.width / 2, y + 40)
    }

    // UI
    ctx.save()
    ctx.fillStyle = "white"
    ctx.font = "20px monospace"
    ctx.shadowColor = "black"
    ctx.shadowBlur = 4
    ctx.shadowOffsetX = 2
    ctx.shadowOffsetY = 2

    ctx.fillText(currentWeapon?.name || "Pistol", 20, 200)
    ctx.fillText(`Ammo: ${ammoInMagazine || 0} / ${currentWeapon?.magazineSize || 15}`, 20, 240)
    ctx.fillText(`Magazines: ${magazines || 0}`, 20, 270)

    if (isReloading) {
      ctx.fillStyle = "yellow"
      ctx.fillText("RELOADING...", 20, 100)
    }
    ctx.restore()

    // Экран смерти
    if (!player?.alive) {
      ctx.save()
      ctx.fillStyle = "rgba(0,0,0,0.7)"
      ctx.fillRect(0, 0, canvas.width, canvas.height)

      ctx.fillStyle = "red"
      ctx.font = "96px 'Press Start 2P'"
      ctx.textAlign = "center"
      ctx.shadowColor = "black"
      ctx.shadowBlur = 10
      ctx.fillText("Ты 200!", canvas.width / 2, canvas.height / 2)
      ctx.restore()
    }

    // UI текст
    document.getElementById("timer").innerText = survivalTime.toFixed(1) + "s"
    document.getElementById("score").innerText = score
  }


  function drawClouds(ctx) {
    if (!cloudsImg?.complete) return

    ctx.save()
    // Сортируем облака по высоте
    const sortedClouds = [...clouds].sort((a, b) => a.y - b.y)

    for (const cloud of sortedClouds) {
      ctx.globalAlpha = cloud.opacity
      ctx.drawImage(
        cloudsImg,
        cloud.x,
        cloud.y,
        cloud.width,
        cloud.height
      )
    }
    ctx.restore()
  }

  let last=0

  function gameLoop(t) {
    if (!gameLoopRunning) {
      // Если игра не активна, делаем длинные паузы
      setTimeout(() => requestAnimationFrame(gameLoop), 100)
      return
    }

    // FPS контроль
    frameCount++
    if (t - lastFrameTime > 1000) {
      fps = frameCount
      frameCount = 0
      lastFrameTime = t
      // Можно показать FPS для отладки
      // console.log('FPS:', fps)
    }

    const rawDelta = Math.min(t - last, 100) // Ограничиваем дельту
    const delta = rawDelta * timeScale
    last = t

    switch(currentState) {
      case GameState.MENU:
        // В меню обновляемся реже
        if (frameCount % 3 === 0) { // Каждый 3-й кадр
          updateMenu(delta)
          drawMenu()
        }
        break

      case GameState.GAME:
        updateGame(delta)
        drawGame()
        break

      case GameState.GAME_OVER:
        if (frameCount % 3 === 0) {
          updateGameOver(delta)
          drawGameOver()
        }
        break
    }

    requestAnimationFrame(gameLoop)
  }

    update(delta)

  if (isMusicOn) {
    menuMusic.play()
  }

    if(isMusicOn){
      menuMusic.play()
    }
  }, { once:true })

  const bar = document.getElementById("loading-bar")

  let progress = 0

  const interval = setInterval(() => {
    progress += 10
    bar.value = progress

    if (progress >= 100) {
      clearInterval(interval)
    }
  }, 100)

  window.addEventListener("load", () => {
    document.getElementById("loading-screen").style.display = "none"
  })

  // Добавьте в конец файла для отладки
  const perfMonitor = {
    frames: 0,
    lastTime: performance.now(),

    update() {
      this.frames++
      const now = performance.now()
      if (now - this.lastTime >= 1000) {
        console.log(`FPS: ${this.frames}, Objects: ${gameObjects.length}`)
        this.frames = 0
        this.lastTime = now
      }
    }
  }
