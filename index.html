  async function crossfadeMusic(from, to, duration=1000){
    if(to){
      to.volume = 0
      to.play()
    }
    const steps = 20
    const stepTime = duration/steps
    for(let i=0;i<=steps;i++){
      const t = i/steps
      if(from) from.volume = 0.2*(1-t)
      if(to)   to.volume = 0.2*t
      await new Promise(r=>setTimeout(r,stepTime))
    }
    if(from) from.pause()
  }

  class Player{
    constructor(){
      this.x = canvas.width/2
      this.y = canvas.height-groundHeight-115

      this.width = 100
      this.height = 130

      this.speed = 3.8
      this.direction = 1

      this.frame = 0
      this.frameTimer = 0
      this.isMoving = false

      this.vx = 0
      this.acceleration = 0.45
      this.friction = 0.88
    }

    update(){
      if(isFirePressed()){
        this.vx *= 0
      }

      if(keys["ArrowLeft"]){
        this.vx -= this.acceleration
        this.direction = -1
      }

      if(keys["ArrowRight"]){
        this.vx += this.acceleration
        this.direction = 1
      }

      if(this.vx > this.speed) this.vx = this.speed
      if(this.vx < -this.speed) this.vx = -this.speed

      this.vx *= this.friction

      this.x += this.vx
      this.isMoving = Math.abs(this.vx) > 0.1

      if(this.x < 0) this.x = 0
      if(this.x + this.width > canvas.width)
        this.x = canvas.width - this.width

      if(this.isMoving){

        this.frameTimer++

        if(this.frameTimer > 15){
          this.frame++
          this.frameTimer = 0
        }

        if(this.frame >= WALK_FRAMES){
          this.frame = 0
        }
      } else {
        this.frame = 0
      }
    }

    draw(){
      ctx.save()

      if(this.direction === -1){

        ctx.scale(-1,1)

        ctx.drawImage(
          playerWalkSprite,
          this.frame * WALK_FRAME_WIDTH,
          0,
          WALK_FRAME_WIDTH,
          WALK_FRAME_HEIGHT,
          -this.x - this.width,
          this.y,
          this.width,
          this.height
        )

      }else{

        ctx.drawImage(
          playerWalkSprite,
          this.frame * WALK_FRAME_WIDTH,
          0,
          WALK_FRAME_WIDTH,
          WALK_FRAME_HEIGHT,
          this.x,
          this.y,
          this.width,
          this.height
        )
      }

      ctx.restore()
    }
  }

  class Drone{
    constructor(y){

      this.width = 80
      this.height = 60

      const side = Math.random() < 0.5 ? "left" : "right"

      if(side === "left"){
        this.x = -this.width
        this.speed = Math.random()*2 + 1
      }else{
        this.x = canvas.width + this.width
        this.speed = -(Math.random()*2 + 1)
      }

      this.y = y

      this.fireTimer = Math.random()*1000
      this.fireCooldown = 800 + Math.random()*1200
    }

    update(delta){
      this.x += this.speed

      if(this.x < -this.width || this.x > canvas.width + this.width){
        this.speed *= -1
      }

      this.y += Math.sin(Date.now()*0.003) * 0.3

      this.fireTimer += delta

      const attackingDrones = drones
        .slice()
        .sort((a,b)=>{
          const da = Math.abs(a.x - player.x)
          const db = Math.abs(b.x - player.x)
          return da - db
        })
        .slice(0, MAX_ATTACKING_DRONES)

      if(
        attackingDrones.includes(this) &&
        this.fireTimer > this.fireCooldown &&
        globalEnemyFireCooldown <= 0
      ){
        this.fireTimer = 0

        if (enemyBullets.length < MAX_ENEMY_BULLETS) {
          enemyBullets.push(
            new EnemyBullet(
              this.x + this.width / 2,
              this.y + this.height
            )
          )

          globalEnemyFireCooldown = 1800 + Math.random()*400
        }

        this.fireCooldown = 1800 + Math.random() * 1200
      }
    }

    draw(){
      ctx.drawImage(
        droneImg,
        this.x,
        this.y,
        this.width,
        this.height
      )
    }
  }

  class Bullet{

    constructor(x,y,dx,dy){

      this.x = x
      this.y = y

      this.dx = dx
      this.dy = dy

      const speed = 9

      const len = Math.hypot(dx,dy) || 1

      this.vx = dx/len * speed
      this.vy = dy/len * speed

      this.size = 6
    }

    update(){
      this.x += this.vx
      this.y += this.vy
    }

    draw(){
      ctx.fillStyle="yellow"
      ctx.fillRect(this.x,this.y,this.size,this.size)
    }
  }

  class EnemyBullet{
    constructor(x,y){
      this.x=x
      this.y=y
      this.speed=4
      this.width = 12
      this.height = 20
    }
    update(){this.y+=this.speed}
    draw(){
      ctx.drawImage(
        enemyBulletImg,
        this.x,
        this.y,
        this.width,
        this.height
      )
    }
  }

  class BossDrone{
    constructor(){
      this.width = 300
      this.height = 260

      this.x = canvas.width/2 - this.width/2
      this.y = -120

      this.speed = 1

      this.hp = 200
      this.maxHp = 200

      this.spawnTimer = 0
      this.missileTimer = 0
    }

    update(delta){

      // плавный въезд на экран
      if(this.y < 40){
        this.y += this.speed
      }

      // спавн дронов
      this.spawnTimer += delta
      if(this.spawnTimer > 2000){
        this.spawnTimer = 0

        for(let i=0;i<4;i++){
          spawnDrone()
        }
      }

      // ракета
      this.missileTimer += delta
      if(this.missileTimer > 3000){
        this.missileTimer = 0

        enemyBullets.push(
          new Missile(
            this.x + this.width/2,
            this.y + this.height,
            player.x + player.width/2
          )
        )
      }
    }

    draw(){
      ctx.drawImage(bossImg,this.x,this.y,this.width,this.height)
    }
  }

  class Missile{
    constructor(x,y,targetX){
      this.x = x
      this.y = y

      this.targetX = targetX

      this.speed = 4
      this.size = 12
    }

    update(){
      if(this.x < this.targetX) this.x += 1.5
      if(this.x > this.targetX) this.x -= 1.5

      this.y += this.speed
    }

    draw(){
      ctx.drawImage(missileImg,this.x,this.y,16,32)
    }
  }

  class Explosion {
    constructor(x, y, width = EXPLOSION_FRAME_WIDTH, height = EXPLOSION_FRAME_HEIGHT) {
      this.x = x + width/2;
      this.y = y + height/2;
      this.frame = 0;
      this.timer = 0;
      this.finished = false;
    }

    update(delta) {
      this.timer += delta;
      if (this.timer >= EXPLOSION_FRAME_DURATION) {
        this.timer = 0;
        this.frame++;
        if (this.frame >= EXPLOSION_FRAME_COUNT) {
          this.finished = true; // взрыв закончился
        }
      }
    }

    draw(ctx) {
      if (!this.finished) {
        ctx.drawImage(
          explosionSprite,
          this.frame * EXPLOSION_FRAME_WIDTH, 0,
          EXPLOSION_FRAME_WIDTH, EXPLOSION_FRAME_HEIGHT,
          this.x - EXPLOSION_FRAME_WIDTH/2,
          this.y - EXPLOSION_FRAME_HEIGHT/2,
          EXPLOSION_FRAME_WIDTH, EXPLOSION_FRAME_HEIGHT
        );
      }
    }
  }

  class GroundExplosion {
    constructor(x, y){
      this.x = x;
      this.y = y - 30;
      this.frame = 0;
      this.timer = 0;
      this.finished = false;
    }

    update(){
      this.timer++;

      if(this.timer % 3 === 0){
        this.frame++;
      }

      if(this.frame >= GROUND_EXPLOSION_FRAMES){
        this.finished = true;
      }
    }

    draw(ctx){
      ctx.drawImage(
        groundExplosionSprite,
        this.frame * GROUND_EXPLOSION_FRAME_WIDTH,
        0,
        GROUND_EXPLOSION_FRAME_WIDTH,
        GROUND_EXPLOSION_FRAME_HEIGHT,
        this.x - GROUND_EXPLOSION_FRAME_WIDTH/2,
        this.y - GROUND_EXPLOSION_FRAME_HEIGHT/2,
        GROUND_EXPLOSION_FRAME_WIDTH,
        GROUND_EXPLOSION_FRAME_HEIGHT
      );
    }
  }

  class Particle{
    constructor(x,y){
      this.x=x;this.y=y;this.size=4
      this.vx=(Math.random()-0.5)*6
      this.vy=(Math.random()-0.5)*6
      this.life=30
    }
    update(){this.x+=this.vx;this.y+=this.vy;this.life--}
    draw(){ctx.fillRect(this.x,this.y,this.size,this.size)}
  }

  let player
  let drones
  let bullets
  let enemyBullets
  let particles

  let dropTimer=0
  let shootCooldown=0
  let globalEnemyFireCooldown = 0

  let score=0
  let survivalTime=0

  let playerName="AAA"

  let leaderboard=[]

  function spawnBoss(){
    boss = new BossDrone()
    bossActive = true
  }

  async function restartGame(){

    const ui = document.getElementById("ui")

    ui.style.display = "none"
    ui.classList.remove("game_over_bg")
    effectsLayer.style.display = "block"

    await fadeScreen()

    gameOverMusic.pause()

    await crossfadeMusic(gameOverMusic, gameMusic)

    droneSound.currentTime = 0
    droneSound.playbackRate = 0.8
    droneSound.volume = 0.001
    droneSound.play()

    // await cinematicStart()

    gameRunning = true

    document.body.classList.add("hide-cursor")

    player = new Player()

    drones = [
      new Drone(canvas.height*0.2),
      new Drone(canvas.height*0.35)
    ]

    bullets = []
    enemyBullets = []
    particles = []

    score = 0
    survivalTime = 0
    spawnTimer = 0
    dropTimer = 0
    shootCooldown = 0
  }

  // ... (Sound, Scoring, Leaderboard functions remain the same)
  function playSound(freq,duration){
    let audioCtx=new (window.AudioContext||window.webkitAudioContext)()
    let osc=audioCtx.createOscillator()
    let gain=audioCtx.createGain()
    osc.connect(gain)
    gain.connect(audioCtx.destination)
    osc.frequency.value=freq
    osc.start()
    gain.gain.exponentialRampToValueAtTime(0.0001,audioCtx.currentTime+duration)
    osc.stop(audioCtx.currentTime+duration)
  }

  function saveScore(){
    leaderboard.push({name:playerName,score:score,time:Math.floor(survivalTime)})
    leaderboard.sort((a,b)=>{
      if(b.score!==a.score) return b.score-a.score
      return b.time-a.time
    })
    leaderboard=leaderboard.slice(0,10)
  }

  async function saveScoreOnline(){
    const {data, error} = await db
      .from("leaderboard")
      .insert([{name: playerName,score: score}])
    if(error){console.error(error)}
  }

  async function loadLeaderboard(){
    const { data } = await db
      .from("leaderboard")
      .select("*")
      .order("score", { ascending:false })
      .limit(5)
    leaderboard = data
    renderLeaderboard()
  }

  function renderLeaderboard(){
    let html="<h3>Top Survivors</h3>"
    leaderboard.forEach((p,i)=>{
      html+=`${i+1}. ${p.name} — ${p.score} pts<br>`
    })
    document.getElementById("leaderboard").innerHTML=html
  }

  let screenShake = {
    intensity: 0,   // сила тряски
    duration: 0,    // сколько кадров тряска длится
    update() {
      if(this.duration > 0){
        this.duration--
        return {
          x: (Math.random() - 0.5) * this.intensity,
          y: (Math.random() - 0.5) * this.intensity
        }
      }
      return {x:0, y:0}
    },
    shake(intensity = 10, duration = 15){
      this.intensity = intensity
      this.duration = duration
    }
  }

  function spawnExplosion(x, y) {
    explosions.push(new Explosion(x, y));

    const s = droneExplosionSound.cloneNode()
    s.volume = 0.2
    s.play()
  }

  function spawnGroundExplosion(x, y){
    groundExplosions.push(new GroundExplosion(x, y));

    const s = groundExplosionSound.cloneNode()
    s.volume = 0.3
    s.play()

    screenShake.shake(6, 20) // сила = 12 пикселей, длительность = 20 кадров
  }

  function spawnDrone(){

    const maxDrones = 50

    if(drones.length >= maxDrones) return

    drones.push(
      new Drone(Math.random() * canvas.height * 0.4)
    )

  }


  async function startGame(){
    playerName = document.getElementById("nameInput").value.toUpperCase()
    if(playerName.length<3) playerName="AAA"

    document.getElementById("ui").style.display = "none"
    gameInfo.style.display = "none"
    effectsLayer.style.display = "block"

    // --- инициализация игрока и массивов до balloon ---
    player = new Player()
    drones = []
    bullets = []
    enemyBullets = []
    particles = []

    // DEBUG: сразу спавним босса
    if(DEBUG.bossStart){
      spawnBoss()
    }

    score = 0
    survivalTime = 0
    dropTimer = 0
    shootCooldown = 0

    await fadeScreen()
    await crossfadeMusic(menuMusic, gameMusic)
    droneSound.volume = 0.1
    droneSound.currentTime = 0
    droneSound.play()

    // --- показываем сообщение командира ---
    await showCommanderMessage(8000)

    gameRunning = true
    document.body.classList.add("hide-cursor")
  }

  async function endGame(){
    gameRunning=false
    document.body.classList.remove("hide-cursor")
    document.getElementById("gameMusic").pause()
    droneSound.pause();

    Object.values(waveMusic).forEach(track => {
      track.pause();
      track.currentTime = 0;
    });

    await fadeScreen()
    await crossfadeMusic(gameMusic, gameOverMusic)
    await saveScoreOnline()
    await loadLeaderboard()
    saveScore()
    const ui=document.getElementById("ui")
    ui.classList.add("game_over_bg")
    ui.innerHTML=`
      <h2 class="current_player_name">${playerName} - Final score: ${score} pts</h2>
      <button class="nes-btn is-success" onclick="restartGame()">Play Again</button>
      <div id="leaderboard"></div>
    `
    ui.style.display="flex"
    gameInfo.style.display="block"
    renderLeaderboard()
  }

  // --- ОБНОВЛЕННАЯ ФУНКЦИЯ UPDATE ---
  function update(delta){

    player.update()

    if (wavePause) {
      wavePauseTimer += delta;

      if (wavePauseTimer >= wavePauseDuration) {
        // пауза окончена — новая волна может стартовать
        wavePause = false;
        waveActive = true;
        wavePauseTimer = 0;

        spawnTimer = 0; // важно
      }
    }

    if(isReloading){

      reloadTimer += delta

      if(reloadTimer > reloadTime){

        ammoInMagazine = magazineSize
        magazines--

        isReloading = false

      }

    }

    if(globalEnemyFireCooldown > 0){
      globalEnemyFireCooldown -= delta
    }

    spawnInterval = Math.max(400, 2000 - survivalTime * 30);
    spawnTimer += delta;


    if (
      spawnTimer >= spawnInterval &&
      waveActive &&
      drones.length < waveMaxInAir &&
      DEBUG.spawnDrones
    ){
      spawnDrone()
      spawnTimer = 0
    }

    if(bossActive && boss){
      boss.update(delta)
    }

    if(isFirePressed() && shootCooldown <= 0){

      const dir = getShootDirection()

      if(!isReloading && ammoInMagazine > 0){

        if (dir) {
          bullets.push(
            new Bullet(
              player.x + player.width/2,
              player.y + 20,
              dir.dx,
              dir.dy
            )
          )
        }

        const randomPitch = 0.9 + Math.random() * 0.4

        shootSound.currentTime = 0
        shootSound.volume = 0.15
        shootSound.playbackRate = randomPitch
        shootSound.play()

        ammoInMagazine--

      } else if(ammoInMagazine <= 0 && !isReloading){

        startReload()

      }

      shootCooldown = 100


    }

    shootCooldown-=delta

    drones.forEach(d=>d.update(delta))

    bullets.forEach(b=>b.update())
    bullets = bullets.filter(b => b.y > -20)
    enemyBullets.forEach(b=>b.update())
    enemyBullets = enemyBullets.filter(b => b.y < canvas.height + 50)
    particles.forEach(p=>p.update())

    for(let bi = bullets.length-1; bi >= 0; bi--){
      let b = bullets[bi]

      for(let di = drones.length-1; di >= 0; di--){
        let d = drones[di]

        if(b.y > d.y + d.height || b.y + b.size < d.y) continue

        if(
          b.x < d.x + d.width &&
          b.x + b.size > d.x &&
          b.y < d.y + d.height &&
          b.y + b.size > d.y
        ){

          spawnExplosion(d.x,d.y)

          const gained = calculateDroneScore()
          score += gained
          showScoreGain(gained)

          bullets.splice(bi,1)
          drones.splice(di,1)

          waveKills++
          break
        }
      }

      if(bossActive && boss){

        if(
          b.x < boss.x + boss.width &&
          b.x + b.size > boss.x &&
          b.y < boss.y + boss.height &&
          b.y + b.size > boss.y
        ){

          boss.hp -= 1
          bullets.splice(bi,1)

          if(boss.hp <= 0){
            boss = null
            bossActive = false

            score += 5000
          }
        }

      }
    }

    enemyBullets.forEach((b,i)=>{
      if(b.y>canvas.height-groundHeight){
        spawnGroundExplosion(b.x, b.y);
        enemyBullets.splice(i,1)
      }
      if(isColliding(b, player)){
        if(!DEBUG.godMode){
          playSound(60,0.5)
          endGame()
        }
      }
    })

    if(particles.length < 200) {
      particles = particles.filter(p => p.life > 0).slice(0, 200)
    }

    explosions.forEach(e => e.update(delta));
    explosions = explosions.filter(e => !e.finished); // убираем законченные
    groundExplosions.forEach(e => e.update());
    groundExplosions = groundExplosions.filter(e => !e.finished);

    survivalTime+=delta/1000

    checkWaveProgress();

    uiTimer += delta

    if(uiTimer > 100) {
      // ОБНОВЛЕНИЕ UI
      document.getElementById("timer").innerText =
        survivalTime.toFixed(1) + "s"

      document.getElementById("score").innerText =
        "Score: " + score

      // ОБНОВЛЕНИЕ НОВОГО СЧЕТЧИКА ЖИВЫХ ДРОНОВ
      // document.getElementById("drones-alive").innerText =
      //   "Alive: " + drones.length;

      uiTimer = 0
    }

    let targetVolume = 0.05 + (drones.length / 50) * 0.25;
    droneSound.volume = targetVolume;
  }

  // ... (Draw and Game Loop remain the same)
  function draw(){
    ctx.clearRect(0,0,canvas.width,canvas.height)
    if(background.complete){
      ctx.drawImage(background,0,0,canvas.width,canvas.height)
    }
    ctx.fillStyle="rgba(0,0,0,0)"
    ctx.fillRect(0,canvas.height-groundHeight,canvas.width,groundHeight)
    ctx.drawImage(
      tankImg,
      tank.x,
      tank.y,
      tank.w,
      tank.h
    )

    const shakeOffset = screenShake.update()

    ctx.save()
    ctx.translate(shakeOffset.x, shakeOffset.y)

    ctx.drawImage(
      destroyedCityImg,
      destroyedCity.x,
      destroyedCity.y,
      destroyedCity.w,
      destroyedCity.h
    )
    player.draw()
    drones.forEach(d=>d.draw())
    bullets.forEach(b=>b.draw())
    enemyBullets.forEach(b=>b.draw())
    particles.forEach(p=>p.draw())
    if(bossActive && boss){
      boss.draw()
    }

    if(bossActive && boss){

      let barWidth = 300
      let hpPercent = boss.hp / boss.maxHp

      ctx.fillStyle="red"
      ctx.fillRect(canvas.width/2 - barWidth/2,20,barWidth*hpPercent,10)

    }

    explosions.forEach(e => e.draw(ctx));
    groundExplosions.forEach(e => e.draw(ctx));

    ctx.fillStyle = "white"
    ctx.font = "20px monospace"

    ctx.fillText(
      "Ammo: " + ammoInMagazine + " / " + magazineSize,
      20,
      240
    )

    ctx.fillText(
      "Magazines: " + magazines,
      20,
      270
    )

    if(isReloading){

      ctx.fillStyle = "yellow"
      ctx.fillText("RELOADING...",20,100)

    }

    ctx.restore()
  }

  let last=0
  function gameLoop(t){
    let delta=t-last
    document.title = Math.round(1000/delta) + " FPS"
    last=t
    if(gameRunning){
      update(delta)
      draw()
    }
    requestAnimationFrame(gameLoop)
  }

  requestAnimationFrame(gameLoop)

  document.getElementById("startBtn").onclick=startGame

  loadLeaderboard()

  menuMusic.volume = 0.1
  menuMusic.play()

  document.body.addEventListener("click", () => {
    menuMusic.play()
  }, { once:true })

  const bar = document.getElementById("loading-bar")

  let progress = 0

  const interval = setInterval(() => {
    progress += 10
    bar.value = progress

    if (progress >= 100) {
      clearInterval(interval)
    }
  }, 100)

  window.addEventListener("load", () => {
    document.getElementById("loading-screen").style.display = "none"
  })
</script>

</body>
