<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Drone Survivor</title>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
  <link href="https://unpkg.com/nes.css@2.3.0/css/nes.min.css" rel="stylesheet" />

  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
  <link rel="manifest" href="/site.webmanifest">

  <style>

    body{
      margin:0;
      overflow:hidden;
      font-family: "Press Start 2P", monospace;

      background-image:url("menu_bg.png");
      background-size: 105%;
      background-position:center;
      background-repeat:no-repeat;
      animation:bgMove 40s linear infinite;

      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    body::before{
      content:"";
      position:fixed;
      left:0;
      top:0;
      width:100%;
      height:100%;

      background:rgba(0,0,0,0.15);
    }

    .game_over_bg {
      background-image: url("game_over_bg.png");
      background-size: cover;
    }

    #ui{
      position:fixed;
      top:0;
      left:0;
      width:100%;
      height:100%;
      display:flex;
      align-items:center;
      flex-direction:column;
      gap: 16px;
      text-align:center;
      padding-top: 20%;

      color: lawngreen;
      text-shadow: 2px 2px black;
    }



    button{
      padding:12px 30px;
      font-size:20px;
      cursor:pointer;
      margin-top:10px;
    }

    #timer{
      position:absolute;
      top:10px;
      right:20px;
      font-size:22px;
      font-weight:bold;
    }

    .hide-cursor{
      cursor: none;
    }

    #score{
      position:absolute;
      top:10px;
      left:20px;
      font-size:34px;
      font-weight:bold;
      color:#ffe066;
      text-shadow:3px 3px black;
      transition:transform 0.15s;
    }

    .score-pop{
      transform:scale(1.25);
    }

    #score-pop{
      position:absolute;
      top:50px;
      left:20px;
      font-size:28px;
      color:#ffff66;
      text-shadow:2px 2px black;
      opacity:0;
      transform:translateY(0);
      transition:all 0.4s ease;
    }

    .score-pop-show{
      opacity:1;
      transform:translateY(-20px);
    }

    /* СТИЛЬ ДЛЯ НОВОГО СЧЕТЧИКА */
    #drones-alive {
      position:absolute;
      top:40px; /* Ниже основного счетчика */
      left:20px;
      font-size:22px;
      font-weight:bold;
      color: #ff4444; /* Красный цвет */
    }

    #leaderboard{
      margin-top:20px;
      font-size: 24px;
      line-height: 1.5;
      color: lawngreen;
    }

    #fade{
      position:fixed;
      left:0;
      top:0;
      width:100%;
      height:100%;
      background:black;
      pointer-events:none;
      opacity:0;
      transition:opacity 0.8s;
      z-index:999;
    }

    #countdown{
      position:fixed;
      top:50%;
      left:50%;
      transform:translate(-50%,-50%);
      font-size:120px;
      font-weight:bold;
      color:white;
      text-shadow:0 0 20px cyan;

      opacity:0;
      pointer-events:none;

      transition:opacity 0.2s, transform 0.2s;

      z-index:1000;
    }

    #muteBtn {
      position: fixed;
      top:40px;
      right:20px;
      width: 30px;
      height: 30px;
      background-image: url(music_icon.png);
      background-size: cover;
      background-color: transparent;
      border: none;
      margin: 0;
      padding: 0;
    }

    #game-info{
      position:fixed;
      bottom:15px;
      left:50%;
      transform:translateX(-50%);
      font-size:10px;
      color:#aaa;
      text-align:center;
      line-height:1.6;
      text-shadow:1px 1px black;
    }

    #game-info a{
      color:#7cff7c;
      text-decoration:none;
    }

    #game-info a:hover{
      text-decoration:underline;
    }

    #loading-screen {
      position: fixed;
      inset: 0;
      background: black;
      z-index: 9999;

      display: flex;
      align-items: center;
      justify-content: center;
    }

    .loading-box {
      width: 300px;
      text-align: center;
      color: white;
    }

    #commander-balloon {
      opacity: 0;
      transition: opacity 0.5s;
    }

    #commander-balloon.show {
      opacity: 1;
    }

    .commander-face {
      display: inline-block;
      width: 100px;
      height: 100px;
      background-image: url('commander.png');
      background-size: cover;
      border-radius: 50%;
      margin-right: 10px;
      vertical-align: middle;
    }

    #game-container{
      position: relative;
      width: 1500px; /* как у канваса */
      height: 800px;
    }

    #game{
      position: absolute;
      left: 0;
      top: 0;
    }

    #effects-layer{
      position:absolute;
      left:0;
      top:0;
      width:100%;
      height:100%;
      pointer-events:none;
      z-index:2;
    }

    .smoke{
      position: absolute;
      width: 80px;
      pointer-events: none; /* чтобы клики проходили в игру */
      z-index: 2;
    }

    .background-moto {
      position: absolute;
      bottom: 90px; /* чтобы «мотоцикл» был на земле */
      right: -200px;  /* старт за экраном */
      width: 30px;
      animation: motoMove 40s linear alternate; /* туда-сюда */
    }

    @keyframes motoMove {
      0% { right: -200px; }
      50% { right: calc(100% - 200px); }
      100% { right: -200px; }
    }

    @keyframes bgMove{

      0%{
        background-position:center top;
      }

      50%{
        background-position:center bottom;
      }

      100%{
        background-position:center top;
      }

    }

    @keyframes blink{

      0%{opacity:1}
      50%{opacity:.9}
      100%{opacity:1}

    }

  </style>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

</head>

<div id="countdown"></div>

<div id="loading-screen">
  <div class="loading-box">

    <progress id="loading-bar" class="nes-progress is-success" value="0" max="100"></progress>

<div id="commander-balloon" style="display:none; max-width:400px; position:absolute; top:20px; left:20px; z-index:10000; font-size:14px;">

      <!-- Balloon -->

</div>

<div id="ui">

  <button id="muteBtn"></button>
  <div class="nes-field">
    <label for="nameInput">Enter your name (3 letters)</label>

  <button id="startBtn" class="nes-btn is-success">Play Game</button>

  <div id="leaderboard">

  </div>

</div>

<div id="game-info">
  <div>Drone Survivor</div>
  <div>Version <span id="game-version"></span></div>
  <div>© 2026 Mikhail Morshinin</div>
  <div>
    <a href="https://github.com/morshinin/drone-survivor" target="_blank">

    </a>

</div>

<script>
  // ... (Supabase config remains the same)
  const SUPABASE_URL = "https://zsdwmjdalfnmvtlwoygs.supabase.co"
  const SUPABASE_KEY = "sb_publishable_B9tdTmqKndQysFngs7vT2Q_TqYVx7bt"

  const db = supabase.createClient(
    SUPABASE_URL,
    SUPABASE_KEY
  )

  const HITBOX_PADDING = 12
  const GAME_VERSION = "0.17.3"

  const MAX_ENEMY_BULLETS = 60
  document.getElementById("game-version").innerText = GAME_VERSION

  const menuMusic = document.getElementById("menuMusic")
  const gameMusic = document.getElementById("gameMusic")
  const droneSound = document.getElementById("droneSound")
  const droneExplosionSound = document.getElementById("droneExplosionSound")
  const groundExplosionSound = document.getElementById("groundExplosionSound")
  const gameOverMusic = document.getElementById("gameOverMusic")
  const gameInfo = document.getElementById("game-info")
  const effectsLayer = document.getElementById("effects-layer")
  const canvas = document.getElementById("game")
  const ctx = canvas.getContext("2d")

  const background = new Image()
  background.src = "game_bg.png"
  const playerImg = new Image()
  playerImg.src = "soldier.png"
  const droneImg = new Image()
  droneImg.src = "mavic.png"
  const enemyBulletImg = new Image()
  enemyBulletImg.src = "drone_bullet.png"
  const bossImg = new Image()
  bossImg.src = "boss.png"
  const missileImg = new Image()
  missileImg.src = "drone_bullet.png"
  const tankImg = new Image()
  tankImg.src = "tank.png"
  const destroyedCityImg = new Image()
  destroyedCityImg.src = "destroyed_city.png"
  const grenadeImg = new Image()
  grenadeImg.src = "grenade.png"
  const kamikazeImg = new Image()
  kamikazeImg.src = "kamikaze.png"

  const smokeGif = new Image()
  smokeGif.src = "smoke.gif"

  effectsLayer.style.display = "none"

  const groundHeight = 40

  let spawnTimer = 0
  let spawnInterval = 2000

  let waveNumber = 0;       // текущая волна
  let waveMaxInAir = 10;    // сколько дронов может быть одновременно
  let waveTargetKills = 40; // сколько нужно сбить
  let waveKills = 0;        // сбитые дроны в волне
  let waveActive = true;    // можно ли спавнить дронов
  let wavePause = false;       // идёт пауза между волнами
  let wavePauseTimer = 0;      // таймер паузы в мс
  const wavePauseDuration = 6000; // 6 секунд пауза

  let gameObjects = []
  let isReloading = false
  let uiTimer = 0
  let keys = {}
  let timeScale = 1

  const tank = {
    x: canvas.width * 0.85,
    y: canvas.height - groundHeight - 150,
    w: 280,
    h: 180
  }

  const destroyedCity = {
    x: 100,
    y: canvas.height - groundHeight - 120,
    w: 180,
    h: 80
  }

  const explosionSprite = new Image();
  explosionSprite.src = "explosion_sprite.png";
  const EXPLOSION_FRAME_WIDTH = 100;
  const EXPLOSION_FRAME_HEIGHT = 100;
  const EXPLOSION_FRAME_COUNT = 4;
  const EXPLOSION_FRAME_DURATION = 100;
  const MAX_ATTACKING_DRONES = 5

  const groundExplosionSprite = new Image();
  groundExplosionSprite.src = "ground_explosion_sprite.png";

  const GROUND_EXPLOSION_FRAMES = 9;
  const GROUND_EXPLOSION_FRAME_WIDTH = 100;
  const GROUND_EXPLOSION_FRAME_HEIGHT = 100;

  const playerWalkSprite = new Image();
  playerWalkSprite.src = "soldier_walk_sprite.png";

  const WALK_FRAMES = 7
  const WALK_FRAME_WIDTH = 100
  const WALK_FRAME_HEIGHT = 130


  let player
  let playerName="AAA"

  let dropTimer=0
  let shootCooldown=0
  let globalEnemyFireCooldown = 0

  let score=0
  let survivalTime=0

  let leaderboard=[]

  let waveMusic = {
    1: new Audio("wave1.mp3"),
    2: new Audio("wave2.mp3"),
    3: new Audio("wave3.mp3"),
    boss: new Audio("boss.mp3")
  }

  for(const key in waveMusic){
    waveMusic[key].loop = false
    waveMusic[key].volume = 0.1
  }

  // DEBUG режим для тестирования
  const DEBUG = {
    bossStart: false,   // начать игру сразу с босса
    godMode: false,     // бессмертие
    spawnDrones: true   // включить/выключить обычных дронов
  }

  const GameState = {
    MENU: "menu",
    GAME: "game",
    GAME_OVER: "game_over"
  }

  let currentState = GameState.MENU

  // ... (Input listeners and utility functions remain the same)
  document.addEventListener("keydown",e=> {
    if(e.code === "Space"){
      shooting = true

      const dir = getShootDirection()

      if(dir && !currentWeapon.auto){
        shoot(dir.dx,dir.dy)
      }
    }
    keys[e.key]=true
  })
  document.addEventListener("keyup",e=> {
    if(e.code === "Space"){
      shooting = false
    }
    keys[e.key]=false
  })

  function spawn(obj){
    gameObjects.push(obj)
  }

  function isFirePressed(){
    return keys[" "] || keys["Space"]
  }

  // DEBUG горячие клавиши
  document.addEventListener("keydown", e => {
    // spawn boss
    if(e.key === "b"){
      spawnBoss()
    }

    // Kill all
    if(e.key === "k"){
    }

    if(e.key === "i"){
      setWeapon('rifle')
    }

    if(e.key === "s"){
      setWeapon('shotgun')
    }

    if(e.key === "m"){
      setWeapon('machinegun')
    }

    if(e.code === "Space"){
      e.preventDefault()
    }

    if(e.code === "KeyR"){
      if(isReloading) return
      startReload()
    }

    // infinite ammo

    keys[e.key] = true
  })

  const WEAPONS = {
    pistol: {
      name: "Pistol",
      magazineSize: 15,
      magazines: 8,
      fireRate: 400, // ms
      reloadTime: 1000,
      auto: false,
      bulletsPerShot: 1,
      bulletSpeed: 11,
      spread: 0,
    },

    rifle: {
      name: "Assault Rifle",
      magazineSize: 30,
      magazines: 6,
      fireRate: 200,
      reloadTime: 2000,
      auto: true,
      bulletsPerShot: 1,
      bulletSpeed: 13,
      spread: 0,
    },

    shotgun: {
      name: "Shotgun",
      magazineSize: 12,
      magazines: 5,
      fireRate: 600,
      reloadTime: 2600,
      auto: false,
      bulletsPerShot: 6,
      bulletSpeed: 10,
      spread: 30,
    },

    machinegun: {
      name: "Machine Gun",
      magazineSize: 120,
      magazines: 2,
      fireRate: 100,
      reloadTime: 5000,
      auto: true,
      bulletsPerShot: 1,
      bulletSpeed: 15,
      spread: 5,
    }
  }

  const WEAPON_SOUNDS = {
    'Pistol':{
      shoot: new Audio("pistol_shot.mp3"),
      reload: new Audio("pistol_reload.mp3")
    },
    'Assault Rifle':{
      shoot: new Audio("rifle_shot.mp3"),
      reload: new Audio("rifle_reload.mp3")
    },
    'Shotgun':{
      shoot: new Audio("shotgun_shot.mp3"),
      reload: new Audio("shotgun_reload.mp3")
    },
    'Machine Gun':{
      shoot: new Audio("machinegun_shot.mp3"),
      reload: new Audio("machinegun_reload.mp3")
    }
  }

  const PLAYER_SOUNDS = {
    death: new Audio("death.mp3"),
  }

  let currentWeapon
  let ammoInMagazine
  let magazines

  function setWeapon(type){
    currentWeapon = structuredClone(WEAPONS[type])

    ammoInMagazine = currentWeapon.magazineSize
    magazines = currentWeapon.magazines

    // можно сбросить перезарядку
    isReloading = false
  }

  let lastShotTime = 0

  function shoot(dirX,dirY){
    if(dirX === 0 && dirY === 0) return
    if(isReloading) return
    if(ammoInMagazine <= 0) return

    if(Date.now() - lastShotTime < currentWeapon.fireRate) return

    lastShotTime = Date.now()

    ammoInMagazine--
    const currentWeaponName = currentWeapon.name
    if (WEAPON_SOUNDS[currentWeaponName]) {
      const s = WEAPON_SOUNDS[currentWeaponName].shoot.cloneNode()
      s.volume = 0.4
      s.play()
    }

    for(let i=0;i<currentWeapon.bulletsPerShot;i++){

      let angle = Math.atan2(dirY,dirX)

      if(currentWeapon.spread > 0){

        const spreadRad =
          (Math.random()*currentWeapon.spread -
            currentWeapon.spread/2) * Math.PI/180

        angle += spreadRad
      }

      const dx = Math.cos(angle)
      const dy = Math.sin(angle)

      const speed = currentWeapon.bulletSpeed

      const x = player.x + player.width/2
      const y = player.y + player.height/2

      spawn(new Bullet(x,y,dx * speed,dy * speed))
    }

    if(ammoInMagazine <= 0 && magazines > 0){
      startReload()
    }
  }

  let shooting = false

  const muteBtn = document.getElementById("muteBtn")

  muteBtn.onclick = () => {
    toggleMusic(); // если музыка выключена, остановим все треки

    !isMusicOn ? muteBtn.classList.add("-muted") : muteBtn.classList.remove("-muted")
  }

  let currentMusic = null

  let isMusicOn = localStorage.getItem("musicOn");
  if (!isMusicOn === null) {
    isMusicOn = true; // по умолчанию музыка включена
  } else {
    isMusicOn = isMusicOn === "true"; // преобразуем строку в boolean
  }

  function playTrack(track) {
    if (isMusicOn) {
      track.play();
    }
  }

  function pauseTrack(track) {
    track.pause();
    track.currentTime = 0;
  }

  function toggleMusic() {
    isMusicOn = !isMusicOn;
    localStorage.setItem("musicOn", isMusicOn);

    if (!isMusicOn) {
      // выключаем всю музыку
      gameMusic.pause();
      gameOverMusic.pause();
      menuMusic.pause();
      Object.values(waveMusic).forEach(track => pauseTrack(track));
    } else {
      menuMusic.play()
    }
  }

  function playWaveMusic(wave){
    if(currentMusic){
      currentMusic.pause()
      currentMusic.currentTime = 0
    }

    const music = waveMusic[wave]

    if(music && isMusicOn){
      music.play()
      currentMusic = music
    }
  }

  function getShootDirection(){
    let dx = 0
    let dy = -1   // по умолчанию вверх

    if(keys["ArrowRight"]){
      dx = 0.7
      dy = -0.7
    }

    if(keys["ArrowLeft"]){
      dx = -0.7
      dy = -0.7
    }

    return {dx, dy}
  }

  function startReload(){
    if(isReloading) return
    if(magazines <= 0) return
    if(ammoInMagazine === currentWeapon.magazineSize) return

    isReloading = true
    const currentWeaponName = currentWeapon.name

    if (WEAPON_SOUNDS[currentWeaponName]) {
      const r = WEAPON_SOUNDS[currentWeaponName].reload.cloneNode()
      r.volume = 0.5
      r.play()
    }

    setTimeout(()=>{

      ammoInMagazine = currentWeapon.magazineSize
      magazines--

      isReloading = false

    },currentWeapon.reloadTime)

  }

  function isColliding(a, b){
    return (
      a.x + HITBOX_PADDING < b.x + b.width - HITBOX_PADDING &&
      a.x + a.width - HITBOX_PADDING > b.x + HITBOX_PADDING &&
      a.y + HITBOX_PADDING < b.y + b.height - HITBOX_PADDING &&
      a.y + a.height - HITBOX_PADDING > b.y + HITBOX_PADDING
    )
  }

  function calculateDroneScore(){
    const base = 10

    const timeMultiplier = 1 + Math.min(survivalTime / 60, 5)
    const droneMultiplier = 1 + Math.min(countDrones() / 20, 4)

    return Math.floor(base * timeMultiplier * droneMultiplier)
  }

  function showScoreGain(points){
    const scoreEl = document.getElementById("score")
    const pop = document.getElementById("score-pop")

    pop.innerText = "+" + points

    pop.classList.remove("score-pop-show")
    void pop.offsetWidth
    pop.classList.add("score-pop-show")

    scoreEl.classList.add("score-pop")

    setTimeout(()=>{
      scoreEl.classList.remove("score-pop")
    },150)
  }

  async function checkWaveProgress() {
    const boss = gameObjects.find(o => o instanceof BossDrone)
    if (wavePause) return;

    if (waveKills >= waveTargetKills) {
      waveActive = false;
    }

    // цель достигнута и небо чистое
    if (!waveActive && countDrones() === 0) {

      wavePause = true;
      wavePauseTimer = 0;

      let msg = "";

      if (waveNumber === 0) {

        gameMusic.pause()

        setWeapon('pistol')
        playWaveMusic(1)

        msg = "Ты еще живой? С передка передают, что к тебе летит новая группа дронов. Некогда с тобой тут говорить. Мне шавуху привезли.";

        waveMaxInAir = 5;
        waveTargetKills = 20;
        magazines = 8;

      } else if (waveNumber === 1) {

        setWeapon('rifle')
        playWaveMusic(2)
        msg = "Эй, людоед! Глянь, этот чубрик еще не 200. Если ты думаешь, что тебе удастся выжить, то выбрось это из головы. Мы уже подали раппорт о том, что ты пропал без вести.";

        waveMaxInAir = 10;
        waveTargetKills = 40;
        magazines = 10;

      } else if (waveNumber === 2) {
        setWeapon('shotgun')
        playWaveMusic(3)
        msg = "Кхм... Пшшш... Мы всем штабом в ахуе! Будем звать тебя терминатор Т-200. Нельзя так держаться за жизнь. Ты что не хочешь, чтобы у папы была новая машина?"
        magazines = 12;
      } else if (waveNumber === 3 && !boss) {
        setWeapon('machinegun')

  async function showCommanderMessage(duration = 10000, message = null){

  async function crossfadeMusic(from, to, duration=1000){
    if(to){
      to.volume = 0
      if (isMusicOn) {
        to.play()
      }
    }
    const steps = 20
    const stepTime = duration/steps
    for(let i=0;i<=steps;i++){
      const t = i/steps
      if(from) from.volume = 0.2*(1-t)
      if(to)   to.volume = 0.2*t
      await new Promise(r=>setTimeout(r,stepTime))
    }
    if(from) from.pause()
  }

  class Player{
    constructor(){
      this.x = canvas.width/2
      this.y = canvas.height-groundHeight-115

      this.width = 100
      this.height = 130

      this.speed = 3.8
      this.direction = 1

      this.frame = 0
      this.frameTimer = 0
      this.isMoving = false

      this.vx = 0
      this.acceleration = 0.45
      this.friction = 0.88

      this.alive = true
      this.deathTimer = 2000
    }

    death() {

    }

    update(){
      if(isFirePressed()){
        this.vx *= 0
      }

      if(keys["ArrowLeft"]){
        this.vx -= this.acceleration
        this.direction = -1
      }

      if(keys["ArrowRight"]){
        this.vx += this.acceleration
        this.direction = 1
      }

      if(this.vx > this.speed) this.vx = this.speed
      if(this.vx < -this.speed) this.vx = -this.speed

      this.vx *= this.friction

      this.x += this.vx
      this.isMoving = Math.abs(this.vx) > 0.1

      if(this.x < 0) this.x = 0
      if(this.x + this.width > canvas.width)
        this.x = canvas.width - this.width

      if(this.isMoving){

        this.frameTimer++

        if(this.frameTimer > 15){
          this.frame++
          this.frameTimer = 0
        }

        if(this.frame >= WALK_FRAMES){
          this.frame = 0
        }
      } else {
        this.frame = 0
      }
    }

    draw(){
      ctx.save()

      if(this.direction === -1){
        ctx.scale(-1,1)

        ctx.drawImage(
          playerWalkSprite,
          this.frame * WALK_FRAME_WIDTH,
          0,
          WALK_FRAME_WIDTH,
          WALK_FRAME_HEIGHT,
          -this.x - this.width,
          this.y,
          this.width,
          this.height
        )
      } else {
        ctx.drawImage(
          playerWalkSprite,
          this.frame * WALK_FRAME_WIDTH,
          0,
          WALK_FRAME_WIDTH,
          WALK_FRAME_HEIGHT,
          this.x,
          this.y,
          this.width,
          this.height
        )
      }
      ctx.restore()
    }
  }

  class Drone{
    constructor(y){
      this.width = 80
      this.height = 60

      const side = Math.random() < 0.5 ? "left" : "right"

      if(side === "left"){
        this.x = -this.width
        this.speed = Math.random()*2 + 1
      }else{
        this.x = canvas.width + this.width
        this.speed = -(Math.random()*2 + 1)
      }

      this.y = y

      this.fireTimer = Math.random()*1000
      this.fireCooldown = 800 + Math.random()*1200

      this.type = Math.random() < 0.2 ? "grenadier" : "normal"

      if(this.type === "grenadier"){
        this.dropTimer = 120 + Math.random()*120
      }

      this.alive = true
    }

    update(delta){
      this.x += this.speed

      if(this.x < -this.width || this.x > canvas.width + this.width){
        this.speed *= -1
      }

      this.y += Math.sin(performance.now()*0.003) * 0.3

      this.fireTimer += delta

      const drones = gameObjects.filter(o => o instanceof Drone)

      const attackingDrones = drones
        .slice()
        .sort((a,b)=>{
          const da = Math.abs(a.x - player.x)
          const db = Math.abs(b.x - player.x)
          return da - db
        })
        .slice(0, MAX_ATTACKING_DRONES)

      if(
        attackingDrones.includes(this) &&
        this.fireTimer > this.fireCooldown &&
        globalEnemyFireCooldown <= 0
      ){
        this.fireTimer = 0

        if (countEnemyBullets() < MAX_ENEMY_BULLETS) {
          spawn(
            new EnemyBullet(
              this.x + this.width / 2,
              this.y + this.height
            )
          )

          globalEnemyFireCooldown = 1800 + Math.random()*400
        }
        this.fireCooldown = 1800 + Math.random() * 1200
      }

      if(this.type === "grenadier"){
        this.dropTimer--

        if(this.dropTimer <= 0){
          spawn(new Grenade(this.x,this.y))

          this.dropTimer = 180 + Math.random()*120
        }
      }
    }

    draw(){
      ctx.drawImage(
        droneImg,
        this.x,
        this.y,
        this.width,
        this.height
      )
    }
  }

  class Explosion {
    constructor(x, y, width = EXPLOSION_FRAME_WIDTH, height = EXPLOSION_FRAME_HEIGHT) {
      this.x = x + width/2;
      this.y = y + height/2;
      this.frame = 0;
      this.timer = 0;

      this.alive = true
    }

    update(delta) {
      this.timer += delta;
      if (this.timer >= EXPLOSION_FRAME_DURATION) {
        this.timer = 0;
        this.frame++;
        if (this.frame >= EXPLOSION_FRAME_COUNT) {
          this.alive = false; // взрыв закончился
        }
      }
    }

    draw(ctx) {
      if (this.alive) {
        ctx.drawImage(
          explosionSprite,
          this.frame * EXPLOSION_FRAME_WIDTH, 0,
          EXPLOSION_FRAME_WIDTH, EXPLOSION_FRAME_HEIGHT,
          this.x - EXPLOSION_FRAME_WIDTH/2,
          this.y - EXPLOSION_FRAME_HEIGHT/2,
          EXPLOSION_FRAME_WIDTH, EXPLOSION_FRAME_HEIGHT
        );
      }
    }
  }

  class Grenade {
    constructor(x,y){
      this.x = x
      this.y = y

      this.vy = 3

      this.width = 20
      this.height = 20

      this.timer = 180
      this.onGround = false
      this.exploded = false

      this.alive = true
    }

    update(){
      if(!this.onGround){
        this.y += this.vy

        if(this.y >= canvas.height - groundHeight - this.height){
          this.y = canvas.height - groundHeight - this.height
          this.onGround = true
        }
        return
      }

      // лежит на земле
      this.timer--

      if(this.timer <= 0 && !this.exploded){
        this.exploded = true

        explodeGrenade(this)

        this.alive = false
      }
    }
    draw(){
      if(this.onGround && this.timer < 60){
        if(Math.floor(this.timer/10)%2===0){
          ctx.drawImage(grenadeImg,this.x,this.y,this.width,this.height)

          ctx.beginPath()
          ctx.arc(this.x+10,this.y+10,30,0,Math.PI*2)
          ctx.strokeStyle="red"
          ctx.stroke()
        }
      } else {
        ctx.drawImage(grenadeImg,this.x,this.y,this.width,this.height)
      }
    }
  }

  function explodeGrenade(g){
    spawnGroundExplosion(g.x,g.y)

    const explosionRadius = 80

    const gx = g.x + g.width/2
    const gy = g.y + g.height/2

    const px = player.x + player.width/2
    const py = player.y + player.height/2

    const dx = px - gx
    const dy = py - gy

    const dist = Math.sqrt(dx*dx + dy*dy)

    if(dist < explosionRadius){
      if(!DEBUG.godMode){
        playSound(60,0.5)
        endGame()
      }
    }
  }

  class KamikazeDrone{
    constructor(){
      const side = Math.random()

      if(side < 0.25){
        this.x = -50
        this.y = Math.random()*200
      }
      else if(side < 0.5){
        this.x = canvas.width + 50
        this.y = Math.random()*200
      }
      else{
        this.x = Math.random()*canvas.width
        this.y = -50
      }

      const dx = player.x - this.x
      const dy = player.y - this.y

      const dist = Math.hypot(dx,dy)

      this.vx = dx/dist * 4
      this.vy = dy/dist * 4

      this.width = 60
      this.height = 60

      this.alive = true
    }

    update(){

      this.x += this.vx
      this.y += this.vy

      // столкновение с игроком

  function playSound(freq,duration){
    let audioCtx=new (window.AudioContext||window.webkitAudioContext)()
    let osc=audioCtx.createOscillator()
    let gain=audioCtx.createGain()
    osc.connect(gain)
    gain.connect(audioCtx.destination)
    osc.frequency.value=freq
    osc.start()
    gain.gain.exponentialRampToValueAtTime(0.0001,audioCtx.currentTime+duration)
    osc.stop(audioCtx.currentTime+duration)
  }

  function update(delta){
    if(!player.alive){
      player.deathTimer -= delta

      if(player.deathTimer <= 0){
        timeScale = 1
        endGame()
      }
    }

    player.update()

    if (wavePause) {
      wavePauseTimer += delta;

      if (wavePauseTimer >= wavePauseDuration) {
        // пауза окончена — новая волна может стартовать
        wavePause = false;
        waveActive = true;
        wavePauseTimer = 0;

        spawnTimer = 0; // важно
      }
    }

    if(globalEnemyFireCooldown > 0){
      globalEnemyFireCooldown -= delta
    }

    spawnInterval = Math.max(400, 2000 - survivalTime * 30);
    spawnTimer += delta;

    if (
      spawnTimer >= spawnInterval &&
      waveActive &&
      countDrones() < waveMaxInAir &&
      DEBUG.spawnDrones
    ){
      spawnDrone()
      spawnTimer = 0
    }

    shootCooldown-=delta


    if(player.alive && shooting && currentWeapon.auto) {
      const dir = getShootDirection()
      shoot(dir.dx,dir.dy)
    }

    const boss = gameObjects.find(o => o instanceof BossDrone)
    const bullets = gameObjects.filter(o => o instanceof Bullet)
    const drones = gameObjects.filter(o => o instanceof Drone)

    bullets.forEach(b => {
      drones.forEach(d => {
        if(
          b.x < d.x + d.width &&
          b.x + b.size > d.x &&
          b.y < d.y + d.height &&
          b.y + b.size > d.y
        ){
          b.alive = false
          d.alive = false

          spawnExplosion(d.x,d.y)

          const gained = calculateDroneScore()
          score += gained
          showScoreGain(gained)

          waveKills++
        }
      })

      if(boss && boss.alive){
        if(
          b.x < boss.x + boss.width &&
          b.x + b.size > boss.x &&
          b.y < boss.y + boss.height &&
          b.y + b.size > boss.y
        ){
          b.alive = false
          boss.hp -= 1
          score += 10

          if(boss.hp <= 0){
            boss.alive = false
            boss.active = false
            spawnExplosion(boss.x + boss.width/2, boss.y + boss.height/2)

            score += 5000
          }
        }
      }
    })

    gameObjects.forEach(obj=>{
      obj.update(delta)
    })

    gameObjects = gameObjects.filter(obj => obj.alive)

    gameObjects.forEach(obj => {
      if(obj instanceof EnemyBullet){
        if(obj.y > canvas.height - groundHeight){
          spawnGroundExplosion(obj.x, obj.y)
          obj.alive = false
        }

        if(isColliding(obj, player)){
          if(!DEBUG.godMode && player.alive){
            player.alive = false

            timeScale = 0.25
            screenShake.shake(20, 500)

            spawnExplosion(
              player.x + player.width/2,
              player.y + player.height/2
            )

            const s = PLAYER_SOUNDS['death'].cloneNode()
            s.volume = 0.4
            s.play()
            // playSound(60,0.5)
            // endGame()
          }
        }
      }
    })

    survivalTime+=delta/1000

    checkWaveProgress();

    uiTimer += delta

    if(uiTimer > 100) {
      // ОБНОВЛЕНИЕ UI
      document.getElementById("timer").innerText =
        survivalTime.toFixed(1) + "s"

      document.getElementById("score").innerText =
        "Score: " + score

      uiTimer = 0
    }

    let targetVolume = 0.05 + (countDrones() / 50) * 0.25;
    droneSound.volume = targetVolume;
  }

  // ... (Draw and Game Loop remain the same)
  function draw(){
    ctx.clearRect(0,0,canvas.width,canvas.height)
    if(background.complete){
      ctx.drawImage(background,0,0,canvas.width,canvas.height)
    }
    ctx.fillStyle="rgba(0,0,0,0)"
    ctx.fillRect(0,canvas.height-groundHeight,canvas.width,groundHeight)
    ctx.drawImage(
      tankImg,
      tank.x,
      tank.y,
      tank.w,
      tank.h
    )

    const shakeOffset = screenShake.update()

    ctx.save()
    ctx.translate(shakeOffset.x, shakeOffset.y)

    ctx.drawImage(
      destroyedCityImg,
      destroyedCity.x,
      destroyedCity.y,
      destroyedCity.w,
      destroyedCity.h
    )

    if (player.alive){
      player.draw()
    }

    gameObjects.forEach(obj=>{
      obj.draw(ctx)
    })

    const boss = gameObjects.find(o => o instanceof BossDrone && o.alive);

    if (boss && boss.active) {
      const barWidth = 400;
      const barHeight = 20;
      const x = (canvas.width - barWidth) / 2;
      const y = 20;

      // Фон полоски (красный)
      ctx.fillStyle = "rgba(255, 0, 0, 0.3)";
      ctx.fillRect(x, y, barWidth, barHeight);

      // Текущее здоровье (зеленый)
      const healthPercent = boss.hp / boss.maxHp;
      ctx.fillStyle = "#00ff00";
      ctx.fillRect(x, y, barWidth * healthPercent, barHeight);

      // Рамка
      ctx.strokeStyle = "white";
      ctx.lineWidth = 2;
      ctx.strokeRect(x, y, barWidth, barHeight);

      // Надпись
      ctx.fillStyle = "white";
      ctx.font = "14px 'Press Start 2P', cursive";
      ctx.textAlign = "center";
      ctx.fillText("BOSS: NEURAL REAPER", canvas.width / 2, y + 40);
    }

    ctx.fillStyle = "white"
    ctx.font = "20px monospace"

    ctx.fillText(
      "Ammo: " + ammoInMagazine + " / " + currentWeapon.magazineSize,
      20,
      240
    )

    ctx.fillText(
      "Magazines: " + magazines,
      20,
      270
    )

    ctx.fillText(
      currentWeapon.name,
      20,
      200
    )

    if(isReloading){
      ctx.fillStyle = "yellow"
      ctx.fillText("RELOADING...",20,100)
    }

    if(!player.alive){
      ctx.fillStyle = "rgba(0,0,0,0.4)"
      ctx.fillRect(0,0,canvas.width,canvas.height)

      ctx.fillStyle = "red"
      ctx.font = "60px 'Press Start 2P'"
      ctx.textAlign = "center"

      ctx.fillText(
        "Ты 200!",
        canvas.width/2,
        canvas.height/2
      )
    }

    ctx.restore()
  }

  let last=0

  function gameLoop(t){
    // const delta = t - last
    const rawDelta = t - last
    const delta = rawDelta * timeScale
    last = t

    switch(currentState){

      case GameState.MENU:
        updateMenu(delta)
        drawMenu()
        break

      case GameState.GAME:
        updateGame(delta)
        drawGame()
        break

      case GameState.GAME_OVER:
        updateGameOver(delta)
        drawGameOver()
        break
    }

    requestAnimationFrame(gameLoop)
  }

  function updateMenu(delta){

  }

  function drawMenu(){

  }

  function updateGame(delta){
    update(delta)
  }

  function drawGame(){
    draw()
  }

  function updateGameOver(delta){

  }

  function drawGameOver(){

  }

  requestAnimationFrame(gameLoop)

  document.getElementById("startBtn").onclick=startGame

  loadLeaderboard()

  menuMusic.volume = 0.1
  if (isMusicOn) {
    menuMusic.play()
  }

  document.body.addEventListener("click", () => {
    if(isMusicOn){
      menuMusic.play()
    }
  }, { once:true })

  const bar = document.getElementById("loading-bar")

  let progress = 0

  const interval = setInterval(() => {
    progress += 10
    bar.value = progress

    if (progress >= 100) {
      clearInterval(interval)
    }
  }, 100)

  window.addEventListener("load", () => {
    document.getElementById("loading-screen").style.display = "none"
  })
</script>
