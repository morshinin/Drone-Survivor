<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Drone Survivor</title>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
  <link href="https://unpkg.com/nes.css@2.3.0/css/nes.min.css" rel="stylesheet" />

  <style>

    body{
      margin:0;
      overflow:hidden;
      font-family: "Press Start 2P", monospace;

      background-image:url("menu_bg.png");
      background-size: 105%;
      background-position:center;
      background-repeat:no-repeat;
      animation:bgMove 40s linear infinite;
    }

    body::before{
      content:"";
      position:fixed;
      left:0;
      top:0;
      width:100%;
      height:100%;

      background:rgba(0,0,0,0.15);
    }

    .game_over_bg {
      background-image: url("game_over_bg.png");
      background-size: cover;
    }

    #ui{
      position:fixed;
      top:0;
      left:0;
      width:100%;
      height:100%;
      display:flex;
      align-items:center;
      /*justify-content:center;*/
      flex-direction:column;
      text-align:center;
      padding-top: 20%;

      color: lawngreen;
      text-shadow: 2px 2px black;
    }



    button{
      padding:12px 30px;
      font-size:20px;
      cursor:pointer;
      margin-top:10px;
    }

    #timer{
      position:absolute;
      top:10px;
      right:20px;
      font-size:22px;
      font-weight:bold;
    }

    .hide-cursor{
      cursor: none;
    }

    /*#score{*/
    /*  position:absolute;*/
    /*  top:10px;*/
    /*  left:20px;*/
    /*  font-size:22px;*/
    /*  font-weight:bold;*/
    /*}*/
    #score{
      position:absolute;
      top:10px;
      left:20px;
      font-size:34px;
      font-weight:bold;
      color:#ffe066;
      text-shadow:3px 3px black;
      transition:transform 0.15s;
    }

    .score-pop{
      transform:scale(1.25);
    }

    #score-pop{
      position:absolute;
      top:50px;
      left:20px;
      font-size:28px;
      color:#ffff66;
      text-shadow:2px 2px black;
      opacity:0;
      transform:translateY(0);
      transition:all 0.4s ease;
    }

    .score-pop-show{
      opacity:1;
      transform:translateY(-20px);
    }

    /* СТИЛЬ ДЛЯ НОВОГО СЧЕТЧИКА */
    #drones-alive {
      position:absolute;
      top:40px; /* Ниже основного счетчика */
      left:20px;
      font-size:22px;
      font-weight:bold;
      color: #ff4444; /* Красный цвет */
    }

    #leaderboard{
      margin-top:20px;
      font-size: 24px;
      line-height: 1.5;
      color: lawngreen;
    }

    #fade{
      position:fixed;
      left:0;
      top:0;
      width:100%;
      height:100%;
      background:black;
      pointer-events:none;
      opacity:0;
      transition:opacity 0.8s;
      z-index:999;
    }

    #countdown{
      position:fixed;
      top:50%;
      left:50%;
      transform:translate(-50%,-50%);
      font-size:120px;
      font-weight:bold;
      color:white;
      text-shadow:0 0 20px cyan;

      opacity:0;
      pointer-events:none;

      transition:opacity 0.2s, transform 0.2s;

      z-index:1000;
    }

    #muteBtn {
      position: fixed;
      top:40px;
      right:20px;
      width: 30px;
      height: 30px;
      background-image: url(music_icon.png);
      background-size: cover;
      background-color: transparent;
      border: none;
      margin: 0;
      padding: 0;
    }

    #game-info{
      position:fixed;
      bottom:15px;
      left:50%;
      transform:translateX(-50%);
      font-size:10px;
      color:#aaa;
      text-align:center;
      line-height:1.6;
      text-shadow:1px 1px black;
    }

    #game-info a{
      color:#7cff7c;
      text-decoration:none;
    }

    #game-info a:hover{
      text-decoration:underline;
    }

    .loader {
      width: 40px;
      aspect-ratio: 1;
      color: lawngreen;
      position: relative;
      background: radial-gradient(10px,currentColor 94%,#0000);
    }
    .loader:before {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: 50%;
      background:
          radial-gradient(9px at bottom right,#0000 94%,currentColor) top    left,
          radial-gradient(9px at bottom left ,#0000 94%,currentColor) top    right,
          radial-gradient(9px at top    right,#0000 94%,currentColor) bottom left,
          radial-gradient(9px at top    left ,#0000 94%,currentColor) bottom right;
      background-size: 20px 20px;
      background-repeat: no-repeat;
      animation: l18 1.5s infinite cubic-bezier(0.3,1,0,1);
    }
    @keyframes l18 {
      33%  {inset:-10px;transform: rotate(0deg)}
      66%  {inset:-10px;transform: rotate(90deg)}
      100% {inset:0    ;transform: rotate(90deg)}
    }

    @keyframes bgMove{

      0%{
        background-position:center top;
      }

      50%{
        background-position:center bottom;
      }

      100%{
        background-position:center top;
      }

    }

    @keyframes blink{

      0%{opacity:1}
      50%{opacity:.9}
      100%{opacity:1}

    }

  </style>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

</head>

<body>

<canvas id="game"></canvas>

<div id="fade"></div>

<div id="timer"></div>
<div id="score"></div>
<div id="score-pop"></div>
<div id="drones-alive"></div>
<audio id="menuMusic" src="menu.mp3" loop></audio>
<audio id="gameMusic" src="game.mp3" loop></audio>
<audio id="droneSound" src="drone_sound.mp3" loop></audio>
<audio id="droneExplosion" src="drone_explosion.mp3"></audio>
<audio id="shootSound" src="pistol_shot.mp3"></audio>
<audio id="gameOverMusic" src="gameover.mp3" loop></audio>
<audio id="beep" src="beep.mp3"></audio>

<div id="countdown"></div>

<div id="ui">

  <button id="muteBtn"></button>
  <div class="nes-field">
    <label for="nameInput">Enter your name (3 letters)</label>
    <input id="nameInput" maxlength="3" type="text" class="nes-input">
  </div>

  <button id="startBtn" class="nes-btn is-success">Play Game</button>

  <div id="leaderboard">

    <div id="leaderboard-loading" class="loader">
    </div>

    <div id="leaderboard-list" style="display:none"></div>

  </div>

</div>

<div id="game-info">
  <div>Drone Survivor</div>
  <div>Version <span id="game-version"></span></div>
  <div>© 2026 Mikhail Morshinin</div>
  <div>
    <a href="https://github.com/morshinin/drone-survivor" target="_blank">
      GitHub
    </a>
  </div>
</div>

<script>
  // ... (Supabase config remains the same)
  const SUPABASE_URL = "https://zsdwmjdalfnmvtlwoygs.supabase.co"
  const SUPABASE_KEY = "sb_publishable_B9tdTmqKndQysFngs7vT2Q_TqYVx7bt"

  const db = supabase.createClient(
    SUPABASE_URL,
    SUPABASE_KEY
  )

  const HITBOX_PADDING = 12
  const GAME_VERSION = "0.7.0"
  document.getElementById("game-version").innerText = GAME_VERSION

  const menuMusic = document.getElementById("menuMusic")
  const gameMusic = document.getElementById("gameMusic")
  const droneSound = document.getElementById("droneSound")
  const droneExplosion = document.getElementById("droneExplosion")
  const shootSound = document.getElementById("shootSound")
  const gameOverMusic = document.getElementById("gameOverMusic")
  const canvas = document.getElementById("game")
  const ctx = canvas.getContext("2d")

  const background = new Image()
  background.src = "game_bg.png"
  const playerImg = new Image()
  playerImg.src = "soldier.png"
  const droneImg = new Image()
  droneImg.src = "drone.png"
  const enemyBulletImg = new Image()
  enemyBulletImg.src = "drone_bullet.png"

  canvas.width = window.innerWidth
  canvas.height = window.innerHeight

  const groundHeight = 40

  let keys = {}
  let gameRunning = false

  // ... (Input listeners and utility functions remain the same)
  document.addEventListener("keydown",e=>keys[e.key]=true)
  document.addEventListener("keyup",e=>keys[e.key]=false)

  let isMuted = false

  const allMusic = [menuMusic, gameMusic, droneSound, gameOverMusic]

  const muteBtn = document.getElementById("muteBtn")

  muteBtn.onclick = () => {
    isMuted = !isMuted
    allMusic.forEach(m => m.volume = isMuted ? 0 : 0.4) // базовый уровень для всех треков
    isMuted ? muteBtn.classList.add("-muted") : muteBtn.classList.remove("-muted")
  }

  function isColliding(a, b){
    return (
      a.x + HITBOX_PADDING < b.x + b.width - HITBOX_PADDING &&
      a.x + a.width - HITBOX_PADDING > b.x + HITBOX_PADDING &&
      a.y + HITBOX_PADDING < b.y + b.height - HITBOX_PADDING &&
      a.y + a.height - HITBOX_PADDING > b.y + HITBOX_PADDING
    )
  }

  function calculateDroneScore(){
    const base = 10

    const timeMultiplier = 1 + Math.min(survivalTime / 60, 5)
    const droneMultiplier = 1 + Math.min(drones.length / 20, 4)

    return Math.floor(base * timeMultiplier * droneMultiplier)
  }

  function showScoreGain(points){
    const scoreEl = document.getElementById("score")
    const pop = document.getElementById("score-pop")

    pop.innerText = "+" + points

    pop.classList.remove("score-pop-show")
    void pop.offsetWidth
    pop.classList.add("score-pop-show")

    scoreEl.classList.add("score-pop")

    setTimeout(()=>{
      scoreEl.classList.remove("score-pop")
    },150)
  }

  function fadeScreen(duration=800){
    const f = document.getElementById("fade")
    return new Promise(resolve=>{
      f.style.transition = `opacity ${duration/2}ms`
      f.style.opacity = 1
      setTimeout(()=>{
        f.style.opacity = 0
        setTimeout(resolve, duration/2)
      }, duration/2)
    })
  }

  async function crossfadeMusic(from, to, duration=1000){
    if(to){
      to.volume = 0
      to.play()
    }
    const steps = 20
    const stepTime = duration/steps
    for(let i=0;i<=steps;i++){
      const t = i/steps
      if(from) from.volume = 0.2*(1-t)
      if(to)   to.volume = 0.2*t
      await new Promise(r=>setTimeout(r,stepTime))
    }
    if(from) from.pause()
  }

  function sleep(ms){
    return new Promise(r=>setTimeout(r,ms))
  }

  async function cinematicStart(){
    const el = document.getElementById("countdown")
    const steps = ["3","2","1","START"]
    for(const s of steps){
      document.getElementById("beep").currentTime=0
      document.getElementById("beep").play()
      el.innerText = s
      el.style.opacity = 1
      el.style.transform = "translate(-50%,-50%) scale(1.3)"
      await sleep(120)
      el.style.transform = "translate(-50%,-50%) scale(1)"
      await sleep(650)
      el.style.opacity = 0
      await sleep(200)
    }
  }

  // ... (Classes: Player, Drone, Bullet, EnemyBullet, Particle remain the same)
  class Player{
    constructor(){
      this.x = canvas.width/2
      this.y = canvas.height-groundHeight-100

      this.width = 60
      this.height = 100

      this.speed = 6
      this.direction = 1
    }

    update(){
      if(keys["ArrowLeft"]){
        this.x -= this.speed
        this.direction = -1
      }

      if(keys["ArrowRight"]){
        this.x += this.speed
        this.direction = 1
      }

      if(this.x < 0) this.x = 0
      if(this.x + this.width > canvas.width)
        this.x = canvas.width - this.width
    }

    draw(){
      ctx.save()

      if(this.direction === -1){

        ctx.scale(-1,1)

        ctx.drawImage(
          playerImg,
          -this.x - this.width,
          this.y,
          this.width,
          this.height
        )

      }else{

        ctx.drawImage(
          playerImg,
          this.x,
          this.y,
          this.width,
          this.height
        )

      }

      ctx.restore()
    }
  }

  class Drone{
    constructor(y){
      this.width=80
      this.height=20
      this.x=Math.random()*canvas.width
      this.y=y
      this.speed=(Math.random()*2+1)*(Math.random()<0.5?-1:1)
    }
    update(){
      this.x+=this.speed
      if(this.x<0 || this.x+this.width>canvas.width){
        this.speed*=-1
      }
      this.y += Math.sin(Date.now()*0.003) * 0.3
    }
    draw(){
      ctx.drawImage(
        droneImg,
        this.x,
        this.y,
        this.width,
        this.height
      )
    }
  }

  class Bullet{
    constructor(x,y){
      this.size=6
      this.x=x
      this.y=y
      this.speed=9
    }
    update(){this.y-=this.speed}
    draw(){
      ctx.fillStyle="yellow"
      ctx.fillRect(this.x,this.y,this.size,this.size)
    }
  }

  class EnemyBullet{
    constructor(x,y){
      this.x=x
      this.y=y
      this.speed=4
      this.width = 16
      this.height = 32
    }
    update(){this.y+=this.speed}
    draw(){
      ctx.drawImage(
        enemyBulletImg,
        this.x,
        this.y,
        this.width,
        this.height
      )
    }
  }

  class Particle{
    constructor(x,y){
      this.x=x;this.y=y;this.size=4
      this.vx=(Math.random()-0.5)*6
      this.vy=(Math.random()-0.5)*6
      this.life=30
    }
    update(){this.x+=this.vx;this.y+=this.vy;this.life--}
    draw(){ctx.fillRect(this.x,this.y,this.size,this.size)}
  }

  let player
  let drones
  let bullets
  let enemyBullets
  let particles

  let dropTimer=0
  let shootCooldown=0

  let score=0
  let survivalTime=0

  let playerName="AAA"

  let leaderboard=[]

  async function restartGame(){

    const ui = document.getElementById("ui")

    ui.style.display = "none"
    ui.classList.remove("game_over_bg")

    await fadeScreen()

    gameOverMusic.pause()

    await crossfadeMusic(gameOverMusic, gameMusic)

    droneSound.currentTime = 0
    droneSound.play()

    await cinematicStart()

    gameRunning = true

    document.body.classList.add("hide-cursor")

    player = new Player()

    drones = [
      new Drone(canvas.height*0.2),
      new Drone(canvas.height*0.35)
    ]

    bullets = []
    enemyBullets = []
    particles = []

    score = 0
    survivalTime = 0
    dropTimer = 0
    shootCooldown = 0
  }

  // ... (Sound, Scoring, Leaderboard functions remain the same)
  function playSound(freq,duration){
    let audioCtx=new (window.AudioContext||window.webkitAudioContext)()
    let osc=audioCtx.createOscillator()
    let gain=audioCtx.createGain()
    osc.connect(gain)
    gain.connect(audioCtx.destination)
    osc.frequency.value=freq
    osc.start()
    gain.gain.exponentialRampToValueAtTime(0.0001,audioCtx.currentTime+duration)
    osc.stop(audioCtx.currentTime+duration)
  }

  function saveScore(){
    leaderboard.push({name:playerName,score:score,time:Math.floor(survivalTime)})
    leaderboard.sort((a,b)=>{
      if(b.score!==a.score) return b.score-a.score
      return b.time-a.time
    })
    leaderboard=leaderboard.slice(0,10)
  }

  async function saveScoreOnline(){
    const {data, error} = await db
      .from("leaderboard")
      .insert([{name: playerName,score: score}])
    if(error){console.error(error)}
  }

  // async function loadLeaderboard(){
  //   const { data } = await db
  //     .from("leaderboard")
  //     .select("*")
  //     .order("score", { ascending:false })
  //     .limit(5)
  //   leaderboard = data
  //   renderLeaderboard()
  // }

  async function loadLeaderboard() {

    const loading = document.getElementById("leaderboard-loading")
    const list = document.getElementById("leaderboard-list")

    loading.style.display = "block"
    list.style.display = "none"

    const { data, error } = await db
      .from("leaderboard")
      .select("*")
      .order("score", { ascending: false })
      .limit(5)

    if (error) {
      loading.innerText = "Failed to load leaderboard"
      return
    }

    loading.style.display = "none"
    list.style.display = "block"

    leaderboard = data
    renderLeaderboard()
  }


  function renderLeaderboard(){
    let html="<h3>Top Survivors</h3>"
    leaderboard.forEach((p,i)=>{
      html+=`${i+1}. ${p.name} — ${p.score} pts<br>`
    })
    document.getElementById("leaderboard").innerHTML=html
  }

  function spawnExplosion(x,y){
    for(let i=0;i<12;i++) particles.push(new Particle(x,y))
  }

  async function startGame(){
    playerName=document.getElementById("nameInput").value.toUpperCase()
    if(playerName.length<3) playerName="AAA"
    document.getElementById("ui").style.display="none"
    await fadeScreen()
    await crossfadeMusic(menuMusic, gameMusic)
    droneSound.volume = 0.1; // Сделаем его тихим фоном, чтобы не перебивал музыку
    droneSound.currentTime = 0;
    droneSound.play();
    await cinematicStart()
    gameRunning=true
    document.body.classList.add("hide-cursor")
    player=new Player()
    drones=[new Drone(canvas.height*0.2),new Drone(canvas.height*0.35)]
    bullets=[];enemyBullets=[];particles=[]
    score=0;survivalTime=0
  }

  async function endGame(){
    gameRunning=false
    document.body.classList.remove("hide-cursor")
    document.getElementById("gameMusic").pause()
    droneSound.pause();
    await fadeScreen()
    await crossfadeMusic(gameMusic, gameOverMusic)
    await saveScoreOnline()
    await loadLeaderboard()
    saveScore()
    const ui=document.getElementById("ui")
    ui.classList.add("game_over_bg")
    ui.innerHTML=`
      <h2 class="current_player_name">${playerName} - Final score: ${score} pts</h2>
      <button class="nes-btn is-success" onclick="restartGame()">Play Again</button>
      <div id="leaderboard"></div>
    `
    ui.style.display="flex"
    renderLeaderboard()
  }

  // --- ОБНОВЛЕННАЯ ФУНКЦИЯ UPDATE ---
  function update(delta){

    player.update()

    if(shootCooldown<=0){
      bullets.push(new Bullet(player.x + player.width/2, player.y))
      shootCooldown=250
      const randomPitch = 0.9 + Math.random() * 0.4;

      shootSound.currentTime = 0; // Сбрасываем в начало, чтобы звук мог накладываться
      shootSound.volume = 0.15;     // Установите комфортную громкость (выстрелы частые)
      shootSound.playbackRate = randomPitch; // Устанавливаем скорость/тональность
      shootSound.play();
    }

    shootCooldown-=delta

    drones.forEach(d=>d.update())

    dropTimer+=delta

    if(dropTimer>1000){
      dropTimer=0
      drones.forEach(d=>{
        enemyBullets.push(new EnemyBullet(d.x+d.width/2,d.y+d.height))
      })
    }

    bullets.forEach(b=>b.update())
    enemyBullets.forEach(b=>b.update())
    particles.forEach(p=>p.update())

    bullets.forEach((b,bi)=>{
      drones.forEach((d,di)=>{
        if(b.x<d.x+d.width && b.x+b.size>d.x && b.y<d.y+d.height && b.y+b.size>d.y){
          spawnExplosion(d.x,d.y)
          const randomPitch = 0.8 + Math.random() * 0.4;
          droneExplosion.currentTime = 0; // Сбрасываем в начало, чтобы звук мог накладываться
          droneExplosion.volume = 0.3;     // Установите комфортную громкость
          droneExplosion.playbackRate = randomPitch;
          droneExplosion.play();
          const gained = calculateDroneScore()

          score += gained

          showScoreGain(gained)
          bullets.splice(bi,1)
          drones.splice(di,1)
          if (drones.length < 50) {
            drones.push(new Drone(Math.random() * canvas.height * 0.4));

            // Проверяем еще раз перед добавлением второго, чтобы точно не выйти за лимит
            if (drones.length < 50) {
              drones.push(new Drone(Math.random() * canvas.height * 0.4));
            }
          }
        }
      })
    })

    enemyBullets.forEach((b,i)=>{
      if(b.y>canvas.height-groundHeight){
        spawnExplosion(b.x,b.y)
        enemyBullets.splice(i,1)
      }
      if(isColliding(b, player)){
        playSound(60,0.5)
        endGame()
      }
    })

    particles=particles.filter(p=>p.life>0)

    survivalTime+=delta/1000

    // ОБНОВЛЕНИЕ UI
    document.getElementById("timer").innerText=
      survivalTime.toFixed(1)+"s"

    document.getElementById("score").innerText=
      "Score: " + score

    // ОБНОВЛЕНИЕ НОВОГО СЧЕТЧИКА ЖИВЫХ ДРОНОВ
    document.getElementById("drones-alive").innerText=
      "Alive: "+drones.length;

    let targetVolume = 0.05 + (drones.length / 50) * 0.25;
    droneSound.volume = targetVolume;
  }

  // ... (Draw and Game Loop remain the same)
  function draw(){
    ctx.clearRect(0,0,canvas.width,canvas.height)
    if(background.complete){
      ctx.drawImage(background,0,0,canvas.width,canvas.height)
    }
    ctx.fillStyle="rgba(0,0,0,0)"
    ctx.fillRect(0,canvas.height-groundHeight,canvas.width,groundHeight)
    player.draw()
    drones.forEach(d=>d.draw())
    bullets.forEach(b=>b.draw())
    enemyBullets.forEach(b=>b.draw())
    particles.forEach(p=>p.draw())
  }

  let last=0
  function gameLoop(t){
    let delta=t-last
    last=t
    if(gameRunning){
      update(delta)
      draw()
    }
    requestAnimationFrame(gameLoop)
  }

  requestAnimationFrame(gameLoop)

  document.getElementById("startBtn").onclick=startGame

  loadLeaderboard()

  menuMusic.volume = 0.4
  menuMusic.play()

  document.body.addEventListener("click", () => {
    menuMusic.play()
  }, { once:true })
</script>

</body>
</html>
