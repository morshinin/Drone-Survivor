    body {
      margin: 0;

    body::before {

      top: 0;
      width: 100%;
      height: 100%;

      background: rgba(0, 0, 0, 0.15);
    }

    .game_over_bg {
      background-image: url("game_over_bg.png");
      background-size: cover;
    }

    /* Класс для отключения CRT эффектов */
    .no-crt {
      background-image: none !important;
      background-color: transparent !important;
      animation: none !important;
      text-shadow: none !important;
    }

    .no-crt::before,
    .no-crt::after {
      display: none !important;
    }

    #ui {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      flex-direction: column;
      gap: 16px;
      text-align: center;
      padding-top: 20%;
      z-index: 2;
    }

    button {

      font-size: 20px;
      cursor: pointer;
      margin-top: 10px;
    }

    .hide-cursor {

    }

    #score {
      position: absolute;
      top: 10px;
      left: 20px;
      font-size: 34px;
      font-weight: bold;
      color: #ffe066;
      text-shadow: 3px 3px black;
      transition: transform 0.15s;
      z-index: 1;
    }

    .score-pop {

    }

    #score-pop {
      position: absolute;
      top: 50px;
      left: 20px;
      font-size: 28px;
      color: #ffff66;
      text-shadow: 2px 2px black;
      opacity: 0;
      transform: translateY(0);
      transition: all 0.4s ease;
    }

    .score-pop-show {
      opacity: 1;

    }

    #leaderboard {
      margin-top: 20px;
      font-size: 24px;
      line-height: 1.5;
      color: lawngreen;
    }

    #fade {
      position: fixed;
      left: 0;
      top: 0;
      width: 100%;
      height: 100%;
      background: black;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.8s;
      z-index: 999;
    }

    #game-info {
      position: fixed;
      bottom: 15px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 10px;
      color: #aaa;
      text-align: center;
      line-height: 1.6;
      text-shadow: 1px 1px black;
    }

    #game-info a {
      color: #7cff7c;
      text-decoration: none;
    }

    #game-info a:hover {
      text-decoration: underline;
    }

    #loading-screen {
      position: fixed;
      inset: 0;
      background: black;
      z-index: 9999;

      display: flex;
      align-items: center;
      justify-content: center;
    }

    .loading-box {
      width: 300px;
      text-align: center;
      color: white;
    }

    #commander-balloon {
      display: none;
      width: 600px;
      height: 200px;
      position: absolute;
      top: 60px;
      color: #333333;
      text-shadow: none;
      font-size: 16px;
      right: -500px;

      z-index: 1000;
    }

    #commander-balloon.show {

    }

    .commander-face {
      display: inline-block;
      width: 100px;
      height: 100px;
      margin-right: 10px;
      vertical-align: middle;
      flex-shrink: 0;
      align-self: flex-end;
    }

    .nes-balloon {
      height: 100%;
      width: 100%;
    }

    .commander-section {
      display: flex;
      height: 100%;
    }

    #game-container {
      position: relative;
      width: 1500px;
      height: 800px;

      border-radius: 30px;
      overflow: hidden;

      box-shadow:
        inset 0 0 80px rgba(0, 0, 0, 0.6),

    }

    #game-container.no-bg {
      background-image: none !important;
      background-color: transparent;

    #game {

    }

    #continueHint {

    @keyframes blink {

      }

      }
    }

    // ======================
    // RENDERING
    // ======================
    class AnimatedSprite {
      constructor(x, y, image, options = {}) {
        this.x = x
        this.y = y
        this.image = image

        // Параметры спрайта
        this.columns = options.columns || 2
        this.totalFrames = options.totalFrames || 58
        this.frameDelay = options.frameDelay || 8
        this.width = options.width || (image.width / this.columns)
        this.height = options.height || (image.height / (this.totalFrames / this.columns))
        this.scale = options.scale || 1.0
        this.opacity = options.opacity || 1.0
        this.loop = options.loop !== undefined ? options.loop : true

        // Кэшируем вычисления размеров
        this.sw = this.image.width / this.columns
        this.sh = this.image.height / Math.ceil(this.totalFrames / this.columns)
        this.dw = this.width * (this.scale || 1.0)
        this.dh = this.height * (this.scale || 1.0)

        // Вычисляем количество строк
        this.rows = Math.ceil(this.totalFrames / this.columns)

        this.timer = 0
        this.frame = options.startFrame || 0
        this.alive = true
      }

      update() {
        this.timer++

        if (this.timer >= this.frameDelay) {
          let nextFrame = this.frame + 1

          if (nextFrame >= this.totalFrames) {
            if (this.loop) {
              nextFrame = 0
            } else {
              this.alive = false
              return
            }
          }

          this.frame = nextFrame
          this.timer = 0
        }
      }

      draw(ctx) {
        if (!this.image || !this.image.complete || !this.alive) return

        const col = this.frame % this.columns
        const row = Math.floor(this.frame / this.columns)

        const hasOpacity = this.opacity < 1.0
        if (hasOpacity) {
          ctx.save()
          ctx.globalAlpha = this.opacity
        }

        ctx.drawImage(
          this.image,
          Math.floor(col * this.sw),
          Math.floor(row * this.sh),
          Math.floor(this.sw),
          Math.floor(this.sh),
          Math.floor(this.x),
          Math.floor(this.y),
          Math.floor(this.dw),
          Math.floor(this.dh)
        )

        if (hasOpacity) {
          ctx.restore()
        } else {
          // Гарантируем сброс альфы, если не использовали save/restore
          ctx.globalAlpha = 1.0
        }
      }

      // setFrame(frame) {

      // }
      //
      // restart() {
      //   this.frame = 0
      //   this.timer = 0
      //   this.alive = true
      // }
    }

        this.stages.push(new StageConfig('Бесконечность', {
          startMessage: `Stay alive, Charlie.`,
          waves: this.generateInfiniteWaves(),
          infiniteMode: true
        }))
      }

      generateInfiniteWaves() {
        const waves = []
        for (let i = 0; i < 100; i++) {
          const difficulty = 1 + i * 0.2
          waves.push(new WaveConfig(`Волна ${i + 1}`, {
            drones: [
              { type: DroneType.NORMAL, count: Math.floor(10 * difficulty) },
              { type: DroneType.GRENADIER, count: Math.floor(3 * difficulty) },
              { type: DroneType.KAMIKAZE, count: Math.floor(2 * difficulty) }
            ],
            pauseAfter: 3000,
            spawnInterval: Math.max(200, 500 - i * 10)
          }))
        }
        return waves
      }

      startStage(index) {
        if (index >= this.stages.length) {
          if (this.infiniteMode) {
            this.startInfiniteMode()
          }
          return
        }

        const stage = this.stages[index]

        // ВАЖНО: сбрасываем все счетчики перед стартом этапа
        this.currentStageIndex = index
        this.currentWaveIndex = 0
        this.isActive = true
        this.stageComplete = false
        this.isPaused = false
        this.pauseTimer = 0
        this.spawnTimer = 0
        this.currentWaveSpawnCount = 0
        this.currentWaveDrones = []

        this.isActive = false // ВАЖНО

        if (stage.startMessage) {
          // Показываем сообщение, затем запускаем волну
          showCommanderMessage(5000, stage.startMessage).then(() => {
            this.isActive = true
            this.startCurrentWave()
          })
        } else {
          // Нет сообщения — сразу запускаем
          this.isActive = true
          this.startCurrentWave()
        }
      }

      // Запустить текущую волну
      startCurrentWave() {
        const stage = this.stages[this.currentStageIndex]

        if (this.currentWaveIndex >= stage.waves.length) {
          this.completeStage()
          return
        }

        const wave = stage.waves[this.currentWaveIndex]

        // ПРИНУДИТЕЛЬНОЕ ГЛУБОКОЕ КОПИРОВАНИЕ
        this.currentWaveDrones = JSON.parse(JSON.stringify(wave.drones))

        // Сохраняем общее количество дронов в волне как константу
        this.totalWaveDrones = this.currentWaveDrones.reduce((sum, d) => sum + d.count, 0)

        this.isPaused = false
        this.spawnTimer = 0
        this.currentWaveSpawnCount = 0
      }

      // Завершить этап
      completeStage() {
        const stage = this.stages[this.currentStageIndex]

        this.isActive = false
        this.stageComplete = true
        this.pauseTimer = 0
        this.spawnTimer = 0
        this.currentWaveSpawnCount = 0
        this.currentWaveDrones = []

        const nextStage = () => {
          this.currentStageIndex++
          this.currentWaveIndex = 0 // ВАЖНО: сбрасываем индекс волны!
          if (this.currentStageIndex < this.stages.length) {
            this.startStage(this.currentStageIndex)
          } else {
            this.startInfiniteMode()
          }
        }

        if (stage.endMessage) {
          showCommanderMessage(5000, stage.endMessage).then(() => {
            if (stage.bossWave) {
              this.startInfiniteMode()
            } else {
              nextStage()
            }
          })
        } else {
          nextStage()
        }
      }

      // Запустить бесконечный режим
      startInfiniteMode() {
        this.infiniteMode = true
        this.currentStageIndex = this.stages.length - 1
        this.currentWaveIndex = 0
        this.isActive = true

        const stage = this.stages[this.currentStageIndex]
        if (stage.startMessage) {
          showCommanderMessage(5000, stage.startMessage).then(() => {
            this.startCurrentWave()
          })
        }
      }

      // Обновление (вызывать в gameLoop)
      update(delta) {
        if (!this.isActive) return

        // Проверяем индекс этапа
        if (this.currentStageIndex >= this.stages.length) {
          this.isActive = false
          return
        }

        const stage = this.stages[this.currentStageIndex]
        if (!stage) {
          this.isActive = false
          return
        }

        // ===== ФАЗА ПАУЗЫ МЕЖДУ ВОЛНАМИ =====
        if (this.isPaused) {
          this.pauseTimer += delta
          const prevWave = stage.waves[this.currentWaveIndex - 1]

          if (prevWave && this.pauseTimer >= prevWave.pauseAfter) {
            this.isPaused = false
            this.spawnTimer = 0
            this.startCurrentWave()
          }
          return
        }

        // Проверяем индекс волны
        if (this.currentWaveIndex >= stage.waves.length) {
          this.completeStage()
          return
        }

        const wave = stage.waves[this.currentWaveIndex]
        const totalDrones = this.totalWaveDrones || 0

        // ===== ФАЗА 1: СПАВН — пока не заспавнены все дроны =====
        if (this.currentWaveSpawnCount < totalDrones) {
          this.spawnTimer += delta
          if (this.spawnTimer >= wave.spawnInterval) {
            this.spawnTimer = 0
            this.spawnNextDrone()
          }
          return
        }

        // ===== ФАЗА 2: ОЖИДАНИЕ — все заспавнены, ждём гибели =====
        // Проверяем каждый кадр (не через spawnTimer), чтобы не пропустить момент
        const alive = countDrones()

        if (alive === 0) {
          this.currentWaveIndex++

          if (this.currentWaveIndex < stage.waves.length) {
            this.isPaused = true
            this.pauseTimer = 0
          } else {
            this.completeStage()
          }
        }
      }

      // Получить общее количество дронов в волне
      // getWaveDroneCount() {
      //   if (!this.currentWaveDrones) return 0
      //   return this.currentWaveDrones.reduce((sum, d) => sum + d.count, 0)
      // }

      // Посчитать сколько дронов уже заспавнено в текущей волне
      // countSpawnedInWave() {
      //   // Можно добавить счетчик в WaveManager
      //   if (!this.currentWaveSpawnCount) {
      //     this.currentWaveSpawnCount = 0
      //   }
      //   return this.currentWaveSpawnCount
      // }

      // Заспавнить следующего дрона из волны
      spawnNextDrone() {
        // Приоритет боссу: если он есть в списке, спавним его первым
        let typeEntry = this.currentWaveDrones.find(d => d.type === 'boss' && d.count > 0)

        if (!typeEntry) {
          const availableTypes = this.currentWaveDrones.filter(d => d.count > 0)
          if (availableTypes.length === 0) return
          typeEntry = availableTypes[Math.floor(Math.random() * availableTypes.length)]
        }

        typeEntry.count--
        this.currentWaveSpawnCount++

        this.currentWaveDrones.map(d => `${d.type}:${d.count}`).join(', ')

        this.spawnDroneByType(typeEntry.type)
      }

      // Спавн дрона по типу
      spawnDroneByType(type) {
        switch (type) {
          case DroneType.NORMAL:
            return spawnNormalDrone()
          case DroneType.GRENADIER:
            return spawnGrenadier()
          case DroneType.KAMIKAZE:
            return spawnKamikaze()
          case 'boss':
            return spawnBoss()
        }
      }
    }

    class AudioManager {
      constructor() {
        this.musicEnabled = true
        this.sfxEnabled = true
        this.musicVolume = 0.2
        this.sfxVolume = 0.4

        this.music = {}
        this.sfx = {}
        this.currentMusic = null

        this.loadSettings()
      }

      registerMusic(name, src, { loop = false, volume = this.musicVolume } = {}) {
        const audio = new Audio(src)
        audio.loop = loop
        audio.volume = volume
        this.music[name] = audio
        return audio
      }

      registerSfx(name, src, { volume = this.sfxVolume } = {}) {
        const audio = new Audio(src)
        audio.volume = volume
        this.sfx[name] = audio
        return audio
      }

      playMusic(name, { restart = true } = {}) {
        if (!this.musicEnabled) return

        const track = this.music[name]
        if (!track) return

        if (this.currentMusic && this.currentMusic !== track) {
          this.stopCurrentMusic()
        }

        this.currentMusic = track

        if (restart) {
          track.currentTime = 0
        }

        track.volume = this.musicVolume
        track.play().catch(() => {})
      }

      stopCurrentMusic() {
        if (!this.currentMusic) return
        this.currentMusic.pause()
        this.currentMusic.currentTime = 0
        this.currentMusic = null
      }

      pauseCurrentMusic() {
        if (!this.currentMusic) return
        this.currentMusic.pause()
      }

      resumeCurrentMusic() {
        if (!this.currentMusic) return
        if (!this.musicEnabled) return
        this.currentMusic.play().catch(() => {})
      }

      playSfx(name, volume = null) {
        if (!this.sfxEnabled) return

        const base = this.sfx[name]
        if (!base) return

        const sound = base.cloneNode()
        sound.volume = volume ?? this.sfxVolume
        sound.play().catch(() => {})
      }

      setMusicEnabled(value) {
        this.musicEnabled = Boolean(value)
        this.saveSettings()

        if (!this.musicEnabled) {
          this.stopCurrentMusic()
        }
      }

      setSfxEnabled(value) {
        this.sfxEnabled = Boolean(value)
        this.saveSettings()
      }

      setMusicVolume(value) {
        this.musicVolume = Math.max(0, Math.min(1, value))
        this.saveSettings()

        if (this.currentMusic) {
          this.currentMusic.volume = this.musicVolume
        }
      }

      setSfxVolume(value) {
        this.sfxVolume = Math.max(0, Math.min(1, value))
        this.saveSettings()
      }

      stopAll() {
        this.stopCurrentMusic()
      }

      loadSettings() {
        const saved = localStorage.getItem('audioSettings')
        if (!saved) return

        try {
          const data = JSON.parse(saved)

          if (typeof data.musicEnabled === 'boolean') {
            this.musicEnabled = data.musicEnabled
          }

          if (typeof data.sfxEnabled === 'boolean') {
            this.sfxEnabled = data.sfxEnabled
          }

          if (typeof data.musicVolume === 'number') {
            this.musicVolume = data.musicVolume
          }

          if (typeof data.sfxVolume === 'number') {
            this.sfxVolume = data.sfxVolume
          }
        } catch (error) {
          console.warn('Failed to load audio settings', error)
        }
      }

      saveSettings() {
        localStorage.setItem('audioSettings', JSON.stringify({
          musicEnabled: this.musicEnabled,
          sfxEnabled: this.sfxEnabled,
          musicVolume: this.musicVolume,
          sfxVolume: this.sfxVolume,
        }))
      }
    }

    class BaseDrone {
      constructor(x, y, options = {}) {
        this.x = x
        this.y = y
        this.width = options.width || 80
        this.height = options.height || 60
        this.speed = options.speed || (Math.random() * 2 + 1)
        this.direction = options.direction || (Math.random() < 0.5 ? 1 : -1)

        // Позиция зависит от направления, если не указано иное
        if (!options.skipEntryPos) {
          if (this.direction > 0) {
            this.x = -this.width
          } else {
            this.x = canvas.width + this.width
            this.speed = -this.speed
          }
        }

        this.category = 'drone'

        this.hp = options.hp || 1
        this.maxHp = options.hp || 1
        this.scoreValue = options.scoreValue || 10
        this.damage = options.damage || 1

        this.alive = true
        this.type = options.type || 'base'

        // Анимация
        this.frame = 0
        this.frameTimer = 0
        this.frameDelay = options.frameDelay || 8

        // Изображение
        this.image = options.image || droneImg
      }

      update(delta) {
        // Базовое движение
        this.x += this.speed

        // Разворот при достижении края
        if (this.x < -this.width || this.x > canvas.width + this.width) {
          this.speed *= -1
        }

        // Легкое покачивание
        this.y += Math.sin(performance.now() * 0.003) * 0.3

        // Анимация
        this.frameTimer += delta
        if (this.frameTimer >= this.frameDelay) {
          this.frame = (this.frame + 1) % 4 // 4 кадра анимации
          this.frameTimer = 0
        }

        // ВАЖНО: Дополнительный fail-safe для выхода за границы (например, если дрон ушел слишком высоко)
        if (this.y < -500 || this.y > canvas.height + 500) {
          this.alive = false
        }
      }

      draw(ctx) {
        ctx.save()
        ctx.globalAlpha = this.getOpacity()

        // Рисуем как в старом коде - целое изображение
        if (this.image && this.image.complete) {
          ctx.drawImage(
            this.image,
            Math.floor(this.x),
            Math.floor(this.y),
            Math.floor(this.width),
            Math.floor(this.height)
          )
        } else {
          // Запасной вариант
          ctx.fillStyle = this.getColor()
          ctx.fillRect(Math.floor(this.x), Math.floor(this.y), Math.floor(this.width), Math.floor(this.height))
        }

        // Полоска здоровья для сильных дронов
        if (this.maxHp > 1) {
          this.drawHealthBar(ctx)
        }

        if (DEBUG.showHitboxes) {
          UI.showHitboxRect(this.x, this.y, this.width, this.height, 'yellow')
        }
      }

      drawHealthBar(ctx) {
        const barWidth = this.width
        const barHeight = 5
        const healthPercent = this.hp / this.maxHp

        ctx.fillStyle = 'rgba(255, 0, 0, 0.5)'
        ctx.fillRect(this.x, this.y - 10, barWidth, barHeight)

        ctx.fillStyle = '#0f0'
        ctx.fillRect(this.x, this.y - 10, barWidth * healthPercent, barHeight)
      }

      getColor() {
        switch (this.type) {
          case 'normal': return '#ff4444'
          case 'grenadier': return '#ff8800'
          case 'kamikaze': return '#ff00ff'
          default: return '#ff0000'
        }
      }

      getOpacity() {
        return 1.0
      }

      takeDamage(amount) {
        this.hp -= amount

        if (this.hp <= 0) {
          this.alive = false
          return true
        }
        return false
      }

      onDeath() {
        // Эффект при смерти
        spawnExplosion(this.x + this.width / 2, this.y + this.height / 2)
      }
    }

    class NormalDrone extends BaseDrone {
      constructor(y) {
        super(0, y, {
          type: 'normal',
          width: 80,
          height: 60,
          hp: 1,
          scoreValue: 10,
          frameDelay: 8,
          image: droneImg
        })

        this.fireTimer = Math.random() * 1000
        this.fireCooldown = 800 + Math.random() * 1200
      }

      update(delta) {
        super.update(delta)

        this.fireTimer += delta

        if (this.fireTimer >= this.fireCooldown &&
          globalEnemyFireCooldown <= 0) {
          this.shoot()
        }
      }

      shoot() {
        this.fireTimer = 0
        if (countEnemyBullets() < waveManager.maxBullets) {
          spawn(new EnemyBullet(
            this.x + this.width / 2,
            this.y + this.height
          ))

          globalEnemyFireCooldown = 1800 + Math.random() * 400
        }

        this.fireCooldown = 1800 + Math.random() * 1200
      }
    }

    class GrenadierDrone extends BaseDrone {
      constructor(y) {
        super(0, y, {
          type: 'grenadier',
          width: 90,
          height: 70,
          hp: 2,
          scoreValue: 25,
          frameDelay: 10,
          image: droneImg // Можно заменить на другой спрайт
        })

        this.dropTimer = 120 + Math.random() * 120
        this.grenadeCooldown = 3000
      }

      update(delta) {
        super.update(delta)

        // Сброс гранат
        this.dropTimer -= delta
        if (this.dropTimer <= 0) {
          this.dropGrenade()
          this.dropTimer = this.grenadeCooldown + Math.random() * 1000
        }
      }

      dropGrenade() {
        spawn(new Grenade(this.x, this.y))
      }

      draw(ctx) {
        super.draw(ctx)
        // Дополнительная отметка для гранатометчика
        ctx.fillStyle = 'orange'
        ctx.beginPath()
        ctx.arc(this.x + this.width - 10, this.y + 10, 5, 0, Math.PI * 2)
        ctx.fill()
      }
    }

    class KamikazeDrone extends BaseDrone {
      constructor() {
        // Случайная стартовая позиция
        const side = Math.random()
        let x, y

        if (side < 0.25) {
          x = -50
          y = Math.random() * 200
        } else if (side < 0.5) {
          x = canvas.width + 50
          y = Math.random() * 200
        } else {
          x = Math.random() * canvas.width
          y = -50
        }

        super(x, y, {
          type: 'kamikaze',
          width: 60,
          height: 60,
          hp: 1,
          scoreValue: 30,
          speed: 4,
          frameDelay: 6,
          image: kamikazeImg
        })

        // Расчет направления к игроку
        const dx = player.x - this.x
        const dy = player.y - this.y
        const dist = Math.hypot(dx, dy)

        this.vx = dx / dist * this.speed
        this.vy = dy / dist * this.speed

        this.explosionRadius = 80
      }

      update(delta) {
        // Камикадзе не использует базовое движение
        this.x += this.vx
        this.y += this.vy

        this.frameTimer += delta
        if (this.frameTimer >= this.frameDelay) {
          this.frame = (this.frame + 1) % 4
          this.frameTimer = 0
        }

        // Проверка столкновения с игроком
        if (isColliding(this, player)) {
          this.explode()
        }

        // Проверка удара о землю
        if (this.y > canvas.height - groundHeight) {
          this.explode()
        }

        // ВАЖНО: Проверка выхода за боковые границы или слишком высоко вверх
        if (this.x < -200 || this.x > canvas.width + 200 || this.y < -300) {
          this.alive = false
        }
      }

      explode() {
        spawnGroundExplosion(this.x, this.y)

        // Проверка урона игроку
        const dx = player.x + player.width / 2 - (this.x + this.width / 2)
        const dy = player.y + player.height / 2 - (this.y + this.height / 2)
        const dist = Math.sqrt(dx * dx + dy * dy)

        if (dist < this.explosionRadius) {
          if (!DEBUG.godMode && player.alive) {
            player.die()
          }
        }

        this.alive = false
      }

      draw(ctx) {
        super.draw(ctx)
        // Визуальный эффект "мигания" перед взрывом
        if (Math.random() < 0.1) {
          ctx.fillStyle = 'rgba(255, 0, 0, 0.3)'
          ctx.beginPath()
          ctx.arc(this.x + this.width / 2, this.y + this.height / 2, 30, 0, Math.PI * 2)
          ctx.fill()
        }
      }
    }

    class Player {
      constructor() {
        this.x = 0
        this.y = 0
        this.width = 100
        this.height = 130

        this.speed = 3.8
        this.direction = 1

        this.frame = 0
        this.frameTimer = 0
        this.isMoving = false

        this.vx = 0
        this.acceleration = 0.45
        this.friction = 0.88

        this.alive = true
        this.deathTimer = 2000
      }

      die() {
        if (DEBUG.godMode) return
        player.alive = false

        timeScale = 0.25

        spawnExplosion(
          player.x + player.width / 2,
          player.y + player.height / 2
        )

        audio.stopAll()
        audio.playSfx('death')
      }

      update() {
        if (isFirePressed()) {
          this.vx *= 0
        }

        if (keys["ArrowLeft"]) {
          this.vx -= this.acceleration
          this.direction = -1
        }

        if (keys["ArrowRight"]) {
          this.vx += this.acceleration
          this.direction = 1
        }

        if (this.vx > this.speed) this.vx = this.speed
        if (this.vx < -this.speed) this.vx = -this.speed

        this.vx *= this.friction

        this.x += this.vx
        this.isMoving = Math.abs(this.vx) > 0.1

        if (this.x < 0) this.x = 0
        if (this.x + this.width > canvas.width)
          this.x = canvas.width - this.width

        if (this.isMoving) {

          this.frameTimer++

          if (this.frameTimer > 15) {
            this.frame++
            this.frameTimer = 0
          }

          if (this.frame >= WALK_FRAMES) {
            this.frame = 0
          }
        } else {
          this.frame = 0
        }
      }

      draw() {
        ctx.save()

        if (this.direction === -1) {
          ctx.scale(-1, 1)

          ctx.drawImage(
            playerWalkSprite,
            this.frame * WALK_FRAME_WIDTH,
            0,

    class BossDrone extends BaseDrone {
      constructor() {
        super(canvas.width / 2 - 150, -120, {
          width: 300,
          height: 260,
          hp: 200,
          image: bossImg,
          skipEntryPos: true
        })
        this.maxHp = 400
        this.speed = 2
        this.phase = 1
        this.phaseTimer = 0
        this.spawnTimer = 0
        this.missileTimer = 0
        this.active = false
        this.category = 'drone' // Важно для коллизий
        this.maxMinions = 8
        this.spawnedMinions = 0
      }

      update(delta) {
        // плавный въезд на экран (ускорили в 2 раза)
        if (this.y < 40) {
          this.y += this.speed * 2
        }
        // спавн дронов
        this.phaseTimer += delta
        if (this.hp <= this.maxHp * 0.5 && this.phase === 1) {
          this.phase = 2
          console.log("Boss phase 2 triggered! HP:", this.hp)
        }

        // Фаза 1: редко спавнит дронов
        if (this.phase === 1) {
          this.spawnTimer += delta
          if (this.spawnTimer > 7000) { // 7 секунд
            this.spawnTimer = 0
            if (countDrones() < 1 + 3) { // 1 босс + 3 миньона
              spawnNormalDrone()
            }
          }
        }

        // Фаза 2: спавнит чуть чаще
        if (this.phase === 2) {
          this.spawnTimer += delta
          if (this.spawnTimer > 5000) { // 5 секунд
            this.spawnTimer = 0
            if (countDrones() < 1 + 3) {
              if (Math.random() < 0.6) {
                spawnNormalDrone()
              } else {
                spawnGrenadier()
              }
            }
          }
        }

        // ракета
        this.missileTimer += delta
        if (this.missileTimer > 4000) { // УВЕЛИЧИЛИ до 4 секунд
          this.missileTimer = 0
          // Только одна ракета за раз
          // Оптимизация: используем глобальный счетчик или простой лимит
          if (globalEnemyBulletsCount < 40) {
            spawn(new Missile(
              this.x + this.width / 2,
              this.y + this.height,
              player.x + player.width / 2
            ))
          }
        }
      }

      onDeath() {
        super.onDeath()
        // Можно добавить специфичные для босса эффекты
      }

      draw(ctx) {
        if (this.image && this.image.complete) {
          ctx.drawImage(this.image, Math.floor(this.x), Math.floor(this.y), Math.floor(this.width), Math.floor(this.height))
        }

        if (DEBUG.showHitboxes) {
          UI.showHitboxRect(this.x, this.y, this.width, this.height, 'blue')
        }
      }
    }

      constructor(x, y) {
        this.x = x

        this.height = 20

        this.onGround = false

        this.category = 'enemyBullet' // Грены тоже пули врага

        if (!this.onGround) {

          if (this.y >= canvas.height - groundHeight - this.height) {
            this.y = canvas.height - groundHeight - this.height
            this.onGround = true

        // лежит на земле

        if (this.timer <= 0 && !this.exploded) {
          this.exploded = true

          explodeGrenade(this)

          this.alive = false

            ctx.drawImage(grenadeImg, this.x, this.y, this.width, this.height)

    class Weapon {
      constructor() {
        this.name = "Weapon"
        this.magazineSize = 0
        this.magazines = 0
        this.fireRate = 0
        this.reloadTime = 0
        this.auto = false
        this.bulletsPerShot = 1
        this.bulletSpeed = 10
        this.spread = 0

        this.ammoInMagazine = 0
        this.remainingMagazines = 0
        this.lastShotTime = 0
        this.reloading = false
      }

      initAmmo() {
        this.ammoInMagazine = this.magazineSize
        this.remainingMagazines = this.magazines
        this.reloading = false
        this.lastShotTime = 0
      }

      canShoot(now = Date.now()) {
        if (this.reloading) return false
        if (this.ammoInMagazine <= 0) return false
        return now - this.lastShotTime >= this.fireRate;
      }

      consumeShot(now = Date.now()) {
        this.lastShotTime = now
        this.ammoInMagazine--

        if (this.ammoInMagazine <= 0 && this.remainingMagazines > 0) {
          this.reload()
        }
      }

      reload() {
        if (this.reloading) return false
        if (this.remainingMagazines <= 0) return false
        if (this.ammoInMagazine === this.magazineSize) return false

        this.reloading = true

        setTimeout(() => {
          this.ammoInMagazine = this.magazineSize
          this.remainingMagazines--
          this.reloading = false
        }, this.reloadTime)

        return true
      }

      getShotAngles() {
        if (this.bulletsPerShot === 1) return [0]

        const angles = []
        const half = (this.bulletsPerShot - 1) / 2
        const step = this.spread / Math.max(1, this.bulletsPerShot - 1)

        for (let i = 0; i < this.bulletsPerShot; i++) {
          angles.push((-this.spread / 2) + i * step)
        }

        return angles
      }

      shoot(player, dirX, dirY) {
        if (!this.canShoot()) return []

        const now = Date.now()
        this.consumeShot(now)

        const baseAngle = Math.atan2(dirY, dirX)
        const shots = []

        for (const offsetDeg of this.getShotAngles()) {
          const angle = baseAngle + (offsetDeg * Math.PI / 180)
          shots.push({
            x: player.x + player.width / 2,
            y: player.y + player.height / 2,
            vx: Math.cos(angle) * this.bulletSpeed,
            vy: Math.sin(angle) * this.bulletSpeed
          })
        }

        return shots
      }
    }

    function isColliding(a, b) {
      if (!a || !b || !a.alive || !b.alive) return false

      const w1 = a.width || a.size || 0
      const h1 = a.height || a.size || 0
      const w2 = b.width || b.size || 0
      const h2 = b.height || b.size || 0

      return a.x < b.x + w2 &&
        a.x + w1 > b.x &&
        a.y < b.y + h2 &&
        a.y + h1 > b.y
    }

      }

    }

    function splitTextIntoPages(text, maxChars = 140) {
      const words = text.split(" ")
      const pages = []

      let current = ""

      for (const word of words) {
        if ((current + word).length > maxChars) {
          pages.push(current.trim())
          current = ""
        }

        current += word + " "
      }

      if (current.length) pages.push(current.trim())

      return pages
    }

    async function typeText(element, text, speed = 25) {
      element.textContent = ""
      let skip = false

      function skipHandler(e) {
        if (e.code === "Enter") skip = true
      }

      window.addEventListener("keydown", skipHandler)
      for (let i = 0; i < text.length; i++) {
        element.textContent += text[i]

        if (i % 3 === 0 && text[i] !== " ") {
          audio.playSfx('typewriter')

        }

        if (skip) {
          element.textContent = text
          break
        }

        await new Promise(r => setTimeout(r, speed))
      }

      window.removeEventListener("keydown", skipHandler)
    }

    function explodeGrenade(g) {
      spawnGroundExplosion(g.x, g.y)

      const explosionRadius = 80

      const gx = g.x + g.width / 2
      const gy = g.y + g.height / 2

      const px = player.x + player.width / 2
      const py = player.y + player.height / 2

      const dx = px - gx
      const dy = py - gy

      const dist = Math.sqrt(dx * dx + dy * dy)

      if (dist < explosionRadius) {
        if (!DEBUG.godMode && player.alive) {
          player.die()
        }
      }
    }

      player.direction = 1 // идем вправо
      const targetX = canvas.width * 0.5
      const speed = 3

      return new Promise(resolve => {
        const interval = setInterval(() => {
          // “имитация” движения, как при нажатии клавиш
          player.vx = speed
          player.isMoving = true
          player.update()  // обновляем позицию и кадры

          if (player.x >= targetX) {
            player.x = targetX
            player.vx = 0
            player.isMoving = false
            player.update()
            clearInterval(interval)
            resolve()
          }
        }, 100)
      })
    }

    async function showCommanderMessage(duration = 10000, message = null) {
      const prevState = currentState
      currentState = GameState.DIALOG

      const balloon = UI.el.commanderBalloon
      const p = balloon.querySelector("p")
      const hint = UI.el.continueHint

      await animateCommanderBox()

      await audio.playSfx('radio_on')

      await new Promise(r => setTimeout(r, 300))

      const pages = splitTextIntoPages(message)
      for (let i = 0; i < pages.length; i++) {

        const page = pages[i] + "..."

        await typeText(p, page)

        hint.style.display = "block"

        await waitForContinue()

        hint.style.display = "none"
      }

      await audio.playSfx('radio_off')

      await hideCommanderBox()

      if (currentState === GameState.DIALOG) {
        currentState = prevState === GameState.PAUSED ? GameState.PAUSED : GameState.GAME
      }
    }

    function fadeScreen(duration = 800) {
      const f = document.getElementById("fade")
      return new Promise(resolve => {
        f.style.transition = `opacity ${duration / 2}ms`
        f.style.opacity = '1'
        setTimeout(() => {
          f.style.opacity = '0'
          setTimeout(resolve, duration / 2)
        }, duration / 2)
      })
    }

    function waitForContinue() {
      return new Promise(resolve => {
        function handler(e) {
          if (e.code === "Enter") {
            window.removeEventListener("keydown", handler)
            resolve()
          }
        }

        window.addEventListener("keydown", handler)
      })
    }

    function saveScore() {
      leaderboard.push({ name: playerName, score: score, time: Math.floor(survivalTime) })
      leaderboard.sort((a, b) => {
        if (b.score !== a.score) return b.score - a.score
        return b.time - a.time
      })
      leaderboard = leaderboard.slice(0, 10)
    }

    async function saveScoreOnline() {
      const { data, error } = await db
        .from("leaderboard")
        .insert([{ name: playerName, score: score }])
      if (error) { console.error(error) }
    }

    async function loadLeaderboard() {
      const { data } = await db
        .from("leaderboard")
        .select("*")
        .order("score", { ascending: false })
        .limit(5)
      leaderboard = data
      renderLeaderboard()
    }

    // ======================
    // MAIN LOOP
    // ======================
    function gameLoop(t) {
      if (!gameLoopRunning) {
        setTimeout(() => requestAnimationFrame(gameLoop), 100)
        return
      }

      frameCounter++
      if (t - lastFrameTime > 1000) {
        fps = frameCounter - (lastFpsFrameCount || 0)
        lastFpsFrameCount = frameCounter
        lastFrameTime = t
      }

      const rawDelta = Math.min(t - last, 100)
      const delta = rawDelta * timeScale
      last = t

      switch (currentState) {
        case GameState.MENU:
          if (frameCounter % 3 === 0) {
            updateMenu(delta)
            drawMenu()
          }
          break

        case GameState.GAME:
          updateAmbient(delta)
          updateGameplay(delta)
          drawGame()
          break

        case GameState.DIALOG:
          updateDialog(delta)
          drawGame()
          break

        case GameState.PAUSED:
          if (frameCounter % 6 === 0) {
            updatePaused(delta)
            drawPaused()
          }
          break

        case GameState.GAME_OVER:
          if (frameCounter % 3 === 0) {
            updateGameOver(delta)
            drawGameOver()
          }
          break
      }

      if (gameLoopInstances > 1) {
        console.error("MULTIPLE GAME LOOPS DETECTED! Stopping instance.")
        gameLoopInstances--
        return
      }

      requestAnimationFrame(gameLoop)
    }

    function updateDialog(delta) {
      updateAmbient(delta)
      updateHud(delta)
    }

    function updatePaused(delta) {
      // Ничего из игрового мира не двигаем.
      // Если захочешь мигающий PAUSED — можно обновлять только его.
    }

    function updateGameplay(delta) {
      const startTime = performance.now()

      if (hitFreeze > 0) {
        hitFreeze -= delta
        return
      }

      if (!player.alive) {
        player.deathTimer -= delta
        if (player.deathTimer <= 0) {
          timeScale = 1
          endGame()
        }
        return
      }

      player.update()

      if (globalEnemyFireCooldown > 0) {
        globalEnemyFireCooldown -= delta
      }

      waveManager.update(delta)

      shootCooldown -= delta

      if (player.alive && shooting && currentWeapon?.auto) {
        const dir = getShootDirection()
        fireCurrentWeapon(dir.dx, dir.dy)
      }

      const stillAlive = []
      const activeDrones = []
      const activeBullets = []
      const activeEnemyBullets = []

      globalActiveDronesCount = 0
      globalEnemyBulletsCount = 0
      globalVFXCount = 0

      for (let i = 0; i < gameObjects.length; i++) {
        const obj = gameObjects[i]

        if (obj.alive) {
          obj.update(delta)

          if (obj.alive) {
            stillAlive.push(obj)

            if (obj.category === 'drone') {
              activeDrones.push(obj)
              globalActiveDronesCount++
            } else if (obj.category === 'bullet') {
              activeBullets.push(obj)
            } else if (obj.category === 'enemyBullet') {
              activeEnemyBullets.push(obj)
              globalEnemyBulletsCount++
            } else if (obj.category === 'vfx') {
              globalVFXCount++
            }
          }
        }
      }

      gameObjects = stillAlive
      //
      // perfLogTimer += delta
      // if (perfLogTimer > 3000) {
      //   perfLogTimer = 0
      //   const counts = { bullet: 0, enemyBullet: 0, drone: 0, vfx: 0, none: 0 }
      //   gameObjects.forEach(o => {
      //     const c = o.category || 'none'
      //     counts[c] = (counts[c] || 0) + 1
      //   })
      //   console.log(`[PERF] Objs:${stillAlive.length} ` + JSON.stringify(counts))
      // }

      if (frameCounter % 2 === 0 && activeBullets.length > 0 && activeDrones.length > 0) {
        for (const b of activeBullets) {
          if (!b.alive) continue

          for (const d of activeDrones) {
            if (!d.alive) continue

            if (isColliding(b, d)) {
              b.alive = false
              if (d.takeDamage(1)) {
                d.onDeath()
                const gained = calculateDroneScore(d)
                score += gained
                showScoreGain(gained)
              }
              break
            }
          }
        }
      }

      if (activeEnemyBullets.length > 0) {
        for (const obj of activeEnemyBullets) {
          if (!obj.alive) continue

          if (obj.y > canvas.height - groundHeight) {
            spawnGroundExplosion(obj.x, obj.y)
            obj.alive = false
            continue
          }

          if (isColliding(obj, player)) {
            if (player.alive) {
              player.die()
            }
            obj.alive = false
          }
        }
      }

      survivalTime += delta / 1000
      updateHud(delta)

      const endTime = performance.now()
      const frameTime = endTime - startTime
      if (frameTime > 16) {
      }

      ammoInMagazine = currentWeapon?.ammoInMagazine ?? 0
      magazines = currentWeapon?.remainingMagazines ?? 0
    }

    function updateAmbient() {
      if (tankSmoke?.alive) tankSmoke.update()
      if (citySmoke?.alive) citySmoke.update()
      if (cityFire?.alive) cityFire.update()
    }

    function updateHud(delta) {
      uiTimer += delta
      if (uiTimer > 100) {
        UI.hud.score.innerText = score
        uiTimer = 0
      }
    }

    // Создаем экземпляр менеджера
    const waveManager = new WaveManager()

    function initGame() {
      // игрок
      player = new Player()

      // оружие
      currentWeapon = createWeapon("pistol")

      // игра
      score = 0
      survivalTime = 0
      dropTimer = 0
      shootCooldown = 0

      initCitySmoke()
      initTankSmoke()
      initFire()
    }

    function draw() {
      // Очистка канваса
      ctx.clearRect(0, 0, canvas.width, canvas.height)

      // Фон
      if (background.complete) {
        ctx.drawImage(background, 0, 0, canvas.width, canvas.height)
      }

      // Анимированные спрайты
      if (tankSmoke?.alive) tankSmoke.draw(ctx)
      if (citySmoke?.alive) citySmoke.draw(ctx)
      if (cityFire?.alive) cityFire.draw(ctx)

      // Земля
      ctx.fillStyle = "rgba(0,0,0,0)"
      ctx.fillRect(0, canvas.height - groundHeight, canvas.width, groundHeight)

      // Танк
      if (tankImg.complete) {
        ctx.drawImage(tankImg, tank.x, tank.y, tank.w, tank.h)
      }

      // Разрушенный город
      if (destroyedCityImg.complete) {
        ctx.drawImage(destroyedCityImg, destroyedCity.x, destroyedCity.y, destroyedCity.w, destroyedCity.h)
      }

      // Игрок
      if (player?.alive) {
        player.draw()
      }

      // Игровые объекты
      for (const obj of gameObjects) {
        if (obj.alive) {
          obj.draw(ctx)
        }
      }

      // Босс
      const boss = gameObjects.find(o => o instanceof BossDrone && o.alive)
      if (boss?.active) {
        const barWidth = 400
        const barHeight = 20
        const x = (canvas.width - barWidth) / 2
        const y = 20

        ctx.fillStyle = "rgba(255, 0, 0, 0.3)"
        ctx.fillRect(x, y, barWidth, barHeight)

        const healthPercent = boss.hp / boss.maxHp
        ctx.fillStyle = "#00ff00"
        ctx.fillRect(x, y, barWidth * healthPercent, barHeight)

        ctx.strokeStyle = "white"
        ctx.lineWidth = 2
        ctx.strokeRect(x, y, barWidth, barHeight)

        ctx.fillStyle = "white"
        ctx.font = "14px 'Press Start 2P', cursive"
        ctx.textAlign = "center"
        ctx.fillText("BOSS: Обнулитель 3000", canvas.width / 2, y + 40)
      }

      // UI
      ctx.save()
      ctx.fillStyle = "white"
      ctx.font = "20px monospace"

      ctx.fillText(currentWeapon?.name || "No Weapon", 20, 200)
      ctx.fillText(`Ammo: ${currentWeapon?.ammoInMagazine || 0} / ${currentWeapon?.magazineSize || 0}`, 20, 240)
      ctx.fillText(`Magazines: ${currentWeapon?.remainingMagazines || 0}`, 20, 270)

      if (currentWeapon?.reloading) {
        ctx.fillStyle = "yellow"
        ctx.fillText("RELOADING...", 20, 100)
      }
      ctx.restore()

      // Экран смерти
      if (!player?.alive) {
        ctx.save()
        ctx.fillStyle = "rgba(0,0,0,0.7)"
        ctx.fillRect(0, 0, canvas.width, canvas.height)

        ctx.fillStyle = "red"
        ctx.font = "96px 'Press Start 2P'"
        ctx.textAlign = "center"
        ctx.shadowColor = "black"
        ctx.shadowBlur = 10
        ctx.fillText("Ты 200!", canvas.width / 2, canvas.height / 2)
        ctx.restore()
      }
    }

    function drawPaused() {
      draw()

      ctx.save()
      ctx.fillStyle = "rgba(0,0,0,0.45)"
      ctx.fillRect(0, 0, canvas.width, canvas.height)

      ctx.fillStyle = "#ffffff"
      ctx.font = "42px 'Press Start 2P'"
      ctx.textAlign = "center"
      ctx.fillText("PAUSED", canvas.width / 2, canvas.height / 2)

      ctx.font = "18px 'Press Start 2P'"
      ctx.fillText("Press P to continue", canvas.width / 2, canvas.height / 2 + 60)
      ctx.restore()
    }

    function updateMenu(delta) {

    }

    function drawMenu() {

    }

    function drawGame() {
      draw()
    }

    function updateGameOver(delta) {

    }

    function drawGameOver() {

    }

    if (gameLoopInstances === 0) {
      gameLoopInstances++
      requestAnimationFrame(gameLoop)
    }

    UI.hud.startBtn.onclick = startGame

    document.addEventListener("keydown", e => {
      if (e.code === "Space") {
        shooting = true

        const dir = getShootDirection()

        if (dir && !currentWeapon.auto) {
          fireCurrentWeapon(dir.dx, dir.dy)
        }
      }

      if (e.code === "KeyP") {
        if (currentState === GameState.GAME) {
          currentState = GameState.PAUSED
        } else if (currentState === GameState.PAUSED) {
          currentState = GameState.GAME
        }
      }

      if (currentState === GameState.PAUSED) {
        return
      }

      if (e.key === "i") {
        setWeapon('rifle')
      }

      if (e.key === "s") {
        setWeapon('shotgun')
      }

      if (e.key === "m") {
        setWeapon('machinegun')
      }

      if (e.code === "Space") {
        e.preventDefault()
      }

      if (e.code === "KeyR") {
        if (currentWeapon?.reloading) return
        startReload()
      }

      keys[e.key] = true
    })

    document.addEventListener("keyup", e => {
      if (currentState === GameState.PAUSED) {
        if (e.code === "Space") {
          shooting = false
        }
        return
      }

      if (e.code === "Space") {
        shooting = false
      }
      keys[e.key] = false
    })

    document.body.addEventListener("click", () => {
      audio.playMusic('menu')
    }, { once: true })

    window.addEventListener("load", () => {
      UI.hideLoadingScreen()
    })

    loadLeaderboard()

    const interval = setInterval(() => {
      progress += 10
      UI.setLoadingProgress(progress)

      if (progress >= 100) {
        clearInterval(interval)
      }
    }, 100)
